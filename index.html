  function bindContentEvents(){
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id, btn.dataset));
    });

    const stepSelect = document.getElementById('genStepSelect');
    const promptSelect = document.getElementById('genPromptSelect');
    if (stepSelect && promptSelect) {
      const p = getProject();
      if (p.steps[0]) {
        stepSelect.value = p.steps.slice().sort((a,b)=>(a.order||0)-(b.order||0))[0].id;
        const st = p.steps.find(s => s.id === stepSelect.value);
        if (st && st.promptId) promptSelect.value = st.promptId;
      }
      setupGenerator();
      stepSelect.addEventListener('change', setupGenerator);
      promptSelect.addEventListener('change', setupGenerator);
      document.getElementById('buildPromptBtn').addEventListener('click', buildPrompt);
      document.getElementById('copyGeneratedBtn').addEventListener('click', copyGenerated);
      document.getElementById('saveGeneratedBtn').addEventListener('click', saveGeneratedAsOutput);
    }

    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.addEventListener('click', exportJSON);
    const importInput = document.getElementById('importInput');
    if (importInput) importInput.addEventListener('change', importJSON);
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.addEventListener('click', resetAll);
  }

  function handleAction(action, id, ds){
    if (action === 'editDoc') openDocModal(id);
    if (action === 'deleteDoc') deleteDoc(id);
    if (action === 'editPrompt') openPromptModal(id);
    if (action === 'duplicatePrompt') duplicatePrompt(id);
    if (action === 'deletePrompt') deletePrompt(id);
    if (action === 'editStep') openStepModal(id);
    if (action === 'deleteStep') deleteStep(id);
    if (action === 'moveStep') moveStep(id, Number(ds.dir || 0));
    if (action === 'useStep') { activeTab = 'generate'; render(); setTimeout(()=>{ const e=document.getElementById('genStepSelect'); if(e){e.value=id; setupGenerator();}}, 0); }
    if (action === 'editOutput') openOutputModal(id);
    if (action === 'deleteOutput') deleteOutput(id);
    if (action === 'promoteOutput') promoteOutput(id);
  }

  function openModal(title, bodyHTML, onSave){
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <div class="row" style="justify-content:space-between;">
            <h3>${esc(title)}</h3>
            <button id="modalCloseBtn">閉じる</button>
          </div>
          ${bodyHTML}
          <div class="toolbar">
            <button class="primary" id="modalSaveBtn">保存</button>
            <button id="modalCancelBtn">キャンセル</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalCloseBtn').onclick = closeModal;
    document.getElementById('modalCancelBtn').onclick = closeModal;
    document.getElementById('modalSaveBtn').onclick = () => {
      if (onSave()) closeModal();
    };
  }

  function closeModal(){
    document.getElementById('modalRoot').innerHTML = '';
  }

  function val(id){ return document.getElementById(id)?.value || ''; }

  function openDocModal(id){
    const p = getProject();
    const d = p.documents.find(x => x.id === id) || {
      id: '', title: '', category: '', status: '作業稿', scope: 'GM用', tags: '', content: ''
    };
    openModal(id ? '資料を編集' : '資料を追加', `
      <div class="form-grid">
        <div><label>タイトル</label><input id="docTitle" value="${esc(d.title)}"></div>
        <div><label>カテゴリ</label><input id="docCategory" value="${esc(d.category)}" placeholder="世界観 / NPC / 各話資料など"></div>
        <div><label>状態</label><select id="docStatus">${options(['作業稿','採用稿','旧稿','没案','保留'], d.status)}</select></div>
        <div><label>公開範囲</label><select id="docScope">${options(['GM用','PL公開可','秘匿','外部向け'], d.scope)}</select></div>
      </div>
      <div style="margin-top:10px;"><label>タグ（カンマ区切り）</label><input id="docTags" value="${esc(d.tags)}"></div>
      <div style="margin-top:10px;"><label>本文</label><textarea id="docContent" style="min-height:320px;">${esc(d.content)}</textarea></div>
    `, () => {
      if (!val('docTitle').trim()) { toast('タイトルが必要です'); return false; }
      const obj = {
        id: id || uid('doc'),
        title: val('docTitle').trim(),
        category: val('docCategory').trim(),
        status: val('docStatus'),
        scope: val('docScope'),
        tags: val('docTags'),
        content: val('docContent'),
        updatedAt: nowText()
      };
      if (id) p.documents = p.documents.map(x => x.id === id ? obj : x);
      else p.documents.push(obj);
      saveState(); renderContent(); toast('資料を保存しました'); return true;
    });
  }

  function deleteDoc(id){
    if (!confirm('この資料を削除しますか？工程からの参照も外れます。')) return;
    const p = getProject();
    p.documents = p.documents.filter(d => d.id !== id);
    p.steps.forEach(s => s.docIds = (s.docIds || []).filter(x => x !== id));
    saveState(); renderContent(); toast('資料を削除しました');
  }

  function openPromptModal(id){
    const p = getProject();
    const pr = p.prompts.find(x => x.id === id) || {
      id: '', title: '', category: '', description: '', template: '', fields: ''
    };
    openModal(id ? 'プロンプトを編集' : 'プロンプトを追加', `
      <div class="form-grid">
        <div><label>タイトル</label><input id="promptTitle" value="${esc(pr.title)}"></div>
        <div><label>カテゴリ</label><input id="promptCategory" value="${esc(pr.category)}" placeholder="レビュー / 本文作成など"></div>
      </div>
      <div style="margin-top:10px;"><label>説明</label><input id="promptDescription" value="${esc(pr.description)}"></div>
      <div style="margin-top:10px;"><label>入力欄（任意。カンマ区切り。未入力でも {{変数}} から自動抽出）</label><input id="promptFields" value="${esc(pr.fields)}" placeholder="話数,PCレベル,対象本文"></div>
      <div style="margin-top:10px;"><label>テンプレート</label><textarea id="promptTemplate" style="min-height:360px;">${esc(pr.template)}</textarea></div>
      <p class="muted small">例：{{話数}} のように書くと、生成画面で入力欄になります。</p>
    `, () => {
      if (!val('promptTitle').trim()) { toast('タイトルが必要です'); return false; }
      const obj = {
        id: id || uid('prompt'),
        title: val('promptTitle').trim(),
        category: val('promptCategory').trim(),
        description: val('promptDescription'),
        fields: val('promptFields'),
        template: val('promptTemplate'),
        updatedAt: nowText()
      };
      if (id) p.prompts = p.prompts.map(x => x.id === id ? obj : x);
      else p.prompts.push(obj);
      saveState(); renderContent(); toast('プロンプトを保存しました'); return true;
    });
  }

  function duplicatePrompt(id){
    const p = getProject();
    const pr = p.prompts.find(x => x.id === id);
    if (!pr) return;
    p.prompts.push({...pr, id: uid('prompt'), title: pr.title + ' のコピー', updatedAt: nowText()});
    saveState(); renderContent(); toast('プロンプトを複製しました');
  }

  function deletePrompt(id){
    if (!confirm('このプロンプトを削除しますか？工程からの参照も外れます。')) return;
    const p = getProject();
    p.prompts = p.prompts.filter(pr => pr.id !== id);
    p.steps.forEach(s => { if (s.promptId === id) s.promptId = ''; });
    saveState(); renderContent(); toast('プロンプトを削除しました');
  }

  function openStepModal(id){
    const p = getProject();
    const s = p.steps.find(x => x.id === id) || {
      id: '', title: '', status: '未着手', promptId: p.prompts[0]?.id || '', docIds: [], memo: '', order: p.steps.length + 1
    };
    openModal(id ? '工程を編集' : '工程を追加', `
      <div class="form-grid">
        <div><label>工程名</label><input id="stepTitle" value="${esc(s.title)}"></div>
        <div><label>順番</label><input id="stepOrder" type="number" value="${esc(s.order || p.steps.length+1)}"></div>
        <div><label>状態</label><select id="stepStatus">${options(['未着手','作業中','レビュー待ち','修正中','完了','保留'], s.status)}</select></div>
        <div><label>使用プロンプト</label><select id="stepPrompt">${p.prompts.map(pr => `<option value="${pr.id}" ${pr.id === s.promptId ? 'selected' : ''}>${esc(pr.title)}</option>`).join('')}</select></div>
      </div>
      <div style="margin-top:10px;"><label>紐づける資料</label>
        <div class="checkbox-list">
          ${p.documents.map(d => `<label class="checkbox-row"><input type="checkbox" class="stepDocCheck" value="${d.id}" ${(s.docIds||[]).includes(d.id) ? 'checked' : ''}><span>${esc(d.title)} <span class="muted small">/ ${esc(d.status || '')}</span></span></label>`).join('') || '<div class="muted">資料がありません。</div>'}
        </div>
      </div>
      <div style="margin-top:10px;"><label>メモ</label><textarea id="stepMemo">${esc(s.memo || '')}</textarea></div>
    `, () => {
      if (!val('stepTitle').trim()) { toast('工程名が必要です'); return false; }
      const docIds = [...document.querySelectorAll('.stepDocCheck:checked')].map(x => x.value);
      const obj = {
        id: id || uid('step'),
        title: val('stepTitle').trim(),
        order: Number(val('stepOrder') || p.steps.length+1),
        status: val('stepStatus'),
        promptId: val('stepPrompt'),
        docIds,
        memo: val('stepMemo'),
        updatedAt: nowText()
      };
      if (id) p.steps = p.steps.map(x => x.id === id ? obj : x);
      else p.steps.push(obj);
      normalizeStepOrder(p);
      saveState(); renderContent(); toast('工程を保存しました'); return true;
    });
  }

  function deleteStep(id){
    if (!confirm('この工程を削除しますか？')) return;
    const p = getProject();
    p.steps = p.steps.filter(s => s.id !== id);
    normalizeStepOrder(p);
    saveState(); renderContent(); toast('工程を削除しました');
  }

  function moveStep(id, dir){
    const p = getProject();
    const arr = p.steps.slice().sort((a,b)=>(a.order||0)-(b.order||0));
    const idx = arr.findIndex(s => s.id === id);
    const nidx = idx + dir;
    if (idx < 0 || nidx < 0 || nidx >= arr.length) return;
    [arr[idx], arr[nidx]] = [arr[nidx], arr[idx]];
    arr.forEach((s, i) => s.order = i+1);
    p.steps = arr;
    saveState(); renderContent();
  }

  function normalizeStepOrder(p){
    p.steps.sort((a,b)=>(a.order||0)-(b.order||0)).forEach((s,i) => s.order = i+1);
  }

  function openOutputModal(id){
    const p = getProject();
    const o = p.outputs.find(x => x.id === id) || { id:'', title:'', category:'出力', status:'保留', content:'', createdAt: nowText() };
    openModal(id ? '出力を編集' : '出力を追加', `
      <div class="form-grid">
        <div><label>タイトル</label><input id="outTitle" value="${esc(o.title)}"></div>
        <div><label>カテゴリ</label><input id="outCategory" value="${esc(o.category)}"></div>
        <div><label>状態</label><select id="outStatus">${options(['採用稿','作業稿','旧稿','没案','保留'], o.status)}</select></div>
      </div>
      <div style="margin-top:10px;"><label>本文</label><textarea id="outContent" style="min-height:360px;">${esc(o.content)}</textarea></div>
    `, () => {
      if (!val('outTitle').trim()) { toast('タイトルが必要です'); return false; }
      const obj = {
        id: id || uid('output'),
        title: val('outTitle').trim(),
        category: val('outCategory').trim(),
        status: val('outStatus'),
        content: val('outContent'),
        createdAt: o.createdAt || nowText(),
        updatedAt: nowText()
      };
      if (id) p.outputs = p.outputs.map(x => x.id === id ? obj : x);
      else p.outputs.push(obj);
      saveState(); renderContent(); toast('出力を保存しました'); return true;
    });
  }

  function deleteOutput(id){
    if (!confirm('この出力履歴を削除しますか？')) return;
    const p = getProject();
    p.outputs = p.outputs.filter(o => o.id !== id);
    saveState(); renderContent(); toast('出力を削除しました');
  }

  function promoteOutput(id){
    const p = getProject();
    const o = p.outputs.find(x => x.id === id);
    if (!o) return;
    p.documents.push({
      id: uid('doc'),
      title: o.title + '（資料化）',
      category: o.category || '出力資料',
      status: o.status || '作業稿',
      scope: 'GM用',
      tags: '出力履歴から資料化',
      content: o.content || '',
      updatedAt: nowText()
    });
    saveState(); renderContent(); toast('資料に追加しました');
  }

  function options(list, selected){
    return list.map(x => `<option value="${esc(x)}" ${x === selected ? 'selected' : ''}>${esc(x)}</option>`).join('');
  }

  function extractVars(pr){
    const fromTemplate = [...String(pr.template || '').matchAll(/\{\{([^{}]+)\}\}/g)].map(m => m[1].trim()).filter(Boolean);
    const fromFields = String(pr.fields || '').split(',').map(x => x.trim()).filter(Boolean);
    return [...new Set([...fromFields, ...fromTemplate])];
  }

  function setupGenerator(){
    const p = getProject();
    const stepId = document.getElementById('genStepSelect')?.value || '';
    const step = p.steps.find(s => s.id === stepId);
    const promptSelect = document.getElementById('genPromptSelect');
    if (step && step.promptId && p.prompts.some(pr => pr.id === step.promptId)) {
      promptSelect.value = step.promptId;
    }
    const pr = p.prompts.find(x => x.id === promptSelect.value) || p.prompts[0];
    const vars = pr ? extractVars(pr) : [];
    const fieldsEl = document.getElementById('genFields');
    fieldsEl.innerHTML = vars.map(v => `
      <div>
        <label>${esc(v)}</label>
        <textarea class="genField" data-key="${esc(v)}" placeholder="${esc(v)}を入力">${defaultFieldValue(v, p)}</textarea>
      </div>
    `).join('') || '<div class="muted small">このプロンプトに変数はありません。</div>';

    const docChecks = document.getElementById('genDocChecks');
    const selectedDocIds = step ? (step.docIds || []) : [];
    docChecks.innerHTML = p.documents.map(d => `
      <label class="checkbox-row">
        <input type="checkbox" class="genDocCheck" value="${d.id}" ${selectedDocIds.includes(d.id) ? 'checked' : ''}>
        <span>${esc(d.title)} <span class="muted small">/ ${esc(d.status || '')}</span></span>
      </label>
    `).join('') || '<div class="muted">資料がありません。</div>';
  }

  function defaultFieldValue(key, p){
    const k = String(key);
    if (k === 'システム') return esc(p.system || '');
    if (k === 'ジャンル') return esc(p.genre || '');
    if (k === '参照資料') return '※下部の「含める資料」で選択した資料が自動挿入されます。';
    if (k === '前提・禁止事項') {
      const docs = p.documents.filter(d => (d.tags||'').includes('禁止') || (d.title||'').includes('方針'));
      return esc(docs.map(d => d.content).join('\n\n'));
    }
    return '';
  }

  function buildPrompt(){
    const p = getProject();
    const pr = p.prompts.find(x => x.id === document.getElementById('genPromptSelect').value);
    if (!pr) { toast('プロンプトがありません'); return; }
    const fields = {};
    document.querySelectorAll('.genField').forEach(el => fields[el.dataset.key] = el.value);
    const selectedDocs = [...document.querySelectorAll('.genDocCheck:checked')].map(x => p.documents.find(d => d.id === x.value)).filter(Boolean);
    const refs = selectedDocs.map(d => {
      return `\n\n==================================================\n# 参照資料：${d.title}\nカテゴリ：${d.category || '-'} / 状態：${d.status || '-'} / 公開範囲：${d.scope || '-'}\n==================================================\n${d.content || ''}`;
    }).join('\n');
    fields['参照資料'] = refs || fields['参照資料'] || 'なし';

    let text = pr.template || '';
    text = text.replace(/\{\{([^{}]+)\}\}/g, (_, key) => fields[key.trim()] ?? '');
    currentGeneratedText = text;
    document.getElementById('generatedText').value = text;
    toast('プロンプトを生成しました');
  }

  async function copyGenerated(){
    const txt = document.getElementById('generatedText')?.value || '';
    if (!txt.trim()) { toast('コピーする内容がありません'); return; }
    try {
      await navigator.clipboard.writeText(txt);
      toast('コピーしました');
    } catch(e) {
      const area = document.getElementById('generatedText');
      area.focus(); area.select();
      document.execCommand('copy');
      toast('コピーしました');
    }
  }

  function saveGeneratedAsOutput(){
    const p = getProject();
    const txt = document.getElementById('generatedText')?.value || '';
    if (!txt.trim()) { toast('保存する内容がありません'); return; }
    const title = prompt('出力履歴のタイトル', '生成プロンプト ' + nowText());
    if (!title) return;
    p.outputs.push({
      id: uid('output'),
      title,
      category: '生成プロンプト',
      status: '作業稿',
      content: txt,
      createdAt: nowText(),
      updatedAt: nowText()
    });
    saveState(); toast('出力履歴に保存しました');
  }

  function exportJSON(){
    saveState();
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safe = (getProject()?.title || 'trpg').replace(/[\\/:*?"<>|]/g, '_');
    a.href = url;
    a.download = `${safe}_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('JSONを書き出しました');
  }

  function importJSON(e){
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (!imported.projects || !Array.isArray(imported.projects)) throw new Error('invalid');
        if (!confirm('現在のデータをインポートデータで置き換えます。よろしいですか？')) return;
        state = imported;
        state.version = state.version || APP_VERSION;
        saveState();
        render();
        toast('JSONを読み込みました');
      } catch(err) {
        alert('JSONの読み込みに失敗しました。形式を確認してください。');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function resetAll(){
    if (!confirm('本当に全データを初期化しますか？ JSONバックアップがない場合、元に戻せません。')) return;
    if (!confirm('最終確認です。初期サンプル状態に戻します。')) return;
    state = sampleState();
    saveState();
    render();
    toast('初期化しました');
  }

  function addProject(){
    const title = prompt('新しいプロジェクト名', '新規TRPGシナリオ');
    if (!title) return;
    const id = uid('project');
    state.projects.push({
      id, title, system:'', genre:'', status:'作業中', note:'',
      documents:[], prompts:[], steps:[], outputs:[],
      createdAt: nowText(), updatedAt: nowText()
    });
    state.currentProjectId = id;
    saveState(); render(); toast('プロジェクトを追加しました');
  }

  function editProject(){
    const p = getProject();
    openModal('プロジェクト編集', `
      <div class="form-grid">
        <div><label>タイトル</label><input id="projTitle" value="${esc(p.title)}"></div>
        <div><label>状態</label><select id="projStatus">${options(['構想中','作業中','レビュー中','完了','保留'], p.status)}</select></div>
        <div><label>システム</label><input id="projSystem" value="${esc(p.system || '')}" placeholder="ソード・ワールド2.5など"></div>
        <div><label>ジャンル</label><input id="projGenre" value="${esc(p.genre || '')}" placeholder="和風ダークファンタジーなど"></div>
      </div>
      <div style="margin-top:10px;"><label>メモ</label><textarea id="projNote">${esc(p.note || '')}</textarea></div>
    `, () => {
      if (!val('projTitle').trim()) { toast('タイトルが必要です'); return false; }
      p.title = val('projTitle').trim();
      p.status = val('projStatus');
      p.system = val('projSystem');
      p.genre = val('projGenre');
      p.note = val('projNote');
      saveState(); render(); toast('プロジェクトを保存しました'); return true;
    });
  }

  function duplicateProject(){
    const p = getProject();
    const clone = JSON.parse(JSON.stringify(p));
    clone.id = uid('project');
    clone.title = p.title + ' のコピー';
    clone.createdAt = nowText();
    clone.updatedAt = nowText();
    state.projects.push(clone);
    state.currentProjectId = clone.id;
    saveState(); render(); toast('プロジェクトを複製しました');
  }

  function deleteProject(){
    const p = getProject();
    if (state.projects.length <= 1) { toast('最後のプロジェクトは削除できません'); return; }
    if (!confirm(`プロジェクト「${p.title}」を削除しますか？`)) return;
    state.projects = state.projects.filter(x => x.id !== p.id);
    state.currentProjectId = state.projects[0].id;
    saveState(); render(); toast('プロジェクトを削除しました');
  }

  document.getElementById('addProjectBtn').addEventListener('click', addProject);
  document.getElementById('renameProjectBtn').addEventListener('click', editProject);
  document.getElementById('duplicateProjectBtn').addEventListener('click', duplicateProject);
  document.getElementById('deleteProjectBtn').addEventListener('click', deleteProject);
  document.getElementById('quickExportBtn').addEventListener('click', exportJSON);
  document.getElementById('quickImportInput').addEventListener('change', importJSON);

  render();
})();
</script>
</body>
</html>
