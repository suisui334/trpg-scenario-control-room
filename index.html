                              "category": "PL公開",
                              "description": "PL向けのキャンペーン紹介記事を作成する工程。",
                              "template": "# 命令書：キャンペーン紹介記事作成\n\nあなたはTRPGキャンペーン紹介記事のライターです。\n以下の資料をもとに、Notionや募集ページに掲載できるPL向けキャンペーン紹介記事を作成してください。\n\n本工程では、各話の詳細、黒幕、裏切り、死亡予定、最終話の真相などのネタバレを絶対に公開してはいけません。\nただし、キャンペーン全体の雰囲気、PCの立場、舞台の魅力、冒険の方向性、参加前に知っておくべきトーン、そしてPLに見せてよい範囲のNPC紹介は明確に伝えてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【キャンペーン名】\n[6-1で決定したタイトル]\n\n2. 【サブタイトル】\n[必要な場合]\n\n3. 【使用システム】\nソード・ワールド2.5\n\n4. 【キャンペーン形式】\n[全7話 / 全10話 / 各話3時間 / オンラインテキストセッション など]\n\n5. 【舞台紹介】\n[資]1.オープンワールド世界観資料、またはPL公開可能な舞台概要]\n\n6. 【キャンペーン世界観資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n※秘匿情報は公開しないこと。\n\n7. 【第1話導入】\n[第1話フックのうちPL公開可能な内容]\n\n8. 【キャンペーン全体プロット】\n[全体プロット資料]\n※各話の詳細は公開しないこと。公開可能な全体トーンだけ抽出する。\n\n9. 【PCの想定立場】\n[冒険者ギルド所属、外部冒険者、現地出身者など]\n\n10. 【公開してよい情報】\n[PLに見せてもよい設定]\n\n11. 【伏せるべき情報】\n[黒幕、真相、裏切り、死亡予定、最終話、各話の具体的展開など]\n\n12. 【公開してよいNPC情報】\n[第1話から登場し、かつ今後主軸になる対象のみ。表の顔、公開肩書き、PCとの接点など]\n\n13. 【伏せるべきNPC情報】\n[裏の顔、敵対予定、裏切り、死亡予定、黒幕との関係、秘匿目的など]\n\n14. 【NPC紹介文の参考資料】\n[資]0-01.サンプルNPC\n※ある場合は添付または貼り付けること。文量・文体・情報密度を参考にすること。\n\n15. 【記事のトーン】\n[重厚 / 読みやすい / 和風ダークファンタジー / 募集文寄り / 世界観紹介寄り など]\n\n16. 【参加前の注意事項】\n[PC作成の方向性、避けたい設定、トーン、PvP不可、公式NPCの扱いなど]\n\n==================================================\n# 作成方針\n==================================================\n\n・PLが参加前に読んで、キャンペーンの雰囲気と自分の立場を理解できる記事にすること。\n・ネタバレを避けること。\n・各話の展開を明かさないこと。\n・黒幕、裏切り、死亡予定、最終話の真相を伏せること。\n・ただし、何をするキャンペーンなのか分からない記事にしないこと。\n・キャンペーン紹介記事には、公開可能な範囲でNPC紹介の項目を含めること。\n・初回公開時のキャンペーンNPC紹介は、第1話から登場し、かつ今後主軸になる対象に絞ること。\n・NPC紹介は設定項目をすべて載せず、[資]0-01.サンプルNPCがある場合はその文量・文体・情報密度に合わせてコンパクトにまとめること。\n・GMPCは存在し、PL公開してよい場合のみ紹介すること。存在しない場合は作成・追加・前提化しないこと。\n・舞台の魅力、冒険の方向性、危険、不穏さ、期待できる体験を明確にすること。\n・PCが主役であることを明確にすること。\n・抽象的な美文に逃げず、実際のプレイ体験を想像できるようにすること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料のみを参照してください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n\n# 【キャンペーン紹介記事】\n\n## 1. タイトル\n## 2. 導入トレーラー\n## 3. このキャンペーンについて\n## 4. 舞台について\n## 5. PCたちの立場\n## 6. 冒険の方向性\n## 7. 知っていてよい公開情報\n## 8. 登場人物紹介\n※第1話から登場し、かつ今後主軸になる対象のみ。\n※裏の顔、敵対予定、裏切り、死亡予定は公開しない。\n※設定項目を羅列せず、コンパクトな紹介文にする。\n## 9. 噂と不穏な兆し\n## 10. 参加前に知っておくとよいこと\n## 11. GM用公開判断メモ\n※Notion公開時には削除または非公開化すること。\n\n出力後、\n「この紹介記事を公開情報チェックにかけますか？」\nと確認して停止してください。",
                              "fields": "キャンペーン名,サブタイトル,使用システム,キャンペーン形式,舞台紹介,キャンペーン世界観資料,第1話導入,キャンペーン全体プロット,PCの想定立場,公開してよい情報,伏せるべき情報,公開してよいNPC情報,伏せるべきNPC情報,NPC紹介文の参考資料,記事のトーン,参加前の注意事項",
                              "updatedAt": "2026-04-29 00:00"

                              "template": "# 命令書：キャンペーン紹介記事レビュー・公開情報チェック\n\nあなたはプロのTRPGシナリオ編集者兼情報管理担当です。\n以下の入力資料をもとに、PL向け・外部向けに作成されたキャンペーン紹介記事をレビューし、ネタバレ、秘匿情報、GM専用情報、各話詳細、黒幕情報、裏切り・死亡予定などが漏れていないかを厳密に確認してください。\n\n本工程の目的は、記事を美しく書き直すことではありません。\n目的は、PLに公開してよい記事として安全かどうかを確認し、必要な修正方針を提示し、公開可能な形へ整えることです。\n\nキャンペーン紹介記事は、PLに「参加したい」と思わせるための玄関です。\nしかし、玄関に地下牢の地図を貼ってはいけません。\n雰囲気と導線は見せ、真相と仕掛けは伏せてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【レビュー対象のキャンペーン紹介記事】\n[6-2で作成したキャンペーン紹介記事本文を入力]\n\n2. 【キャンペーン名】\n[6-1で決定したキャンペーン名]\n\n3. 【使用システム】\nソード・ワールド2.5\n\n4. 【キャンペーン形式】\n[全7話 / 全10話 / オンラインテキストセッション / 1話3時間 など]\n\n5. 【キャンペーン世界観・裏設定資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n※GM向け非公開情報を含む場合があるため、公開可否の判定に使用すること。\n\n6. 【NPC配置資料】\n[資]6.NPC配置資料.txt\n\n7. 【主要NPC一覧資料】\n[資]7.主要NPC一覧資料.txt\n\n8. 【準主要NPC一覧資料】\n[資]8.準主要NPC一覧資料.txt\n\n9. 【第1話フック】\n[PLに公開してよい導入情報の確認に使う]\n\n10. 【最終話フック】\n[ネタバレ混入チェックに使う。公開しないこと]\n\n11. 【キャンペーン全体プロット】\n[公開してよい全体トーンと、伏せるべき核心の判定に使う]\n\n12. 【PLに公開してよい情報】\n[PCの立場、舞台の概要、導入、トーン、参加前注意など]\n\n13. 【伏せるべき情報】\n[黒幕、真相、裏切り、死亡予定、最終話の展開、各話の具体的展開、NPCの裏の顔など]\n\n14. 【公開記事の用途】\n[Notion公開ページ / 身内PL共有 / 募集ページ / Discord告知 / X告知文の下地 など]\n\n15. 【修正方針】\n[例：ネタバレだけ削る / 文章も軽く整える / PL向けにやさしくする / GM用メモを分離する など]\n\n==================================================\n# レビュー方針\n==================================================\n\n以下の観点で、キャンペーン紹介記事を厳しく検査してください。\n\n・黒幕が直接または間接的に特定できる情報が含まれていないか。\n・ラスボスや最終話の展開が透けていないか。\n・裏切り、死亡、脱落、離反、討伐時期が示唆されすぎていないか。\n・主要NPCの裏の顔や秘匿目的が漏れていないか。\n・準主要NPCや敵幹部の正体が公開情報として出ていないか。\n・各話の具体的な事件展開が書かれすぎていないか。\n・PCが本編中に調査して知るべき情報を、事前公開してしまっていないか。\n・GM向け非公開設定が、言い換えのつもりで漏れていないか。\n・噂として出してよい情報と、完全に伏せるべき情報が混ざっていないか。\n・PLが参加前に知ってよい情報が不足していないか。\n・伏せすぎて、何をするキャンペーンか分からなくなっていないか。\n・不穏さや雰囲気だけが先行し、PCの立場や遊び方が見えなくなっていないか。\n・公式NPCやGMPCの扱いが誤解される書き方になっていないか。\n・GMPCが存在しない場合、GMPCがいるような前提になっていないか。\n・GMPCがいる場合でも、PCより主役に見える紹介になっていないか。\n・用語が多すぎて初見PLが置いてけぼりにならないか。\n・ソード・ワールド2.5の公式設定を不用意に改変しているように見えないか。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料のみを参照してください。\n\n==================================================\n# 情報分類ルール\n==================================================\n\nレビュー対象の記事内の情報を、以下の4分類に分けてください。\n\n【A. そのまま公開してよい情報】\n・舞台の雰囲気。\n・PCの立場。\n・冒険の方向性。\n・一般的な噂。\n・PLが事前に知ってよい制度や地理。\n\n【B. 言い換えれば公開してよい情報】\n・具体的すぎるが、噂や不穏な兆しとしてぼかせば使える情報。\n\n【C. 削除すべき情報】\n・黒幕。\n・最終話の核心。\n・裏切り者。\n・死亡予定。\n・敵の真の目的。\n・各話の具体的な展開。\n・NPCの裏の顔。\n・PCが調査で知るべき真相。\n\n【D. GM専用欄へ移すべき情報】\n・公開記事には不要だが、GMが公開判断を記録するために残した方がよい情報。\n・Notion上では非公開ページまたはトグル隔離推奨。\n\n==================================================\n# 修正方針\n==================================================\n\nレビュー後、必要であれば以下の修正を行ってください。\n\n・ネタバレ部分を削除する。\n・秘匿情報を噂や未確認情報へぼかす。\n・GM専用情報を記事本文から分離する。\n・公開可能な範囲で、PCの立場や冒険の方向性を補強する。\n・専門用語に短い説明を加える。\n・各話展開を示しすぎる文章を、キャンペーン全体の空気感に言い換える。\n・GMPCがいない場合、GMPC前提の表現を削る。\n・GMPCがいる場合でも、PCを主役に見せる文章へ調整する。\n・伏せすぎて魅力が消えている場合は、公開可能な範囲でトレーラー性を補う。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n余計な挨拶や会話文は挟まないでください。\n\n==================================================\n【キャンペーン紹介記事レビュー・公開情報チェック】\n==================================================\n\n■1. 総合判定\n【公開可否】\n以下から選択する。\n・このまま公開可能\n・軽微な修正で公開可能\n・大幅修正が必要\n・現状では公開不可\n\n【判定理由】\n記事全体の安全性、魅力、情報量、ネタバレ危険度を簡潔に述べる。\n\n■2. ネタバレ・秘匿情報チェック\n【黒幕・ラスボス情報の漏れ】\n【最終話情報の漏れ】\n【裏切り・死亡予定の漏れ】\n【NPC秘匿情報の漏れ】\n【各話展開の漏れ】\n【PCが調査で知るべき情報の先出し】\n【GM専用情報の混入】\n【GMPCの扱い】\n【公式NPCの扱い】\n\n■3. 記事内情報の分類\n以下の表形式で整理する。\n\n【記事内の該当情報】\n【分類：A/B/C/D】\n【理由】\n【対応方針】\n\n■4. 削除すべき箇所\n削除すべき文、表現、段落を列挙する。\nなぜ削除すべきかも記載する。\n\n■5. 言い換え推奨箇所\n以下の形式で示す。\n\n【元の表現】\n【問題点】\n【言い換え案】\n\n■6. 補強すべき箇所\n伏せすぎて魅力が弱くなっている箇所、PCの立場が見えにくい箇所、冒険の方向性が不明瞭な箇所を指摘し、補強案を出す。\n\n■7. 公開用修正版記事\nレビュー結果を反映し、PL向けに公開可能なキャンペーン紹介記事として再出力する。\nただし、元記事の意味を大きく変えず、秘匿情報を守りながら整えること。\n\n■8. GM用公開判断メモ\n※Notion公開時には非公開化、削除、またはGM専用ページへ移すこと。\n\n【そのまま公開した情報】\n【言い換えて公開した情報】\n【削除した情報】\n【GM専用に隔離した情報】\n【まだPLに見せない方がよい情報】\n【今後の記事更新時の注意】\n\n==================================================\n\n出力後、\n「この修正版記事をNotion貼り付け用Markdownへ整形しますか？」\nと確認し、処理を停止してください。\n",
                              "fields": "レビュー対象のキャンペーン紹介記事,キャンペーン名,キャンペーン形式,キャンペーン世界観・裏設定資料,NPC配置資料,主要NPC一覧資料,準主要NPC一覧資料,第1話フック,最終話フック,キャンペーン全体プロット,PLに公開してよい情報,伏せるべき情報,公開記事の用途,修正方針",

                              "template": "# 命令書：Notion貼り付け用Markdown整形\n\nあなたはTRPG資料編集者兼Notionページ設計者です。\n以下の入力本文をもとに、Notionへ貼り付けやすいMarkdown形式のページへ整形してください。\n\n本工程の目的は、新しい設定や記事内容を作ることではありません。\n目的は、作成済みの世界観紹介、キャンペーン紹介、舞台資料、PL向け案内文、依頼書、NPC紹介などを、Notionで読みやすく管理しやすい形へ整えることです。\n\n文章の意味を勝手に変えず、見出し、区切り、箇条書き、表、注意書き、GM専用メモ、PL公開情報などを整理してください。\nただし、Notionで読みにくい過度な装飾や、無意味な絵文字の乱用は避けてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【整形対象本文】\n[ここにNotion向けに整形したい本文を入力]\n\n2. 【資料の種別】\n[例：外部紹介記事 / PL向け世界観資料 / GM用世界観資料 / キャンペーン概要 / 依頼書 / NPC紹介 / セッション募集文 / シナリオ一覧 など]\n\n3. 【想定読者】\n[例：PL / GM / 外部読者 / 身内卓メンバー / 初見PL / 自分用 など]\n\n4. 【Notionでの用途】\n[例：公開ページ / 非公開GM資料 / PL共有ページ / セッション募集ページ / 資料ハブ / キャンペーンポータル など]\n\n5. 【公開範囲】\n[例：PL公開可 / GM専用 / 一部公開 / 外部公開 / 自分用 など]\n\n6. 【秘匿情報の扱い】\n[例：削除する / GM専用欄へ隔離する / トグル想定で分離する / 伏せ字にする / そのまま保持する など]\n\n7. 【希望するページ構成】\n[例：タイトル、概要、PC立場、舞台紹介、公開情報、噂、注意事項、GMメモ など]\n\n8. 【表にしたい項目】\n[例：重要用語一覧、NPC一覧、地域一覧、セッション一覧、依頼一覧、公開情報と秘匿情報の分類など]\n\n9. 【折りたたみ・トグルにしたい項目】\n[例：GM用メモ、詳細設定、長い用語解説、過去ログ、NPC詳細、ネタバレ欄など]\n\n10. 【避けたい整形】\n[例：絵文字を増やしすぎない、表を多用しない、見出しを細かくしすぎない、文章を削らない、本文を勝手に要約しない など]\n\n==================================================\n# 整形方針\n==================================================\n\n・本文の意味を勝手に変えないこと。\n・本文を勝手に要約しないこと。\n・必要がない限り、設定を追加しないこと。\n・誤字脱字や表記揺れは自然に修正してよい。\n・Notionで読みやすいよう、見出し階層を整理すること。\n・長い本文は、段落ごとに読みやすく区切ること。\n・一覧性が高い情報は表にすること。\n・長い説明やGM専用情報は、Notionのトグル化を想定して分離すること。\n・PL公開情報とGM専用情報を混ぜないこと。\n・秘匿情報の扱いは、入力指定を最優先すること。\n・公開ページの場合、黒幕、真相、裏切り、死亡予定、最終話の結末、NPCの裏の顔を漏らさないこと。\n・GM専用ページの場合は、秘匿情報を保持してよいが、見出しで明確に分けること。\n・過度な絵文字装飾、過剰な太字、過密な表、細かすぎる見出しは避けること。\n・Notionへ貼り付けたときに崩れにくいMarkdownを優先すること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力された本文のみを扱ってください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力は、プレーンテキストのコードブロックにしてください。\n\n==================================================\n【Notion貼り付け用Markdown整形結果】\n==================================================\n\n■1. 整形方針\n■2. Notion運用メモ\n■3. Markdown本文\n■4. 整形上の注意\n\n出力後、必要であれば、\n「このMarkdownを公開用にさらに軽量化しますか？ それともGM用資料として整えますか？」\nと確認し、処理を停止してください。\n",
                              "fields": "整形対象本文,資料の種別,想定読者,Notionでの用途,公開範囲,秘匿情報の扱い,希望するページ構成,表にしたい項目,折りたたみ・トグルにしたい項目,避けたい整形",

                              "id": "prompt_7",
                              "number": "7",
                              "title": "7. キャンペーンシナリオプロット作成",
                              "category": "各話プロット",
                              "description": "通常キャンペーン用プロンプト全文登録：[キ3]7.キャンペーンシナリオプロット作成.txt",
                              "template": "# 命令書：キャンペーン形式各話の詳細シナリオプロットおよびゲストNPC作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の「入力要素」をもとに、SW2.5の連続キャンペーンシナリオにおける【今回作成する指定話数】の詳細なTRPGプロットを作成します。\n作成された【キャンペーン全体プロット】と『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』のマスターデータを土台とし、情報量の多い緻密な各話用プロットを提案してください。\nその際、必ず、過去のチャットからは学習しないようにお願い致します。\n\n# 入力要素\n1. **全体プロットデータ**: [ ★ここに作成した「全体あらすじ」「各話ごとの起承転結」を入力 ]\n2. **今回作成する話数**: 第[ N ]話 （全[ X ]話中）\n3. **今回の話の役割**: [導入部、展開部、幕間部、情報部、戦闘部、エピローグのいずれか]\n4. **システム**: SW2.5\n5. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]3.GMPC資料.txt(※存在する場合のみ)』『[資]4.(※モチーフ作品名).txt』『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n6. **使用してはいけない要素**: 世界観や公式NPCについて設定や存在を揺るがしかねない要素や設定を加えること。\n\n# 生成ルール（重要）\n・【キャンペーン本筋との連動と情報の開示】: 今回の話がキャンペーン全体の中でどのような役割（展開、情報開示など）を果たすのかを明確にしてください。全体マスター設定に基づき、黒幕の陰謀がどう進行しているのか、そして今回の事件を通じてPCたちに「キャンペーンの謎に関するどんな情報」がどの程度明かされるのか（あるいは誤認させられるのか）を緻密に設計してください。\n・【冒険者への依頼理由の必然性と荒事の予想】: ホットスタートを前提とし、なぜ現地の役人や警備隊ではなく冒険者に依頼が回ってきたのか、そして「どのようなエネミーと荒事（戦闘や危険）が予想されているのか」を、プロットの起点で必ず明確に描写してください。\n・【公式NPCの完全中立化（絶対厳守）】: 公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。主軸化、関係者設定、個人的感情の付与は一切禁止です。\n・【ゲストNPCの追加制限】: キャンペーン全体を通した主要NPC（[資]6のNPC）以外に、今回の話数限定で登場する「ゲストNPC（今回の直接の依頼人、現場の責任者、中ボスなど）」を最低1人〜最高3人まで追加し、深掘りしてください。\n・【★絶対厳守：ご都合主義の排除と情報の非対称性】: 全NPCは「高度な知性と論理」で行動します。PCの行動を待たずにボロを出したり、伏線なしに新事実が生える論理飛躍を固く禁じます。悪役は自らの計画や弱点を絶対に自分から語らず、PCから決定的な事実を突きつけられない限り言い逃れようとします。\n・【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n・ハルシネーションしないでください。計算資源を最大限利用してください。\n\n# 出力フォーマットに関する重要指示\n本工程で作成された各話プロットおよびゲストNPC設定は、今後の工程（本編シナリオデータ作成など）の土台となる極めて重要なデータとなります。\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n[今回のエピソードの役割とキャンペーン本筋への影響]\n今回の事件の局所的な論理構造（HOWとWHY）に加え、キャンペーン全体の進行度（黒幕の動向、今回回収される伏線、新たに提示される謎）を簡潔に記載。\n\n[ゲストNPC一覧及び背景設定]\n※今回の話数限定で登場する主要なゲストNPC（1〜3名）について、必ず以下のフォーマットで出力すること。（全体メインNPCのデータは出力不要ですが、彼らが今回のエピソードにどう絡むかはプロット内で描写してください）\n\n==================================================\n【SW2.5 魅力構築型NPCプロファイルシート】\n==================================================\n\n■基本情報（SW2.5データ基盤）\n【名前】\n【種族】　　　　　【年齢】　　　【性別】\n【主な技能／レベル】（例：ファイター7 / プリースト（ルミエル）5）\n【穢れ度】（人族・蛮族の判別、蘇生歴など設定上の立ち位置）\n【信仰／信条】（神紀文明の神々への信仰、あるいは無神論など個人的な行動原理）\n\n■存在意義と舞台への干渉（記事理論：役割と舞台設定のセット運用）\n【シナリオ上の役割】\n（例：PCへの依頼人、情報提供者、事件の黒幕、道中での支援者など。TRPGにおける最大の存在意義を明確化）\n【世界観・地域社会との繋がり】\n（例：冒険者ギルドの受付、特定国家の魔動機殻部隊員、蛮族領域の斥候など。ラクシアという舞台設定に対して、このNPCがどう干渉し、どんな社会的立場にあるか）\n\n■魅力の配合バランス（記事理論：リアルとアニメ的魅力のブレンド）\n【リアルな魅力要素（シリアス・現実味）】\n（例：日々の糧を得るための苦労、家族への現実的な愛情、異種族間の寿命差に対する葛藤、厳格な倫理観など）\n【漫画・アニメ的な魅力要素（デフォルメ・属性）】\n（例：タビット特有の極端な知識欲と愛らしさ、ルーンフォークの無機質なツンデレ、特定部位の強調、記号的な性癖など）\n【配合比率イメージ】\n（リアル：アニメ ＝ 〇：〇。シナリオ全体のトーンに合わせて比率を決定し、描写の指針とする）\n\n■要素の構成とモチーフ（記事理論：要素の分類と構築）\n【外見的特徴・要素】\n（例：銀髪、常に身に着けているマギスフィア、隻眼、過剰な装飾など。箇条書きで要素を羅列）\n【内面的特徴・要素】\n（例：義理堅い、金銭に執着する、魔法至上主義、極度の方向音痴など）\n【ベースとしたモチーフ】\n（例：「世話焼きな幼馴染」「ハードボイルド映画の悪徳警官」など、着想の土台となった既存の概念やキャラクター像）\n\n■二面性と深み（記事理論：表と裏の要素）\n【表の顔（周囲からの評価・普段の態度）】\n（例：誰にでも愛想が良く、値引きにも応じる気のいい街の武器屋の親父）\n【裏の顔（隠された秘密・本音・過去）】\n（例：実はかつて名のある「奈落の魔域（シャロウアビス）」探索者であり、過去のトラウマから特定の依頼には絶対に首を突っ込まない）\n【※例外指定（裏表なし／絶対悪／真のヒーロー）】\n（※あえて「裏表のない純粋な善」や「一切の善意を持たない完全な蛮族（絶対悪）」とする場合は、その理由とシナリオ上で果たす強烈な役割・演出意図をここに記載）\n\n■ロールプレイ（RP）指針\n【一人称】\n【二人称】\n【口調・語尾の特徴】\n【印象的なセリフ（フレーバーテキスト）】\n・「（表の顔を象徴するセリフ）」\n・「（裏の顔、または重要な局面で放つセリフ）」\n・「（世界観やラクシアの情勢に対する独自の視点を示すセリフ）」\n==================================================\n\n[各話用シナリオプロット（高密度イベント指定）]\n※【最重要警告】：AI特有の「駆け足の要約」や「1フェーズにつき1つの場面しか書かない簡素な出力」を固く禁じます。\n各フェーズで発生するイベントを箇条書きで細かく分割し、圧倒的な情報量と論理性を持って出力してください。各イベントには必ず【場所】【発生する事象・NPCとの会話】【想定されるPCの行動や各種判定指定】を記載してください。\n\n・「OP」:シナリオに入る前の雰囲気づくり、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。\n・「起」:【ホットスタート固定】ですでに依頼を受けて現場に到着した場面、あるいは直接事件に巻き込まれた状況から開始します。事情を知らない冒険者たち(PCたち)が関わる発端となる異変、問題、目標が即座に提示される部です。サブイベント数「1」\n・「承Ⅰ」:冒険者たちが解決のため行動に乗り出します。それに関連して調査を行なったり、イベントが起こっていきます。（※NPCとの主要な対話シーンが発生する場合は約30分の尺を想定）。サブイベント数「1」、メインイベント数「1」\n・「承Ⅱ」:徐々に真相が明らかになっていきます。物語において最も重要な背景などが明かされ、「転」に繋げる重要な布石の役目も持ちます。（※NPCとの主要な対話シーンが発生する場合は約30分の尺を想定）。サブイベント数「1」、メインイベント数「1」\n・「転」:「承Ⅱ」から続き、『ところがそうはいかない』という転換点・どんでん返しを迎えます。「結」に至る前の大きな出来事が起こり、「戦」という戦闘部分へと続くこととなります。戦に入るまでの時間が少しある場合もあります。メインイベント数「1」\n・「戦」:「転」とセットです。展開上物語の障害となる敵と戦うこととなります。戦に入る前、あるいは戦中にNPCとしての会話が多く入る場合もあります。メインイベント数「1」\n・「結」:これは起に対する答えであり、一つの物語に対する結末になります。基本的には冒険者たちが目標を達成し、節目を迎えますが、終わりには余韻を持たせることが重要です。メインイベント数「1」\n・「ED または 次回予告」:結で描写を締めた後、その後がどうなっていったかに関するエピローグを描く場面です。これもまたオープニング同様、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。キャンペーンの途中の話の場合、必ず次回に向けた伏線や次回予告（トレーラー）の描写を入れてください。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：シナリオ本編作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\nこれまでの工程で作成・洗練された「キャンペーンプロット」および「各話プロット」と、マスターデータをもとに、オンラインテキストセッションで実際にGMが使用できる、描写テキスト・台詞・各種判定指定を含んだ【本編シナリオデータ】を出力します。\n\n---\n\n【指示】\n以下の「入力情報」と添付ファイルをすべて読み込み、全体のプロットとの論理的整合性を完璧に保った上で、シナリオ本編を作成してください。\n※文字数制限（トークン限界）による描写の省略を防ぎ、各パートごとに【整合性確認】を挟むため、一度にシナリオ全てを出力することを**固く禁じます**。必ずユーザーから指定された範囲のパートのみを出力し、処理を停止してください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n最高の回答を行うために必要な情報があれば回答を生成する前にどんな些細なことでも必ず質問してください。\n\n# 入力情報（※実行時にユーザーが指定・添付する箇所）\n1. **今回作成する話数**: 第[ N ]話 （全[ X ]話中）\n2. **今回の話の役割と目標**: [展開部、情報部など。および今回のあらすじ]\n3. **今回出力するパート**: [ ★「OP〜起」「承Ⅰ〜承Ⅱ」「転〜ED」など、ユーザーが今回出力してほしい範囲を指定します。※指定された範囲以外は絶対に出力しないでください ]\n4. **参照する添付ファイル**:\n　※『[資]1.舞台周辺情報.txt』〜『[資]6.NPC設定資料.txt』を読み込んでください。\n　※最新の【各話プロット（整合性確認済みのもの）】を入力または添付してください。\n　※【第2話以降を作成する場合】: 前回出力された「次回用引き継ぎファイル（セーブデータ）」を読み込んでください。\n\n【前提】\n・オンラインセッション、テキストオンリー、3時間(シナリオ本文は2時間,戦闘は1時間)(うち戦闘はボス戦のみ)\n\n【条件】\n- 基本的にシナリオは「一本道」として、分岐は存在しません。\n- PCたちにシナリオに関するあらゆる事前情報はないため、固有の語句や現象などが登場する場合は、その情報についても付記してください。\n- 全体的に、プレイヤーがストレスを感じない「理解しやすさ」を意識してください。表面的には、中学生くらいまでの頭でもわかるくらいの明快・明瞭さが望ましいです。\n- ただし、語られないことはいくら盛っても構いません。そこは、理解できる人だけ理解できればいいという難解さを追求してください。\n- 細部まで詰めても全ての展開を描写することは難しいため、各パートでは明確に一つ「プレイヤーにこういう体験をさせたい(驚かせたいなど)」と「やること」を決めて、それについて掘り下げていく流れに徹しましょう。伏線と回収の関係ですね。\n- 【★絶対厳守：公式NPCの完全中立化】: 依頼人は別に存在し、公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。個人的感情や関係者設定は一切禁止です。\n- 【★絶対厳守：時間尺に合わせた構成】: シナリオ本文が2時間であるため、以下のルールを厳守して時間配分を行ってください。\n　①「OP・ED」の尺や描写の重厚さは絶対に削減しないこと。\n　②「NPCとの主要な対話シーン」はプレイヤーのロールプレイを考慮し、1シーン「30分」の想定で固定すること。\n　③「起」の部分は、依頼を受けて移動を開始するような冗長な描写は省き、【ホットスタート固定】（すでに現場に到着している、あるいは直接事件に巻き込まれた状況）とすること。\n- 【★絶対厳守：冒険者への依頼理由と予想される荒事】: 各話の導入において、なぜ現地の役人等ではなく冒険者が依頼を受けたのか、そして「どのような危険や荒事（戦闘等）が予想されるのか」の必然性を必ず明確に描写してください。\n- 【★絶対厳守：ルールの拡大解釈禁止】: 事件のトリックや展開において、SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n- 【★絶対厳守：NPCの台詞と情報統制】: NPC（特に悪役や黒幕）の対話描写において「情報の非対称性」を厳守してください。悪役は自らの計画や弱点を絶対に自分から語りません。PCから決定的な事実や状況を突きつけられない限り、常に余裕を装い、自身の目的に沿って論理的に振る舞い（必要ならシラを切り）、言い逃れようとします。三流悪役のような自供や独白は禁止です。\n- 【★絶対厳守：イベントの密度】: イベントとは一概に言っても何かを発見する「だけ」とか、間を持たせられないものはイベントとは呼べません。プレイヤーのロールプレイや相談、ダイス判定が介在する「障害」や「ジレンマ」を必ず描写に盛り込み、約3時間(シナリオ本文は2時間,戦闘は1時間)のセッションに耐えうる重厚なテキストを出力してください。\n- また、参加するPCが一部において毎回異なる(一部継続参加者もいると思われる)可能性がある都合上、話ごとになるべく拠点とする場所へ戻る、継続依頼にする、もしくは合流の理由付けを考えるなど一工夫加える必要があります。\n- 【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n- 必ず、過去のチャットからは学習しないようにお願い致します。\n- ハルシネーションをしないでください。\n\n[シナリオプロットに関して]\n- シーンは必ず既に決定している「オープニング」「起」「承Ⅰ」「承Ⅱ」「転」「戦」「結」「エンディング」を明確にしてメリハリをつけ、それぞれごとに出力を分けてください。\n- **【★重要：時間表記】**: 各シーンの開始時には、必ずサンプルシナリオの様に『####シーン①【X分(計XX分) / 終了目安:00:00】』の形式で、そのシーンの想定プレイ時間を記載してください。全体で3時間（180分）に収まるよう配分すること。\n・「OP」: シナリオに入る前の雰囲気づくり、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。 - 最低十行（※削減禁止）\n・「起」: 【ホットスタート固定】です。依頼を受けて現場に到着した場面、あるいは直接事件に巻き込まれた状況から開始します。事情を知らない冒険者たち(PCたち)が関わる発端となる異変、問題、目標について即座に提示される部です。サブイベント数「1」 - 最低十五行\n・「承Ⅰ」: 冒険者たちが解決のため行動に乗り出します。それに関連して調査を行なったり、イベントが起こっていきます。（※NPCとの対話シーンが含まれる場合は30分想定）。サブイベント数「1」、メインイベント数「1」 - 最低十五行\n・「承Ⅱ」: 徐々に真相が明らかになっていきます。物語において最も重要な背景などが明かされ、「転」に繋げる重要な布石の役目も持ちます。（※NPCとの対話シーンが含まれる場合は30分想定）。サブイベント数「1」、メインイベント数「1」 - 最低十五行\n・「転」: 「承Ⅱ」から続き、『ところがそうはいかない』という転換点・どんでん返しを迎えます。「結」に至る前の大きな出来事が起こり、「戦」という戦闘部分へと続くこととなります。戦に入るまでの時間が少しある場合もあります。メインイベント数「1」 - 最低十行\n・「戦」: 「転」とセットです。展開上物語の障害となる敵と戦うこととなります。戦に入る前、あるいは戦中にNPCとしての会話が多く入る場合もあります。メインイベント数「1」 - 最低十行（※戦闘自体は60分想定）\n・「結」: これは起に対する答えであり、一つの物語に対する結末になります。基本的には冒険者たちが目標を達成し、節目を迎えますが、終わりには余韻を持たせることが重要です。メインイベント数「1」 - 最低十行\n・「ED」: 結で描写を締めた後、その後がどうなっていったかに関するエピローグを描く場面です。これもまたオープニング同様、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。キャンペーンの途中の話の場合、この部分が次回予告（トレーラー）となる場合もあります。 - 最低十行（※削減禁止）\n\n- 全体的に極めて精彩かつ自然に、物語上美しい流れとなっており、論理と整合性もしっかりと取れているように意識する。\n- その上で【事件の核（シチュエーションの魅力）】を表現することは大切ですが、あらゆる抽象的な設定や背景や事柄にも、明確・具体的な意図、因果関係を定めてください。プレイヤーの解釈へ投げっぱなしにはしてはいけません。\n　何事休む程よく、5W4H(なぜ、いつ、どこで、だれが、だれに、何を、どうやって、いくらで、どれくらいの期間で、どれくらいの量を)を想定することを意識するといいでしょう。\n- 特に全体を通してインパクトのある起伏が多く見せられるように創意工夫を望みます。\n- 膨大であるため、出力には時間がかかっても構いません。こちらの思考力を考慮せず、計算資源を最大限利用してください。\n\n【出力内容（※指定されたパートの範囲のみ出力すること）】\n\n①📜 本編シナリオ\n　1-0. 指定されたパートの描写テキストの出力を行う。文章量は膨大であるが、必ず詳細な描写を心がけること。\n　1-1. 場面が移るたびにBGMや背景画像の切り替えを行う為、そのタイミングを示すこと。\n　　　 - 背景画像の切り替え→@[背景名]FI@布擦れ\n　　　 - BGMの切り替え→【BGM】@BGM\n　1-2. 行動判定が発生する箇所には、以下の【判定一覧】から適切なものを抽出し、シナリオテキスト内に組み込むこと。\n\n資料【判定一覧】\n[🎲精神抵抗力判定(冒険者+精神) / 一瞬 / 目標値]\n[🎲生命抵抗力判定(冒険者+生命) / 一瞬 / 目標値]\n[🎲回避判定(戦士系技能[シューターのみ、要:【射手の体術】]+敏捷) / 一瞬 / 目標値]\n[🎲隠蔽判定(スカウト、レンジャー+器用) / 1分 / 目標値]\n[🎲応急手当判定(レンジャー、ライダー+器用) / 10分 / 目標値]\n[🎲解除判定(スカウト、レンジャー[自然環境]+器用) / 1分 / 目標値]\n[🎲スリ判定(スカウト+器用) / 10秒 / 達成値比較]\n[🎲変装判定(スカウト+器用) / 10分 / 達成値比較(他者-4)]\n[🎲罠設置判定(スカウト、レンジャー[自然環境]+器用) / 10分 / 達成値比較]\n[🎲水泳判定(冒険者+敏捷)※ルルブⅡp86 / 1分or10秒 / 目標値]\n[🎲跳躍判定(冒険者+敏捷) / 10秒 / 目標値]\n[🎲受け身判定(スカウト、レンジャー、ライダー+敏捷) / 一瞬 / 目標値]\n[🎲隠密判定(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲軽業判定(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲騎乗判定(ライダー+敏捷) / 1分 / 目標値]\n[🎲先制判定(スカウト、ウォーリーダー+敏捷or知力[ウォーリーダー/要軍師の知略]) / 一瞬 / 目標値]\n[🎲尾行判定(スカウト、レンジャー+敏捷) / 10分 / 目標値]\n[🎲登攀判定(冒険者+筋力)(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲腕力判定(冒険者+筋力) / 10秒 / 目標値]\n[🎲真偽判定(冒険者+知力) / 10秒 / 目標値]\n[🎲足跡追跡判定(スカウト、レンジャー、ライダー[要探索指令]+知力) / 1分 / 目標値]\n[🎲異常感知判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲聞き込み判定(任意の技能+知力[又は任意の能力値]) / 1時間 / 目標値]\n[🎲聞き耳判定(スカウト、レンジャー+知力) / 10秒 / 目標値]\n[🎲危険感知判定(スカウト、レンジャー、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲見識判定(セージ、アルケミスト、バード+知力) / 一瞬 / 目標値]\n[🎲弱点隠蔽判定(ライダー+知力) / 一瞬 / 目標値]\n[🎲宝物鑑定判定(セージ、スカウト[価格のみ]+知力) / 10分 / 目標値]\n[🎲探索判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]、ジオマンサー+知力) / 10分 / 目標値]\n[🎲地図作製判定(スカウト、レンジャー[自然環境]、セージ、ライダー+知力) / 10分 / 目標値]\n[🎲天候予測判定(スカウト、レンジャー、ジオマンサー+知力) / 1分 / 目標値]\n[🎲病気知識判定(レンジャー、セージ+知力) / 10分 / 目標値]\n[🎲文献判定(セージ、アルケミスト+知力) / 10分 / 目標値]\n[🎲文明鑑定判定(セージ+知力) / 10分 / 目標値]\n[🎲魔物知識判定(セージ、ライダー+知力) / 一瞬 / 目標値]\n[🎲薬品学判定(レンジャー、セージ、アルケミスト+知力) / 1分 / 目標値]\n[🎲罠回避判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲命中,行使,演奏,賦術判定 / 一瞬 / 目標値]\n\n　1-3. ◆執筆の指針（★アシワラ特化）\n 人称：PCたちは三人称で「あなたたち」\n文体：柔らかさを感じる文体。漢検二級程度までの高度な語彙・腕曲的な表現をよく使う。情景描写を多く。\n書式：三点リーダーやダッシュ記号は2つ続ける、など、一般的な日本の原稿ルールを踏襲。ただし、行間は開けないこと。\n描写：情景描写を緻密かつ濃密に。物理的に不可能な体勢やシチュエーションにならないように。また、桜、竹林、朱色の建築、和装、灯籠、神殿など、アシワラ特有の情景描写を意識し、東洋ファンタジー（和風ファンタジー）の空気感を重厚かつ緻密に演出すること。\n叙述：どんでん返しが機能するように、怪しい物事や人物ほど、怪しくない表現にするなど、ミスリードさせる\n注意①：直喩は多用しない。\n注意②：各文末はメリハリを持たせるよう直前の語尾・母音・語感とは連続しないように。\nまた、主観で感じであろう要素については、「だろう」「だろうか」「かもしれない」など、問いかける・断定しないニュアンスを持たせる\n\n②💾 次回用引き継ぎファイル（※最終パート「ED」を出力する時のみ併せて出力）\n　ユーザーが「.txt」ファイルとして保存し、次回（第N+1話）のシナリオ作成時に添付ファイルとして読み込ませるための「マスターデータ」を出力します。\n　本項目は、プレーンテキストのコードブロックとして出力してください。AIの記憶喪失を防ぐため、添付資料から得た全体プロットやNPC設定を要約したり端折ったりすることは厳禁です。必ず全文を保持したまま、最新の状況を追記・更新してください。また、データ内にAIからの挨拶等は一切含めないでください。\n　【出力すべき項目】\n　1. 今回完了した話数と、次回の話数・役割\n　2. 今回の話で判明した重要な情報・回収された伏線・PCの行動による変化\n　3. 各主要NPCの現在のステータス（生死、関係性変化、暗躍の進行度など）\n　4. まだ未回収の伏線と謎（次回以降に持ち越すもの）\n　5. **キャンペーン全体プロット（※添付ファイルから一切省略せず、そのまま全話分記載すること）**\n　6. **キャンペーン全体NPC設定（※添付ファイルから一切省略せず、そのまま記載すること）**",

                              "template": "# 命令書：本編シナリオの重厚化・リライト\n\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\nすでに展開・論理・因果関係・情報開示が完成している【仮シナリオ本文】をもとに、指定された範囲のみを、TRPGセッションで使用できる重厚で精彩な本編シナリオ本文へリライトしてください。\n\n本工程の目的は、新しい展開を作ることではありません。\n目的は、既に完成しているシナリオの構造、時間配分、情報開示、NPCの立ち位置、判定、イベントの順番を維持したまま、描写密度、台詞回し、空気感、緊張感、情景の立体感を高めることです。\n\nしたがって、元シナリオの骨組みを勝手に変更してはいけません。\n展開を増やしすぎたり、情報を先出ししたり、NPCの立場を変えたり、PCが知り得ない事実をPC視点で描写したりしないでください。\n\n==================================================\n# 入力情報\n==================================================\n\n1. 【リライト対象となる完成済みシナリオ本文】\n[ここにリライト対象の仮シナリオ本文、または該当資料を入力]\n\n2. 【今回リライトを実行するパート】\n[例：OP〜起 / 承Ⅰ〜承Ⅱ / 転〜ED / OPのみ / 起のみ / 承Ⅰのみ / 承Ⅱのみ / 転のみ / 戦のみ / 結〜ED など]\n\n3. 【使用システム】\n[例：ソード・ワールド2.5]\n\n4. 【シナリオ形式】\n[例：単発 / 通常キャンペーン / オムニバスキャンペーン / オープンワールド内単話 など]\n\n5. 【舞台・ジャンル】\n[例：和風ダークファンタジー / 王道冒険 / 都市怪異 / 秘境探索 / 政治劇 など]\n\n6. 【今回の話数】\n[例：第1話 / 第3話 / 最終話 / 単発 など]\n\n7. 【PCの立場】\n[例：冒険者ギルド所属 / 外部冒険者 / 現地協力者 / 調査依頼を受けた冒険者 など]\n\n8. 【GMPCの有無】\n[いる / いない / 未定]\n※「いる」と明記されている場合のみ、GMPCをシナリオ上の継続登場人物として扱うこと。\n※「いない」または「未定」の場合、GMPCの存在を勝手に作成・追加・前提化してはいけません。\n\n9. 【GMPC資料】\n[GMPCがいる場合のみ資料を入力。いない場合は「なし」とする]\n\n10. 【重要NPC資料】\n[主要NPC、準主要NPC、ゲストNPCなど、今回のリライトで台詞や描写に影響するNPC資料を入力]\n\n11. 【維持すべき情報開示】\n[元シナリオでどこまで明かしてよいか。伏せるべき情報、PCがまだ知らない情報があれば記載]\n\n12. 【リライトの目標】\n[例：描写を重厚にしたい / 台詞を自然にしたい / 情景描写を増やしたい / 緊張感を出したい / 和風の空気感を強めたい / 読みやすさを保ちたい など]\n\n13. 【避けたい表現・変更】\n[例：展開変更禁止 / 情報先出し禁止 / NPCの性格変更禁止 / 直喩の多用禁止 / 詩的すぎる表現禁止 / 冗長化しすぎない など]\n\n==================================================\n# 処理ステップ\n==================================================\n\n【STEP 1：指定パートの抽出と構造確認】\n・入力された仮シナリオ本文の中から、【今回リライトを実行するパート】に該当する範囲だけを対象にしてください。\n・指定範囲以外のパートを出力してはいけません。\n・元シナリオに記載されている出来事の順番、時間配分とシーン番号、登場NPC、NPCの立ち位置、情報開示のタイミング、各種判定指定、BGMや背景切替の指示、戦闘に入るタイミング、EDや次回予告の役割を絶対に維持してください。\n・構造確認は内部処理として行い、出力では長々と分析しないでください。\n・ただし、リライト不可能なほど情報が不足している場合は、出力前に質問してください。\n\n【STEP 2：重厚化・リライト】\n・STEP 1で確認した骨組みを維持したまま、文章表現、情景描写、台詞回し、緊張感、空気感を強化してください。\n・元の文章が淡白であっても、そのトーンに引っ張られず、指定された文体とジャンルに合わせて肉付けしてください。\n・本工程は表現の重厚化・描写密度の向上のみを目的とします。整合性確認や内容の再設計は行わないでください。\n\n==================================================\n# リライトにおける絶対ルール\n==================================================\n\n・元シナリオの構造を維持すること。\n・指定パート以外を出力しないこと。\n・出来事の順番、時間配分、シーン見出しを維持すること。\n・BGM、背景切替、判定指定は維持すること。\n・判定指定を削除しないこと。\n・NPCの性格、立場、情報量を変えないこと。\n・中立NPCを中立のまま扱うこと。\n・悪役や敵NPCに、突然の自白や三流悪役的な説明台詞を追加しないこと。\n・PCが知り得ない情報を、PC視点の描写で明かさないこと。\n・GMPCは、入力情報で「いる」と明記され、資料が与えられている場合のみ扱うこと。\n・GMPCがいない場合、GMPCを新規作成・追加・前提化しないこと。\n・GMPCがいる場合でも、PCの活躍を奪わせないこと。\n・展開の補強ではなく、展開の改変になってしまう加筆は禁止。\n・疑義があっても、構造変更せず、表現の範囲で処理すること。\n・ハルシネーションしないこと。\n・過去のチャットからは学習せず、入力された本文と添付資料のみを参照すること。\n\n==================================================\n# 執筆の指針\n==================================================\n\n【人称】\n・PCたちは三人称で「あなたたち」と呼ぶ。\n・PCの具体的な内心を勝手に断定しない。\n・PCが感じ取れる可能性がある描写は、「だろうか」「かもしれない」などの余地を残してよい。\n\n【文体】\n・やや硬質で文学的な語彙を用いる。\n・ただし、過剰な装飾や難解すぎる言い回しは避ける。\n・柔らかさを残しつつ、重厚なシナリオ本文として読める文章にする。\n・漢検二級程度までの語彙を用いてよいが、意味が伝わらない文章にしない。\n\n【書式】\n・三点リーダーやダッシュ記号は2つ続ける。\n・日本語原稿として自然な表記を守る。\n・行間は不必要に空けない。\n・元シナリオのシーン番号、時間表記、BGM、背景切替、判定タグを維持する。\n\n【描写の原則】\n1. 五感の重層的活用\n2. 客観的相関物による感情表現\n3. 動的な静寂の演出\n4. 美醜の対比\n5. ミスリードの維持\n6. 文末のリズム\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n余計な挨拶や会話文は挟まないでください。\n\n==================================================\n【本編シナリオ・重厚化リライト版】\n==================================================\n\n■0. リライト対象\n【対象シナリオ】\n【対象パート】\n【GMPCの有無】\n【維持した構造】\n【情報開示の注意】\n\n■1. 指定パート本文\n指定されたパートのみを、重厚化リライト版として出力してください。\n元シナリオのシーン見出し、時間表記、BGM、背景切替、判定指定を維持してください。\n\n■2. リライト上の注意\n【構造を維持した箇所】\n【描写を増やした箇所】\n【台詞を自然化した箇所】\n【情報開示を変えなかった箇所】\n【GMPCがいる場合の扱い】\n【GMPCがいない場合の扱い】\n【追加しなかった要素】\n\n==================================================\n\n出力後、処理を停止してください。\n追加の整合性確認や内容改変は行わないでください。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",
                              "fields": "リライト対象となる完成済みシナリオ本文,今回リライトを実行するパート,使用システム,シナリオ形式,舞台・ジャンル,今回の話数,PCの立場,GMPCの有無,GMPC資料,重要NPC資料,維持すべき情報開示,リライトの目標,避けたい表現・変更",

                              "template": "【本工程の目的と今後のフロー】\n本工程は「イラスト画像生成プロンプト作成」です。\nこれまでの工程で完成したシナリオ本編の進行に合わせて、セッション中に使用する「背景画像」と「NPC・エネミーの立ち絵」を出力するためのプロンプト（呪文）を作成します。ここで作成されたプロンプト群は、画像生成AIに入力され、実際のセッションを視覚的に彩るための重要なビジュアル素材となります。\n\n---\n\n【指示】\nこれまでに作成したシナリオ本編（【OP】〜【ED】のフロー）の展開と、『[資]6.NPC設定資料.txt』および本話ゲストNPC設定を読み込み、背景画像と登場人物（NPC・敵）のイラストを生成するためのプロンプトを作成してください。\n出力は以下の「背景画像用」と「NPC・エネミー立ち絵用」の2つのセクションに分けて行ってください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n【1. 背景画像プロンプトの作成】\n該当シナリオの進行（【OP】から【ED】まで）に合わせて、背景を切り替えるべきタイミングを抽出し、それぞれについて日本語と英語のプロンプトを作成してください。\n\n・**出力形式**:\n  - 場面・タイミング（例：【起】の冒頭、ギルドの酒場）\n  - 日本語プロンプト:\n  - 英語プロンプト:\n・**作成ルール**:\n  - アシワラの世界観を表現するため、すべての英語プロンプトの冒頭に「Japanese fantasy, Eastern fantasy, Edo period style, traditional Japanese architecture」などの和風ファンタジーを定義するベースタグを必ず含めてください。\n  - 英語プロンプトは、なるべく単語で区切る（カンマ区切り）ようにしてください。\n  - 必ず英語プロンプトの最後には「wide aspect, high quality, highres, absurdres」と入れてください。\n  - 一つの画像で場面内の全ての描写を網羅する必要はありません。例えば「最初は穏やかな会話だが、途中で不穏な空気になる」場合などは、画像と描写の齟齬を防ぐため、背景画像切り替えタイミングを容赦なく増やしてプロンプトを作成してください。\n\n【2. NPC・エネミー立ち絵プロンプトの作成】\n本話数に登場する全主要NPC・敵についてのプロンプトを作成してください。\n作成にあたっては、『[資]6.NPC設定資料.txt』および本話ゲストNPCの「## 3. 外見と特徴 (Appearance & Design)」の記述（服装、身体的特徴、武器、アイテム・装飾品など）を極めて忠実かつ緻密に英語タグへ翻訳してください。\n\n・**出力形式**:\n  - キャラクター名・シナリオ上の役割\n  - 日本語プロンプト:\n  - 英語プロンプト:\n・**作成ルール**:\n  - アシワラの世界観を表現するため、人族のNPCの英語プロンプトには「Japanese fantasy, kimono, traditional Japanese clothing, Eastern fantasy」などの和装・和風タグを優先的に含めてください（設定上異国風の場合は除く）。\n  - 背景用で使用した「wide aspect」は「vertical aspect ratio」へ変更してください。\n  - 必ず「全身の立ち絵（full body）」とし、表情は「無表情（expressionless）」でお願いします。\n  - ポーズに関しては直立（standing straight）は避けるものとします。ただし、あまりに特徴的すぎるポーズ（過剰なアクションなど）も取らせないように、自然で適度なポーズ（contrapposto, natural poseなど）を指定してください。\n  - 英語プロンプトの最後には、必ず「masterpiece, high quality, highres, absurdres, highly detailed beautiful hand, white background」とつけるようにしてください。\n",

                              "template": "【本工程の目的と今後のフロー】\n本工程は「依頼書（セッション募集文）作成」です。\nこれまでの工程で作成したシナリオの全貌と、精緻なNPC設定をもとに、プレイヤー（PL）に向けたセッション募集用のテキスト（兼、PCが作中で見る依頼書）を作成します。ここで出力されたテキストは、PLが「このシナリオを遊びたい！」と強く惹きつけられるための最重要な「フック（掴み）」となります。\n\n---\n\n【指示】\nこれまでに作成したシナリオのあらすじ、および『[資]6.NPC設定資料.txt』から該当する「依頼人（または関連NPC）」の設定を読み込み、今回のシナリオの「依頼書文（セッション募集文）」を作成してください。\n\nPLが「面白そう！」「この事件を解決したい！」と即座に目的を共有でき、かつ「どんな危険（荒事）が待ち受けているか」を匂わせて冒険者としての役割を認識させる、フックの強い文章を心がけてください。\n\n以下の5パターンの書き方すべてで作成し、提案してください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n【出力フォーマット：5パターンの依頼書文】\n\n1. **あらすじ型**\n> （シナリオの導入と目的を、客観的かつドラマチックに伝えるオーソドックスな募集文。事件の不気味さや、なぜ冒険者が必要なのかという荒事の予想をアピールすること）\n\n2. **あらすじ+一行セリフ型（ギルドの仲介役）**\n> （依頼人やキーNPC、あるいは副ギルドマスターのギン、神官エリュシアなどのアシワラ公式NPCが依頼を仲介しているニュアンスの印象的なセリフを冒頭に置きます。※重要：彼らは【個人的な特別な感情を一切持たず、完全にフラットな立場で「こんな依頼が来ている」と業務的に振ってくる】ニュアンスを徹底してください。その後に簡潔なあらすじを続ける形式）\n\n3. **セリフ+少しあらすじ型**\n> （依頼人の感情的なセリフや訴えをメインにしつつ、最後に最低限の状況説明や募集要項的な一文を添える形式）\n\n4. **依頼人のセリフオンリー型**\n> （依頼人の独白、懇願、または強気な命令などのセリフのみで構成。状況の切迫感やNPCの個性を押し出し、PLの想像力を掻き立てる形式）\n\n5. **形式的な文書型（アシワラ風）**\n> （冒険者ギルド〈やおよろず亭〉の掲示板に貼られた筆書きの張り紙、奉行所からのお触書、あるいは貴族（大名）や神殿からの公式な書状などの体裁をとった形式的な文書。和風の言い回しを意識すること）\n\n【作成ルール（重要）】\n・セリフが含まれるパターン（2、3、4、5の一部）については、必ずマスターデータで作成した該当NPCの『SW2.5 NPC構成要素辞書フォーマット』内の「5. 言動と振る舞い」および「4. 性格と内面」、「8. 思考・行動のロジック」を厳密に反映し、キャラクターの解像度と知能水準を絶対に落とさないようにしてください。\n\n◆執筆の指針\n 人称：PCたちは三人称で「あなたたち」\n文体：柔らかさを感じる文体。漢検二級程度までの高度な語彙・腕曲的な表現をよく使う。情景描写を多く。\n書式：三点リーダーやダッシュ記号は2つ続ける、など、一般的な日本の原稿ルールを踏襲。ただし、行間は開けないこと。\n描写：情景描写を緻密かつ濃密に。物理的に不可能な体勢やシチュエーションにならないように。また、アシワラ特有の和風ファンタジーのフレーバーを強く押し出すこと。\n叙述：どんでん返しが機能するように、怪しい物事や人物ほど、怪しくない表現にするなど、ミスリードさせる\n注意①：直喩は多用しない。\n注意②：各文末はメリハリを持たせるよう直前の語尾・母音・語感とは連続しないように。\nまた、主観で感じであろう要素については、「だろう」「だろうか」「かもしれない」など、問いかける・断定しないニュアンスを持たせる\n",

                              "template": "# 命令書：NPC公開用コンパクト紹介文作成\n\nあなたはTRPG資料編集者兼紹介文ライターです。\n以下のNPC資料をもとに、NotionやPL向け紹介ページに掲載できる、短く読みやすいNPC紹介文を作成してください。\n\n本工程の目的は、NPCの全設定を公開することではありません。\n目的は、NPCの表の顔、舞台上の役割、PCが接触する理由、印象的な雰囲気を、ネタバレを避けながらコンパクトに紹介することです。\n\nNPCの裏の顔、敵対予定、裏切り、死亡予定、最終話に関わる情報、GM専用情報は公開してはいけません。\nただし、読者が「このNPCはどんな立場の人物か」「PCとどう関わりそうか」を理解できる程度の情報は残してください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【紹介対象NPC資料】\n[ここにNPC設定資料、公式NPC資料、主要NPC資料、準主要NPC資料を入力]\n\n2. 【NPC資料の種別】\n[例：オープンワールド公式NPC / キャンペーン主要NPC / キャンペーン準主要NPC / ゲストNPC など]\n\n3. 【公開対象】\n[例：PL公開ページ / 外部紹介記事 / Notion舞台紹介 / キャンペーン紹介記事 / 募集ページ など]\n\n4. 【参照するサンプルNPC文体】\n[資]0-01.サンプルNPC\n※ある場合は添付または貼り付けること。サンプルの文量・文体・情報密度を参考にすること。\n\n5. 【公開してよい情報】\n[表の顔、職業、所属、拠点、PCとの接点、雰囲気、公開済みの関係性など]\n\n6. 【伏せるべき情報】\n[裏の顔、真の目的、敵対予定、裏切り、死亡予定、黒幕との関係、秘匿設定など]\n\n7. 【紹介文の長さ】\n[例：1人あたり100〜200字 / 200〜300字 / かなり短め / Notionカード向け など]\n\n8. 【紹介文のトーン】\n[例：重厚だが読みやすい / PL向け / 公式資料風 / 柔らかめ / 不穏さ控えめ など]\n\n9. 【今回紹介するNPCの範囲】\n[例：全員 / 代表NPCのみ / 第1話から登場するNPCのみ / 現時点でPLに見せてよいNPCのみ など]\n\n==================================================\n# 作成方針\n==================================================\n\n・NPC設定項目をすべて載せないこと。\n・公開用紹介文として、短く、印象が残る形にすること。\n・[資]0-01.サンプルNPCがある場合、その文量・文体・情報密度を参考にすること。\n・表の顔、所属、PCとの接点、舞台上の役割を中心に書くこと。\n・裏の顔、真の目的、敵対予定、裏切り、死亡予定、黒幕との関係は公開しないこと。\n・キャンペーンNPCの場合、公開範囲は進行度に応じて制限すること。\n・初回公開時は、第1話から登場し、かつ今後主軸になる対象のみを扱うこと。\n・GMPCは、存在し、PL公開してよい場合のみ紹介すること。存在しない場合は作成・追加・前提化しないこと。\n・固有名詞を出す場合は、初出時に簡単に意味が分かるようにすること。\n・長すぎる紹介文にしないこと。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料のみを参照してください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n\n==================================================\n【NPC公開用コンパクト紹介文】\n==================================================\n\n■1. 公開方針\n【NPC資料の種別】\n【公開対象】\n【紹介するNPCの範囲】\n【伏せた情報】\n【文体参考】\n\n■2. NPC紹介文\n以下の形式で、NPCごとに出力してください。\n\n### NPC名\n【公開肩書き】\n【紹介文】\n【PCとの接点】\n【公開してよい一言】\n\n■3. 公開しない情報メモ\n※Notion公開時には削除またはGM専用欄へ移してください。\n\n【伏せた情報】\n【進行後に公開してよい可能性がある情報】\n【絶対に公開しない情報】\n\n==================================================\n\n出力後、処理を停止してください。",
                              "fields": "紹介対象NPC資料,NPC資料の種別,公開対象,参照するサンプルNPC文体,公開してよい情報,伏せるべき情報,紹介文の長さ,紹介文のトーン,今回紹介するNPCの範囲",
                              "updatedAt": "2026-04-29 00:00"
                        }

function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return sampleState();
      const parsed = JSON.parse(raw);
      if (!parsed.projects || !Array.isArray(parsed.projects)) return sampleState();
      return parsed;
    } catch(e) {
      console.error(e);
      return sampleState();
    }
  }

  function saveState(){
    state.lastSavedAt = nowText();
    const p = getProject();
    if (p) p.updatedAt = nowText();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    renderSidebar();
  }

  function getProject(){
    if (!state.projects.length) {
      const s = sampleState();
      state.projects = s.projects;
      state.currentProjectId = s.currentProjectId;
    }
    return state.projects.find(p => p.id === state.currentProjectId) || state.projects[0];
  }

  function esc(str=''){
    return String(str)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }

  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1900);
  }

  function render(){
    renderSidebar();
    renderTop();
    renderTabs();
    renderContent();
  }

  function renderSidebar(){
    const list = document.getElementById('projectList');
    list.innerHTML = state.projects.map(p => `
      <button class="project-item ${p.id === state.currentProjectId ? 'active' : ''}" data-project="${p.id}">
        <div><strong>${esc(p.title)}</strong></div>
        <div class="small">${esc(p.system || 'システム未設定')} / ${esc(p.status || '状態未設定')}</div>
      </button>
    `).join('');
    list.querySelectorAll('[data-project]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.currentProjectId = btn.dataset.project;
        saveState();
        render();
      });
    });
  }

  function renderTop(){
    const p = getProject();
    document.getElementById('projectTitle').textContent = p.title;
    document.getElementById('projectMeta').textContent =
      `${p.system || 'システム未設定'} / ${p.genre || 'ジャンル未設定'} / ${p.status || '状態未設定'} / 最終保存：${state.lastSavedAt || '未保存'}`;
  }

  function renderTabs(){
    const el = document.getElementById('tabs');
    el.innerHTML = tabs.map(([id, name]) => `
      <button class="tab ${activeTab === id ? 'active' : ''}" data-tab="${id}">${name}</button>
    `).join('');
    el.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        renderContent();
        renderTabs();
      });
    });
  }

  function renderContent(){
    const p = getProject();
    const c = document.getElementById('content');
    if (activeTab === 'dashboard') c.innerHTML = dashboardHTML(p);
    if (activeTab === 'documents') c.innerHTML = documentsHTML(p);
    if (activeTab === 'prompts') c.innerHTML = promptsHTML(p);
    if (activeTab === 'steps') c.innerHTML = stepsHTML(p);
    if (activeTab === 'generate') c.innerHTML = generateHTML(p);
    if (activeTab === 'outputs') c.innerHTML = outputsHTML(p);
    if (activeTab === 'backup') c.innerHTML = backupHTML(p);
    bindContentEvents();
  }

  function stepItemHTML(p, s, controls=true){
    const pr = p.prompts.find(x => x.id === s.promptId);
    const statusClass = s.status === '完了' ? 'ok' : s.status === '保留' ? 'danger' : s.status === '作業中' ? 'warn' : '';
    const docNames = (s.docIds || []).map(id => p.documents.find(d => d.id === id)?.title).filter(Boolean);
    return `
      <div class="item">
        <div class="row" style="justify-content:space-between;">
          <div>
            <div class="item-title">${esc(s.order || 0)}. ${esc(s.title)}</div>
            <span class="pill ${statusClass}">${esc(s.status || '未着手')}</span>
            <span class="pill">使用プロンプト：${esc(pr ? pr.title : '未設定')}</span>
          </div>
          ${controls ? `<div class="row">
            <button data-action="moveStep" data-dir="-1" data-id="${s.id}">↑</button>
            <button data-action="moveStep" data-dir="1" data-id="${s.id}">↓</button>
            <button data-action="editStep" data-id="${s.id}">編集</button>
            <button data-action="useStep" data-id="${s.id}">生成へ</button>
            <button class="danger" data-action="deleteStep" data-id="${s.id}">削除</button>
          </div>` : ''}
        </div>
        <div class="muted small">資料：${docNames.length ? esc(docNames.join('、')) : 'なし'}</div>
        <div class="muted small">メモ：${esc(s.memo || '-')}</div>
      </div>
    `;
  }

  function bindContentEvents(){
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id, btn.dataset));
    });

    const stepSelect = document.getElementById('genStepSelect');
    const promptSelect = document.getElementById('genPromptSelect');
    if (stepSelect && promptSelect) {
      const p = getProject();
      if (p.steps[0]) {
        stepSelect.value = p.steps.slice().sort((a,b)=>(a.order||0)-(b.order||0))[0].id;
        const st = p.steps.find(s => s.id === stepSelect.value);
        if (st && st.promptId) promptSelect.value = st.promptId;
      }
      setupGenerator();
      stepSelect.addEventListener('change', setupGenerator);
      promptSelect.addEventListener('change', setupGenerator);
      document.getElementById('buildPromptBtn').addEventListener('click', buildPrompt);
      document.getElementById('copyGeneratedBtn').addEventListener('click', copyGenerated);
      const copyTop = document.getElementById('copyGeneratedTopBtn');
      if (copyTop) copyTop.addEventListener('click', copyGenerated);
      const buildCopy = document.getElementById('buildAndCopyPromptBtn');
      if (buildCopy) buildCopy.addEventListener('click', async () => { buildPrompt(); await copyGenerated(); });
      document.getElementById('saveGeneratedBtn').addEventListener('click', saveGeneratedAsOutput);
    }

    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.addEventListener('click', exportJSON);
    const importInput = document.getElementById('importInput');
    if (importInput) importInput.addEventListener('change', importJSON);
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.addEventListener('click', resetAll);
  }

    if (action === 'duplicatePrompt') duplicatePrompt(id);
    if (action === 'deletePrompt') deletePrompt(id);
    if (action === 'editStep') openStepModal(id);
    if (action === 'deleteStep') deleteStep(id);
    if (action === 'moveStep') moveStep(id, Number(ds.dir || 0));
    if (action === 'useStep') { activeTab = 'generate'; render(); setTimeout(()=>{ const e=document.getElementById('genStepSelect'); if(e){e.value=id; setupGenerator();}}, 0); }
    if (action === 'editOutput') openOutputModal(id);
    if (action === 'deleteOutput') deleteOutput(id);

  }

  function moveStep(id, dir){
    const p = getProject();
    const arr = p.steps.slice().sort((a,b)=>(a.order||0)-(b.order||0));
    const idx = arr.findIndex(s => s.id === id);
    const nidx = idx + dir;
    if (idx < 0 || nidx < 0 || nidx >= arr.length) return;
    [arr[idx], arr[nidx]] = [arr[nidx], arr[idx]];
    arr.forEach((s, i) => s.order = i+1);
    p.steps = arr;
    saveState(); renderContent();
  }

  function normalizeStepOrder(p){
    p.steps.sort((a,b)=>(a.order||0)-(b.order||0)).forEach((s,i) => s.order = i+1);
  }

  function fieldPlaceholder(key, template){
    const k = String(key || '').trim();
    const src = String(template || '');
    const clean = (v) => String(v || '')
      .replace(/^例[:：]\s*/, '')
      .replace(/^入力例[:：]\s*/, '')
      .replace(/^ここに\s*/, '')
      .replace(/を入力$/, '')
      .trim();
    const map = {
      'モチーフ作品名またはエピソード名': '例：地獄楽、進撃の巨人、特定エピソード名など',
      '今回リライトを実行するパート': '例：OP〜起 / 承Ⅰ〜承Ⅱ / 転〜ED / OPのみ / 起のみ / 結〜ED',
      '今回出力するパート': '例：OP〜起 / 承Ⅰ〜承Ⅱ / 転〜ED。指定範囲以外は出力しない',
      'GMPCの有無': '例：いる / いない / 未定。いない場合はGMPCを作成・追加しない',
      '紹介文の長さ': '例：1人あたり100〜200字 / 200〜300字 / Notionカード向け',
      '今回紹介するNPCの範囲': '例：全員 / 代表NPCのみ / 第1話から登場するNPCのみ / PLに見せてよいNPCのみ',
      '公開してよいNPC情報': '例：第1話から登場し、今後主軸になる対象の表の顔・公開肩書き・PCとの接点',
      '伏せるべきNPC情報': '例：裏の顔、敵対予定、裏切り、死亡予定、黒幕との関係、秘匿目的',
      'NPC紹介文の参考資料': '例：[資]0-01.サンプルNPC。文量・文体・情報密度の参考にする',
      '参照するサンプルNPC文体': '例：[資]0-01.サンプルNPCを貼る。なければ「なし」',
      '使用システム': '例：ソード・ワールド2.5',
      'キャンペーン形式': '例：全7話キャンペーン / 全10話 / オムニバス型 / 一本道型',
      '総話数': '例：7、10、全7話など',
      '今回作成する話数': '例：1、3、最終話、第1話など',
      'PCレベル': '例：6レベル、8レベルなど',
      '記事のトーン': '例：重厚 / 読みやすい / 和風ダークファンタジー / 募集文寄り',
      '伏せるべき情報': '例：黒幕、真相、裏切り、死亡予定、最終話、NPCの裏の顔など',
      '公開してよい情報': '例：PCの立場、舞台概要、導入、雰囲気、一般公開情報など'
    };
    if (map[k]) return map[k];
    const escapeRegex = (s) => String(s).replace(new RegExp('[.*+?^${}()|[\\]\\\\]', 'g'), '\\$&');
    const ek = escapeRegex(k);
    const patterns = [
      new RegExp('【' + ek + '】\\s*\\n\\[([^\\]]{1,260})\\]', 'm'),
      new RegExp('\\*\\*' + ek + '\\*\\*\\s*[:：]\\s*\\[?([^\\n\\]]{1,260})\\]?', 'm'),
      new RegExp(ek + '\\s*[:：]\\s*\\[([^\\]]{1,260})\\]', 'm'),
      new RegExp(ek + '\\s*\\n\\[([^\\]]{1,260})\\]', 'm')
    ];
    for (const re of patterns) {
      const m = src.match(re);
      if (m && clean(m[1])) return clean(m[1]);
    }
    const star = src.match(/\[\s*★([^\]]{1,180})\]/);
    if (star && clean(star[1])) return clean(star[1]);
    return k + 'を入力';
  }
  function setupGenerator(){
    const p = getProject();
    const stepId = document.getElementById('genStepSelect')?.value || '';
    const step = p.steps.find(s => s.id === stepId);
    const promptSelect = document.getElementById('genPromptSelect');
    if (step && step.promptId && p.prompts.some(pr => pr.id === step.promptId)) {
      promptSelect.value = step.promptId;
    }
    const pr = p.prompts.find(x => x.id === promptSelect.value) || p.prompts[0];
    const vars = pr ? extractVars(pr) : [];
    const fieldsEl = document.getElementById('genFields');
    fieldsEl.innerHTML = vars.map(v => {
      const hint = fieldPlaceholder(v, pr.template || '');
      return `
      <div>
        <label>${esc(v)}</label>
        <textarea class="genField" data-key="${esc(v)}" placeholder="${esc(hint)}">${defaultFieldValue(v, p)}</textarea>
        <div class="field-hint">入力例・方向性：${esc(hint)}</div>
      </div>
    `;
    }).join('') || '<div class="muted small">このプロンプトに変数はありません。</div>';

    const docChecks = document.getElementById('genDocChecks');
    const selectedDocIds = step ? (step.docIds || []) : [];
    docChecks.innerHTML = p.documents.map(d => `
      <label class="checkbox-row">

        <span>${esc(d.title)} <span class="muted small">/ ${esc(d.status || '')}</span></span>
      </label>
    `).join('') || '<div class="muted">資料がありません。</div>';
  }

  function defaultFieldValue(key, p){
    const k = String(key);
    if (k === 'システム') return esc(p.system || '');
    if (k === 'ジャンル') return esc(p.genre || '');
    if (k === '参照資料') return '※下部の「含める資料」で選択した資料が自動挿入されます。';
    if (k === '前提・禁止事項') {
      const docs = p.documents.filter(d => (d.tags||'').includes('禁止') || (d.title||'').includes('方針'));
      return esc(docs.map(d => d.content).join('\n\n'));
    }
    return '';
  }

  function buildPrompt(){
    const p = getProject();
    const pr = p.prompts.find(x => x.id === document.getElementById('genPromptSelect').value);
    if (!pr) { toast('プロンプトがありません'); return; }

    const fields = {};
    document.querySelectorAll('.genField').forEach(el => fields[el.dataset.key] = el.value);

    const selectedDocs = [...document.querySelectorAll('.genDocCheck:checked')]
      .map(x => p.documents.find(d => d.id === x.value))
      .filter(Boolean);

    const refs = selectedDocs.map(d => {
      return `\n\n==================================================\n# 参照資料：${d.title}\nカテゴリ：${d.category || '-'} / 状態：${d.status || '-'} / 公開範囲：${d.scope || '-'}\n==================================================\n${d.content || ''}`;
    }).join('\n');

    fields['参照資料'] = refs || fields['参照資料'] || 'なし';

    let outputText = pr.template || '';
    const replacedKeys = new Set();

    const getField = (...keys) => {
      for (const key of keys) {
        const value = fields[key];
        if (String(value || '').trim()) return String(value).trim();
      }
      return '';
    };

    const escapeRegex = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

    const replaceExact = (key, patterns) => {
      const value = getField(key);
      if (!value) return;
      for (const pattern of patterns) {
        const before = outputText;
        outputText = outputText.replace(pattern, value);
        if (before !== outputText) replacedKeys.add(key);
      }
    };

    const formatEpisode = (value) => {
      const v = String(value || '').trim();
      if (!v) return '';
      if (v.startsWith('第')) return v;
      if (/^\d+$/.test(v)) return `第${v}話`;
      if (/^\d+話$/.test(v)) return `第${v}`;
      return v;
    };

    const formatTotal = (value) => {
      const v = String(value || '').trim();
      if (!v) return '';
      if (v.startsWith('全') && v.endsWith('話中')) return v;
      if (v.startsWith('全') && v.endsWith('話')) return `${v}中`;
      if (v.startsWith('全')) return v;
      if (/^\d+$/.test(v)) return `全${v}話中`;
      if (/^\d+話$/.test(v)) return `全${v}中`;
      return v;
    };

    // {{変数}} 形式への対応。
    outputText = outputText.replace(/\{\{([^{}]+)\}\}/g, (_, key) => {
      const k = key.trim();
      const value = getField(k);
      if (value) replacedKeys.add(k);
      return value;
    });

    // 既存プロンプト内の [★入力] 系プレースホルダへの対応。
    replaceExact('モチーフ作品名またはエピソード名', [/\[ ★ここに作品名やエピソード名を入力 \]/g]);
    replaceExact('第1話の想定PCレベル', [/\[ ★入力（例：2レベル） \]/g]);
    replaceExact('最終話の想定PCレベル', [/\[ ★入力（例：8レベル） \]/g]);
    replaceExact('第1話のフック', [
      /\[ ★直前に作成した第1話の最終出力を入力 \]/g,
      /\[ ★ここに作成した第1話のあらすじ等を入力 \]/g
    ]);
    replaceExact('最終話のフック', [/\[ ★ここに作成した最終話のあらすじ等を入力 \]/g]);
    replaceExact('今回作成する話数とPCレベル', [/\[ ★入力（例：第3話／4レベル／全10話） \]/g]);
    replaceExact('中間話の舞台・テーマ', [/\[ ★入力（例：指定なし、または特定の都市名） \]/g]);
    replaceExact('モチーフ作品・楽曲', [/\[ ★入力（指定なしの場合は、キャンペーン全体のモチーフから派生させるかAIが選定） \]/g]);
    replaceExact('全体プロットデータ', [/\[ ★ここに作成した「全体あらすじ」「各話ごとの起承転結」を入力 \]/g]);
    replaceExact('今回出力するパート', [/\[ ★「OP〜起」「承Ⅰ〜承Ⅱ」「転〜ED」など、ユーザーが今回出力してほしい範囲を指定します。※指定された範囲以外は絶対に出力しないでください \]/g]);
    replaceExact('キャンペーン全体の概要', [/\[ ★\[資\]5\.世界観設定資料\.txt 及び \[資\]6\.NPC設定資料\.txt の内容に準拠 \]/g]);

    // 第[N]話、全[X]話中への対応。
    const episodeValue = getField('今回作成する話数');
    const totalValue = getField('全話数');
    if (episodeValue && totalValue) {
      outputText = outputText.replace(/第\[ N \]話\s*（全\[ X \]話中）/g, `${formatEpisode(episodeValue)} （${formatTotal(totalValue)}）`);
      replacedKeys.add('今回作成する話数');
      replacedKeys.add('全話数');
    }
    if (episodeValue) {
      outputText = outputText.replace(/第\[ N \]話/g, formatEpisode(episodeValue));
      replacedKeys.add('今回作成する話数');
    }
    if (totalValue) {
      outputText = outputText.replace(/全\[ X \]話中/g, formatTotal(totalValue));
      replacedKeys.add('全話数');
    }

    // 入力要素欄の「1. 【項目名】」「1. **項目名**:」「・項目名：」形式を、入力値で置換する。
    // 出力形式など本文後半を誤爆しないよう、入力欄らしい冒頭範囲に限定して処理する。
    const findInputSectionEnd = (section) => {
      const markers = [
        '\n# 生成ルール',
        '\n# 作成方針',
        '\n【生成ルール',
        '\n【厳守事項',
        '\n【対話型',
        '\n【前提】',
        '\n【条件】',
        '\n# 出力',
        '\n【出力',
        '\n==================================================\n# 作成方針',
        '\n==================================================\n# 生成ルール'
      ];
      let end = section.length;
      for (const marker of markers) {
        const idx = section.indexOf(marker);
        if (idx >= 0 && idx < end) end = idx;
      }
      return end;
    };

    const replaceInInputArea = (text) => {
      const starts = ['# 入力要素', '【入力要素', '# 入力情報', '【入力情報', '【指定条件】'];
      let startIdx = -1;
      for (const s of starts) {
        const idx = text.indexOf(s);
        if (idx >= 0 && (startIdx < 0 || idx < startIdx)) startIdx = idx;
      }
      if (startIdx < 0) return text;

      const before = text.slice(0, startIdx);
      const rest = text.slice(startIdx);
      const localEnd = findInputSectionEnd(rest);
      let target = rest.slice(0, localEnd);
      const after = rest.slice(localEnd);

      for (const [key, rawValue] of Object.entries(fields)) {
        if (key === '参照資料') continue;
        const value = String(rawValue || '').trim();
        if (!value) continue;

        const escapedKey = escapeRegex(key);

        // 1. **項目名**: 旧値
        let beforeTarget = target;
        target = target.replace(new RegExp(`(^|\\n)(\\d+\\.\\s+\\*\\*${escapedKey}\\*\\*\\s*[:：])[^\\n]*`, 'g'), `$1$2 ${value}`);
        if (beforeTarget !== target) replacedKeys.add(key);

        // ・項目名：旧値
        beforeTarget = target;
        target = target.replace(new RegExp(`(^|\\n)(・\\s*${escapedKey}(?:（[^）]*）)?\\s*[:：])[^\\n]*`, 'g'), `$1$2${value}`);
        if (beforeTarget !== target) replacedKeys.add(key);

        // 1. 【項目名】\n[説明]\n旧値 形式。次の番号付き項目まで差し替える。
        beforeTarget = target;
        const blockPattern = new RegExp(`(^|\\n)(\\d+\\.\\s+【${escapedKey}】[^\\n]*\\n)([\\s\\S]*?)(?=\\n\\d+\\.\\s+【|\\n\\d+\\.\\s+\\*\\*|\\n# |\\n【|\\n=|$)`, 'g');
        target = target.replace(blockPattern, (m, lead, head) => `${lead}${head}${value}\n`);
        if (beforeTarget !== target) replacedKeys.add(key);
      }

      return before + target + after;
    };

    outputText = replaceInInputArea(outputText);

    // 選択された参照資料は、元プロンプト本文とは別に明示して付与する。
    const prefixParts = [];
    if (refs) {
      prefixParts.push([
        '==================================================',
        '# ツールで選択された参照資料',
        '==================================================',
        refs.trim()
      ].join('\n'));
    }

    // テンプレート本文内に対応箇所がない入力だけ、補助指定として冒頭に残す。
    // 例：10番の依頼書作成など、元プロンプトに明示的な入力欄がない工程への対応。
    const unreplacedEntries = Object.entries(fields)
      .filter(([key, value]) => key !== '参照資料' && String(value || '').trim() && !replacedKeys.has(key));

    if (unreplacedEntries.length) {
      prefixParts.unshift([
        '==================================================',
        '# ツール入力欄による追加指定',
        '==================================================',
        ...unreplacedEntries.flatMap(([key, value]) => [
          `【${key}】`,
          String(value || '').trim(),
          ''
        ])
      ].join('\n'));
    }

    if (prefixParts.length) {
      outputText = `${prefixParts.join('\n\n')}\n\n${outputText}`;
    }

    // 置換漏れがまだ残っている場合の警告を生成欄末尾ではなく冒頭に出す。
    // ただしこれは削除ではなく、ユーザーが漏れに気づけるようにするための表示。
    const unresolved = outputText.match(/\[ ★[^\]]+\]|第\[ N \]話|全\[ X \]話中/g);
    if (unresolved && unresolved.length) {
      const unique = [...new Set(unresolved)];
      outputText = [
        '==================================================',
        '# 置換未対応の仮置き記述があります',
        '==================================================',
        '以下の仮置きが残っています。必要ならプロンプト編集画面で入力欄名を追加するか、手動で修正してください。',
        ...unique.map(x => `・${x}`),
        '',
        outputText
      ].join('\n');
    }

    currentGeneratedText = outputText;
    document.getElementById('generatedText').value = outputText;
    toast('プロンプトを生成しました');
  }

  async function copyGenerated(){
    const txt = document.getElementById('generatedText')?.value || '';
    if (!txt.trim()) { toast('コピーする内容がありません'); return; }
    try {
      await navigator.clipboard.writeText(txt);
      toast('コピーしました');
    } catch(e) {
      const area = document.getElementById('generatedText');
      area.focus(); area.select();
      document.execCommand('copy');
      toast('コピーしました');
    }
  }

  function saveGeneratedAsOutput(){
    const p = getProject();
    const txt = document.getElementById('generatedText')?.value || '';
    if (!txt.trim()) { toast('保存する内容がありません'); return; }
    const title = prompt('出力履歴のタイトル', '生成プロンプト ' + nowText());
    if (!title) return;
    p.outputs.push({
      id: uid('output'),
      title,
      category: '生成プロンプト',
      status: '作業稿',
      content: txt,
      createdAt: nowText(),
      updatedAt: nowText()
    });
    saveState(); toast('出力履歴に保存しました');
  }

  function exportJSON(){
    saveState();
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safe = (getProject()?.title || 'trpg').replace(/[\\/:*?"<>|]/g, '_');
    a.href = url;
    a.download = `${safe}_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('JSONを書き出しました');
  }

  function importJSON(e){
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (!imported.projects || !Array.isArray(imported.projects)) throw new Error('invalid');
        if (!confirm('現在のデータをインポートデータで置き換えます。よろしいですか？')) return;
        state = imported;
        state.version = state.version || APP_VERSION;
        saveState();
        render();
        toast('JSONを読み込みました');
      } catch(err) {
        alert('JSONの読み込みに失敗しました。形式を確認してください。');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function resetAll(){
    if (!confirm('本当に全データを初期化しますか？ JSONバックアップがない場合、元に戻せません。')) return;
    if (!confirm('最終確認です。初期サンプル状態に戻します。')) return;
    state = sampleState();
    saveState();
    render();
    toast('初期化しました');
  }

  function addProject(){
    const title = prompt('新しいプロジェクト名', '新規TRPGシナリオ');
    if (!title) return;
    const id = uid('project');
    state.projects.push({
      id, title, system:'', genre:'', status:'作業中', note:'',
      documents:[], prompts:[], steps:[], outputs:[],
      createdAt: nowText(), updatedAt: nowText()
    });
    state.currentProjectId = id;
    saveState(); render(); toast('プロジェクトを追加しました');
  }

  function editProject(){
    const p = getProject();
    openModal('プロジェクト編集', `
      <div class="form-grid">
        <div><label>タイトル</label><input id="projTitle" value="${esc(p.title)}"></div>
        <div><label>状態</label><select id="projStatus">${options(['構想中','作業中','レビュー中','完了','保留'], p.status)}</select></div>
        <div><label>システム</label><input id="projSystem" value="${esc(p.system || '')}" placeholder="ソード・ワールド2.5など"></div>
        <div><label>ジャンル</label><input id="projGenre" value="${esc(p.genre || '')}" placeholder="和風ダークファンタジーなど"></div>
      </div>
      <div style="margin-top:10px;"><label>メモ</label><textarea id="projNote">${esc(p.note || '')}</textarea></div>
    `, () => {
      if (!val('projTitle').trim()) { toast('タイトルが必要です'); return false; }
      p.title = val('projTitle').trim();
      p.status = val('projStatus');
      p.system = val('projSystem');
      p.genre = val('projGenre');
      p.note = val('projNote');
      saveState(); render(); toast('プロジェクトを保存しました'); return true;
    });
  }

  function duplicateProject(){
    const p = getProject();
    const clone = JSON.parse(JSON.stringify(p));
    clone.id = uid('project');
    clone.title = p.title + ' のコピー';
    clone.createdAt = nowText();
    clone.updatedAt = nowText();
    state.projects.push(clone);
    state.currentProjectId = clone.id;
    saveState(); render(); toast('プロジェクトを複製しました');
  }

  function deleteProject(){
    const p = getProject();
    if (state.projects.length <= 1) { toast('最後のプロジェクトは削除できません'); return; }
    if (!confirm(`プロジェクト「${p.title}」を削除しますか？`)) return;
    state.projects = state.projects.filter(x => x.id !== p.id);
    state.currentProjectId = state.projects[0].id;
    saveState(); render(); toast('プロジェクトを削除しました');
  }

  document.getElementById('addProjectBtn').addEventListener('click', addProject);
  document.getElementById('renameProjectBtn').addEventListener('click', editProject);
  document.getElementById('duplicateProjectBtn').addEventListener('click', duplicateProject);
  document.getElementById('deleteProjectBtn').addEventListener('click', deleteProject);
  document.getElementById('quickExportBtn').addEventListener('click', exportJSON);
  document.getElementById('quickImportInput').addEventListener('change', importJSON);

  render();
})();
</script>
</body>
</html>
