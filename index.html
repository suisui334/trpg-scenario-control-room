<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRPGシナリオ管制室 v0.2</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #181b22;
      --panel2: #20242d;
      --text: #f0f2f5;
      --muted: #aeb6c2;
      --line: #343946;
      --accent: #9f7aea;
      --accent2: #6ee7b7;
      --danger: #f87171;
      --warn: #fbbf24;
      --ok: #34d399;
      --input: #0f1117;
      --shadow: rgba(0,0,0,.35);
      --radius: 14px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #202438 0, #111318 45%, #0b0d11 100%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
    }
    button, input, textarea, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel2);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      transition: .12s ease;
    }
    button:hover { border-color: var(--accent); transform: translateY(-1px); }
    button.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-color: #7c3aed;
    }
    button.good { border-color: rgba(52,211,153,.55); }
    button.warn { border-color: rgba(251,191,36,.55); }
    button.danger { border-color: rgba(248,113,113,.55); color: #fecaca; }
    button.ghost { background: transparent; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--input);
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }
    textarea { min-height: 130px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(159,122,234,.15);
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 5px;
    }
    .app {
      display: grid;
      grid-template-columns: 310px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(17,19,24,.9);
      backdrop-filter: blur(10px);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: 0 10px 25px var(--shadow);
    }
    .brand h1 {
      font-size: 17px;
      margin: 0;
      line-height: 1.2;
    }
    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .sidebar-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }
    .project-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .project-item {
      text-align: left;
      width: 100%;
      padding: 10px;
      background: rgba(32,36,45,.75);
    }
    .project-item.active {
      border-color: var(--accent);
      background: rgba(159,122,234,.16);
    }
    .project-item .small {
      color: var(--muted);
      font-size: 12px;
    }
    .main {
      padding: 22px;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .topbar h2 { margin: 0; font-size: 24px; }
    .topbar .meta { color: var(--muted); font-size: 13px; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      background: rgba(32,36,45,.7);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .tab.active {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(159,122,234,.18);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .card {
      background: rgba(24,27,34,.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: 0 12px 28px var(--shadow);
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }
    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stack { display: grid; gap: 10px; }
    .item {
      border: 1px solid var(--line);
      background: rgba(32,36,45,.58);
      border-radius: 12px;
      padding: 12px;
    }
    .item-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      background: rgba(15,17,23,.65);
      color: var(--muted);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .pill.ok { color: #bbf7d0; border-color: rgba(52,211,153,.4); }
    .pill.warn { color: #fde68a; border-color: rgba(251,191,36,.4); }
    .pill.danger { color: #fecaca; border-color: rgba(248,113,113,.4); }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .hidden { display: none !important; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
    }
    .notice {
      border: 1px solid rgba(159,122,234,.45);
      background: rgba(159,122,234,.12);
      color: #ddd6fe;
      border-radius: 12px;
      padding: 12px;
    }
    .danger-zone {
      border-color: rgba(248,113,113,.35);
      background: rgba(127,29,29,.12);
    }
    .checkbox-list {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: rgba(15,17,23,.55);
    }
    .checkbox-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 8px;
      align-items: start;
      padding: 6px;
      border-bottom: 1px solid rgba(52,57,70,.55);
    }
    .checkbox-row:last-child { border-bottom: 0; }
    .checkbox-row input { width: auto; margin-top: 5px; }
    .generated {
      min-height: 360px;
      font-size: 13px;
      line-height: 1.55;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #111827;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 12px;
      box-shadow: 0 12px 30px var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: .15s ease;
      pointer-events: none;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.62);
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 10;
    }
    .modal {
      width: min(900px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #151821;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 25px 70px rgba(0,0,0,.55);
    }
    .modal h3 { margin-top: 0; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .main { padding: 14px; }
      .topbar { display: grid; }
      .span-8, .span-6, .span-4, .span-3 { grid-column: span 12; }
      .form-grid { grid-template-columns: 1fr; }
      .project-list {
        grid-template-columns: 1fr;
      }
      .sidebar details summary { cursor: pointer; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">卓</div>
        <div>
          <h1>TRPGシナリオ管制室</h1>
          <p>v0.2 / 全文登録版・ローカル保存</p>
        </div>
      </div>

      <div class="notice small">
        同じブラウザでは自動保存されます。大事な資料は必ずJSONエクスポートしてください。
      </div>

      <div class="sidebar-section">
        <div class="row" style="justify-content:space-between;">
          <strong>プロジェクト</strong>
          <button class="primary" id="addProjectBtn">追加</button>
        </div>
        <div id="projectList" class="project-list"></div>
      </div>

      <div class="sidebar-section stack">
        <button id="quickExportBtn">JSONバックアップ</button>
        <label class="small">JSONインポート</label>
        <input id="quickImportInput" type="file" accept="application/json,.json" />
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="projectTitle">読み込み中...</h2>
          <div class="meta" id="projectMeta"></div>
        </div>
        <div class="row">
          <button id="renameProjectBtn">プロジェクト編集</button>
          <button id="duplicateProjectBtn">複製</button>
          <button class="danger" id="deleteProjectBtn">削除</button>
        </div>
      </div>

      <div class="tabs" id="tabs"></div>
      <section id="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

              "template": "# 命令書：オープンワールド用・新規舞台コンセプト案作成＆比較プロンプト\n\nあなたはプロのTRPGワールドデザイナー兼シナリオライターです。\n以下の入力要素をもとに、まだ名称や詳細設定が確定していない新規舞台について、オープンワールド運用に耐える「舞台コンセプト案」を複数作成し、辛口で比較・検討してください。\n\nこの段階では、完成版の世界観マスターデータを作成するのではありません。\n目的は、以後の世界観資料、公式NPC資料、都市設定、シナリオフック、敵勢力、冒険者ギルド、地方文化を展開するための「舞台の核」を選定することです。\n\n表面的にそれらしい国や地方を作るのではなく、\n「PCがなぜ訪れるのか」\n「どのような事件が自然発生するのか」\n「その土地でしかできない冒険は何か」\n「既存世界の中でどういう意味を持つのか」\nを明確にしてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【作成対象の範囲】\n[例：大陸内の一地方、島国、都市国家群、辺境領、砂漠地帯、山岳国家、交易圏、宗教圏、未踏地域、泡沫世界、異界領域など]\n\n一地方内の一国のその周辺\n何らかの原因で人蛮混合で共存が成立している国\n\n3. 【既に決まっている上位条件】\n[例：ラクシア世界内、アルフレイム大陸周辺、ブルライト地方の近隣、公式現行時代、〈大破局〉後の復興期、魔動機文明の遺産が多い／少ない、蛮族領に近い、海路でしか行けない、など]\nアルフレイム大陸、公式現行時代\nドーデン地方(ただし資料は貼れない為、検索を加えて情報を収集すること)\n\n4. 【舞台名】\n[未定 / 仮名あり / 正式名称あり]\n※未定の場合は、各案ごとに仮称を提示すること。\n※名称はモチーフの語感を参考にしてよいが、現実の国名・都市名の丸写しは避けること。\n\n未定\n\n5. 【現実文化・歴史・地域モチーフ】\n[例：和風、古代エジプト風、ロシア風、ビザンツ風、中央アジア遊牧民風、東南アジア海洋国家風、ケルト風、北欧風、インド風、メソアメリカ風、イスラム黄金時代風、近世ヨーロッパ風など]\n※ざっくりした指定でもよい。\n※複数指定された場合は、どの要素をどの層に使うか整理すること。\n※現実文化を丸写しせず、ファンタジー世界に合わせて再構成すること。\n\n指定なし。モチーフ作品は地獄楽と進撃の巨人。\n\n6. 【モチーフの反映度】\n[強く反映 / 風味程度 / 建築と服飾中心 / 信仰と政治中心 / 名前の響き中心 / 複数文化を混ぜたい / あえて現実文化から離したい]\n\n風味程度\n\n7. 【ジャンル・空気感】\n[例：王道冒険、ダークファンタジー、秘境探索、政治劇、怪異譚、海洋冒険、辺境開拓、退廃都市、宗教幻想、古代遺跡探索、戦乱の国、交易と陰謀の都市群など]\n\n指定はないが、さまざまな要素を汲み取りたい\n\n8. 【舞台の主要テーマ】\n[例：失われた栄光、復興、信仰と政治、自然との共存、古代遺産の再発見、民族間対立、死者と生者の境界、交易と欲望、神話の嘘、辺境の自由、帝国の衰退など]\n\n指定なし\n\n9. 【必ず含めたい要素】\n[例：巨大河川、砂漠、雪原、火山、空中都市、地下都市、魔動機遺跡、神殿都市、遊牧民、港町、古代王墓、霊峰、禁足地、冒険者ギルド、特殊な魔法体系など]\n\n指定なし\n\n10. 【避けたい要素】\n[例：魔動機要素を薄めたい、現実の宗教名を直接出したくない、暗すぎる世界にしたくない、政治を複雑にしすぎたくない、固有名詞を増やしすぎたくない、既存地方と被らせたくない、など]\n\n暗すぎる世界にしたくない\n\n11. 【舞台の規模感】\n[例：一都市と周辺地域 / 複数都市を含む地方 / 国家規模 / 列島規模 / 大陸の一角 / 異界全域]\n\n国家規模、一都市と周辺地域\n\n12. 【PCの想定立場】\n[例：外から来た冒険者、現地出身者、ギルド所属、国家に雇われた調査員、流れ者、開拓者、密命を受けた者、特に固定しない]\n\nこの国にある冒険者ギルド「〇〇亭」(命名例:雪山の峠亭など)所属の予定。あくまでも予定\n世界観に相応しい立場が他にあるならそれでも構わない\n\n13. 【参照してよい資料】\n[添付資料がある場合はここに列挙。ない場合は「なし」とする]\n\nなし\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・この段階では、完成版世界観資料を作らないこと。\n・まずは複数の舞台コンセプト案を出し、比較し、採用候補を絞ること。\n・各案は、単なる観光地や雰囲気設定ではなく、TRPGで冒険が発生する構造を持たせること。\n・現実文化モチーフを使う場合、服装や名前だけで終わらせないこと。\n・モチーフは、地理、気候、建築、食、信仰、政治制度、軍事、交易、死生観、祝祭、階級制度、生活習慣へ分解して再構成すること。\n・現実の国や民族をそのままファンタジー種族へ置き換えるような雑な処理は避けること。\n・複数モチーフを混ぜる場合は、どの要素を採用し、どの要素を採用しないか明記すること。\n・既存公式世界がある場合、その世界の神、種族、魔法、歴史、文明水準と矛盾しないようにすること。\n・名称は、モチーフの語感を参考にしつつも、舞台独自の命名規則を作ること。\n・PCが関わる余地を必ず作ること。\n・NPCや黒幕を作り込みすぎないこと。この段階では舞台の核を決めることを優先する。\n・美点だけでなく、問題点、歪み、危険、運用上の弱点も明記すること。\n・辛口で比較すること。すべてを褒めて終わらせないこと。\n・必要に応じて、複数案の良い部分を混ぜたミックス案を提示してよい。\n\n==================================================\n# 出力形式\n==================================================\n\n以下の構成で出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　前提整理】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. 入力条件の要約\nユーザーが指定した条件を簡潔に整理する。\n\n■1-2. 設計上の重要ポイント\nこの舞台を作る上で特に重視すべき点を整理する。\n\n例：\n・既存地方との差別化\n・PCが訪れる理由\n・冒険の発生源\n・文化モチーフの扱い\n・公式設定との整合性\n・長期運用のしやすさ\n\n■1-3. 注意すべき落とし穴\nこの舞台を作る際に陥りやすい問題を辛口で指摘する。\n\n例：\n・モチーフが表面的になる\n・固有名詞だけが増える\n・PCが関与しづらい\n・政治設定が重すぎる\n・既存の国や地方と役割が被る\n・舞台が美しいだけで事件が起きない\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　舞台コンセプト案】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最低3案、必要に応じて最大5案まで提示すること。\n\n各案は以下の形式で作成する。\n\n==================================================\n■案A：［仮称］\n==================================================\n\n【仮称】\n舞台の仮名を提示する。\n未定の場合でも、この案の方向性に合う仮称をつけること。\n\n【一言コンセプト】\nこの舞台を一文で表す。\n\n【現実文化・歴史モチーフ】\nどの文化、歴史、地域、神話、地理を参考にしているか。\n複数ある場合は、どの要素をどこに使うか明記する。\n\n【モチーフの翻案方針】\n現実文化をそのまま使わず、ファンタジー世界にどう再構成するか。\n\n【地理・気候】\n舞台の自然環境、地形、気候、交通上の特徴。\n\n【政治・統治】\n誰が支配しているのか。\nどのような統治構造か。\n中央集権か、都市連合か、部族連合か、神殿支配か、交易組合支配か。\n\n【信仰・価値観】\n人々が何を信じ、何を尊び、何を恐れているか。\n既存神格や公式世界との接続がある場合は明記する。\n\n【経済・産業】\n何で栄えているか。\n何が不足しているか。\n交易品、特産品、争奪対象となる資源。\n\n【文化・生活】\n服飾、食、建築、祭り、身分、家族観、死生観、娯楽など。\n\n【外部との関係】\n周辺国、他地方、蛮族、魔域、交易路、移民、冒険者との関係。\n\n【冒険の発生源】\nこの舞台で自然に起こる事件の種類。\n最低5つ挙げること。\n\n【PCが訪れる理由】\n外部冒険者、現地出身者、国家雇用、ギルド依頼など、PCが関わる導線。\n\n【TRPG的な強み】\n探索、戦闘、調査、交渉、政治、怪異、遺跡、旅情など、何に強い舞台か。\n\n【弱点・懸念点】\nこの案の欠点、運用上の難しさ、薄くなりそうな点を辛口で書く。\n\n【長期運用の拡張性】\n単発だけでなく、複数話・長期キャンペーンに発展できる要素。\n\n【向いているシナリオ傾向】\nこの案に向くシナリオジャンルを挙げる。\n\n【向いていないシナリオ傾向】\nこの案と相性が悪いシナリオジャンルを挙げる。\n\n【採用する場合の調整案】\n弱点を補うために、どこを調整すべきか。\n\n※案B以降も同じ形式で作成する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　案ごとの比較】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の観点で、各案を比較すること。\n\n■3-1. TRPG運用性\n・PCが関わりやすいか\n・依頼が作りやすいか\n・探索、戦闘、調査、交渉のバランスがよいか\n\n■3-2. オープンワールド適性\n・複数の都市、地域、組織、危険地帯を作りやすいか\n・単発にも長期にも使えるか\n・シナリオの幅が狭くなりすぎないか\n\n■3-3. モチーフの強度\n・文化モチーフが表面的ではないか\n・現実文化の丸写しになっていないか\n・ファンタジー世界として自立しているか\n\n■3-4. 既存世界との接続性\n・公式設定と矛盾しにくいか\n・既存の大陸、地方、種族、神、魔法、文明史と接続しやすいか\n・既存舞台との差別化ができているか\n\n■3-5. シナリオフックの豊富さ\n・自然に事件が起こるか\n・政治、怪異、遺跡、魔物、交易、信仰など複数の事件源があるか\n・毎回同じような話にならないか\n\n■3-6. 情緒・魅力\n・プレイヤーが行ってみたいと思えるか\n・土地の匂い、季節感、生活感が出せるか\n・ただの設定資料で終わらず、物語の舞台として映えるか\n\n■3-7. 危険な弱点\n各案について、最も危険な弱点を一つずつ明記すること。\n遠慮なく辛口でよい。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　比較表】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の形式で比較表を作成する。\n\n| 観点 | 案A | 案B | 案C |\n|---|---|---|---|\n| TRPG運用性 |  |  |  |\n| オープンワールド適性 |  |  |  |\n| モチーフの独自性 |  |  |  |\n| 既存世界との接続 |  |  |  |\n| シナリオフック量 |  |  |  |\n| 長期運用性 |  |  |  |\n| 情緒・魅力 |  |  |  |\n| 弱点の重さ |  |  |  |\n| 総合評価 |  |  |  |\n\n評価は、◎、○、△、×を用いること。\nただし、記号だけで終わらせず、表の後に必ず短評を添えること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　辛口総評】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各案について、以下の形式で総評する。\n\n■案Aの総評\n・良い点\n・悪い点\n・採用するなら何を削るべきか\n・採用するなら何を足すべきか\n・そのまま採用してよいか\n\n■案Bの総評\n同上。\n\n■案Cの総評\n同上。\n\nその後、全体として最も危険な設計上の問題を指摘すること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　採用候補の選定】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下のいずれかの形で、次のステップに進める採用候補を提示すること。\n\n■6-1. 単独採用案\n最も優れている案を1つ選び、その理由を説明する。\n\n■6-2. ミックス案\n複数案の良い部分を組み合わせる場合は、以下を記載する。\n\n【ベースにする案】\n【取り入れる要素】\n・案Aから：\n・案Bから：\n・案Cから：\n\n【捨てる要素】\n採用しない要素を明記する。\n全部載せにしないこと。\n\n【ミックス後の一言コンセプト】\n統合後の舞台を一文で表す。\n\n【ミックス後の強み】\nなぜ単独案より良いのか。\n\n【ミックス後の懸念】\n混ぜたことで発生する危険や、調整すべき点。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第7章　採用候補の骨子】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n採用候補について、次の世界観マスターデータ作成へ進むための骨子を整理する。\n\n【正式名称候補】\n最低5案提示する。\nそれぞれ語感、由来、印象を説明する。\n\n【最有力名称】\n1つ選び、その理由を説明する。\n\n【舞台の一文定義】\nこの舞台を一文で表す。\n\n【中核テーマ】\n3つまでに絞る。\n\n【主要な対立構造】\n最低3つ提示する。\n例：\n・中央と地方\n・信仰と商業\n・古代遺産と現代社会\n・定住民と遊牧民\n・生者と死者\n・冒険者と既存権力\n\n【主要地域の候補】\n最低5つ提示する。\n各地域について、名前、特徴、冒険の種を簡潔に記載する。\n\n【主要組織の候補】\n最低5つ提示する。\n各組織について、目的、表向きの役割、火種を簡潔に記載する。\n\n【公式NPC候補の方向性】\nこの舞台で必要になりそうな公式NPCの役割を整理する。\nまだ個別NPCを詳細作成しないこと。\n\n【代表的なシナリオフック】\n最低10個提示する。\n単発向けと長期向けを混ぜること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第8章　次ステップへの引き継ぎ】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最後に、次に作成すべき資料を提案する。\n\n例：\n1. 世界観マスターデータ決定稿\n2. 主要都市一覧\n3. 公式NPC一覧\n4. 冒険者ギルド設定\n5. 地方別シナリオフック集\n6. 敵対勢力・危険地域資料\n7. 種族分布・文化資料\n\nまた、次に世界観マスターデータを作る場合に、絶対に引き継ぐべき設定と、まだ確定しない方がよい設定を分けて記載すること。\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、以下を確認してください。\n\n1. 舞台案が単なる観光地紹介になっていないか。\n2. PCが関わる理由が明確か。\n3. 事件が自然発生する構造があるか。\n4. 現実文化モチーフが表面的ではないか。\n5. 既存世界と接続できる余地があるか。\n6. 複数のシナリオジャンルに耐えられるか。\n7. 各案の弱点をきちんと指摘しているか。\n8. 全部載せの雑なミックス案になっていないか。\n9. 次の世界観マスターデータ作成へ進める骨子があるか。\n10. 固有名詞だけが増えて、中身が薄くなっていないか。",

              "template": "# 命令書：採用済み舞台案をオープンワールド用・世界観マスターデータへ変換するプロンプト\n\nあなたはプロのTRPGワールドデザイナー兼シナリオライターです。\n以下の「採用済み舞台案」をもとに、今後の単発シナリオ、長期キャンペーン、公式NPC作成、都市設定、怪異設計、政治事件、冒険者依頼、地方探索、敵対勢力作成の土台となる、オープンワールド用の世界観マスターデータを作成してください。\n\nこの資料は、特定の一キャンペーン専用資料ではありません。\n舞台全体を長期運用するための根幹資料です。\n\nただし、世界観資料だからといって、設定を無制限に増やしてはいけません。\n重要なのは「広げられる骨格」を作ることです。\n固有名詞を並べただけの百科事典ではなく、TRPGで実際に使える舞台資料にしてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【採用済み舞台案】\nミックス案とします\n\n3. 【舞台の正式名称】\n[未定 / 候補あり / 決定済み]\n※未定の場合は、採用済み舞台案に基づいて正式名称候補を複数提示し、最有力案を選定すること。\n\n“灰壁と花霧の国”ヴェルガルド\n\n4. 【舞台の規模】\n[例：一都市と周辺地域 / 複数都市を含む地方 / 国家規模 / 列島規模 / 大陸の一角 / 異界全域]\n\n前回の通り\n\n5. 【上位世界・時代条件】\n[例：ラクシア世界内、アルフレイム大陸周辺、ブルライト地方近隣、公式現行時代、〈大破局〉後の復興期、魔動機文明の遺産が少ない、など]\n\n前回の通り\n\n6. 【現実文化・歴史モチーフ】\n[例：和風、古代エジプト風、ロシア風、中央アジア遊牧民風、東南アジア海洋国家風など]\n※採用案に含まれている場合も、再確認して整理すること。\n\n前回の通り\n\n7. 【モチーフの反映方針】\n[例：強く反映 / 風味程度 / 建築と服飾中心 / 信仰と政治中心 / 名前の響き中心 / 複数文化を混ぜる]\n\n前回の通り\n\n8. 【ジャンル・空気感】\n[例：王道冒険、ダークファンタジー、秘境探索、政治劇、怪異譚、海洋冒険、辺境開拓、退廃都市、宗教幻想、古代遺跡探索など]\n\n前回の通り\n\n9. 【舞台の中核テーマ】\n[例：復興、失われた栄光、信仰と政治、自然との共存、古代遺産の再発見、民族間対立、死者と生者の境界、交易と欲望など]\n\n前回の通り\n\n10. 【必ず残したい要素】\n[採用案から絶対に残したい設定、地理、文化、対立構造、組織、雰囲気など]\n\n案の通りでOK\n\n11. 【削ってよい要素】\n[採用案にあるが、重すぎる・扱いづらい・まだ確定しない方がよい要素など]\n\n特になし\n\n12. 【避けたい要素】\n[例：魔動機要素を増やしすぎない、現実宗教を直接出さない、政治を複雑にしすぎない、特定キャンペーンの黒幕を決めない、など]\n\n前回の通り\n\n13. 【PCの想定立場】\n[例：外から来た冒険者、現地出身者、ギルド所属、国家に雇われた調査員、流れ者、開拓者、特に固定しない]\n\n前回の通り\n\n14. 【冒険の主な方向性】\n[例：各地探索、都市事件解決、遺跡調査、怪異退治、交易路開拓、政治陰謀、辺境防衛、神話の真相解明など]\n\n指定なし\n\n15. 【参照してよい資料】\n[添付資料がある場合はここに列挙。ない場合は「なし」とする]\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・採用済み舞台案を尊重し、その核を壊さないこと。\n・ただし、採用案の内容をそのまま水増しせず、マスターデータとして再整理すること。\n・特定キャンペーンの黒幕、最終ボス、一本道の真相を決めすぎないこと。\n・単発シナリオにも長期キャンペーンにも使える余白を残すこと。\n・PCがこの舞台で冒険する理由を複数用意すること。\n・地理、歴史、政治、信仰、経済、生活、危険、組織、冒険者制度を相互に接続すること。\n・現実文化モチーフを、名前や衣装だけで終わらせないこと。\n・モチーフは、地理、気候、建築、食、信仰、政治制度、軍事、交易、死生観、祝祭、階級制度、生活習慣へ分解して再構成すること。\n・現実の国や民族をそのままファンタジー種族に置き換えるような雑な処理は避けること。\n・既存公式世界がある場合、その世界の神、種族、魔法、歴史、文明水準と矛盾しないようにすること。\n・独自用語を作る場合は、初出時に意味を説明すること。\n・固有名詞を増やしすぎず、重要度に応じて整理すること。\n・公開情報、専門知識、GM向け非公開情報を分けること。\n・ただしGM向け非公開情報は、複数の解釈やシナリオに展開できる形にし、固定しすぎないこと。\n・美点だけでなく、問題点、歪み、危険、生活上の不便、政治的摩擦を必ず定義すること。\n・各章には、TRPGでの使い道やシナリオフックへ繋がる要素を含めること。\n・名前だけの組織、活動内容のない都市、役割のない信仰を作らないこと。\n・「PCが何を調べ、どこへ行き、誰と交渉し、何と戦うのか」が見える資料にすること。\n\n==================================================\n# 出力形式\n==================================================\n\n以下の構成で、内容を端折らずに出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第0章　採用案の再整理】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■0-1. 採用案の要約\n採用済み舞台案の中核を、以下の観点で整理する。\n\n・舞台の一文定義\n・規模\n・文化モチーフ\n・ジャンル\n・中核テーマ\n・主要対立\n・冒険の方向性\n・必ず残すべき魅力\n\n■0-2. マスターデータ化にあたっての調整方針\n採用案を世界観資料へ変換する際、何を広げ、何を抑えるかを明記する。\n\n・広げる要素\n・抑える要素\n・まだ確定しない要素\n・公式NPC作成時に回す要素\n・シナリオ個別作成時に回す要素\n\n■0-3. 危険な肥大化ポイント\nこの舞台を作る際に、設定過多・固有名詞過多・政治過多・神話過多になりやすい箇所を辛口で指摘する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　舞台の基本定義】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. 舞台名称\n正式名称を決める。\n未定の場合は、最低5案を提示し、語感、由来、印象、欠点を整理した上で最有力案を選ぶ。\n\n【名称候補】\n1.\n2.\n3.\n4.\n5.\n\n【最有力名称】\n・名称：\n・理由：\n・略称や通称：\n・外部の人々からの呼ばれ方：\n・現地民からの呼ばれ方：\n\n■1-2. 舞台の概要\n・どこにあるのか\n・どの程度の広さか\n・どのような土地か\n・外部からどう見られているか\n・現地民は自分たちの土地をどう理解しているか\n・一言で言うならどのような舞台か\n\n■1-3. 中核コンセプト\n・この舞台を他地域と差別化する核\n・美点\n・危険性\n・TRPG的に面白い矛盾\n・この土地でしか起こりにくい事件\n\n■1-4. 公開情報・専門情報・GM情報\n以下の三段階で情報を整理する。\n\n【一般公開情報】\n旅人、商人、冒険者が普通に知っていてよい情報。\n\n【専門情報】\nセージ、神官、地元民、学者、役人、ギルド関係者などが判定や調査で知る情報。\n\n【GM向け非公開情報】\n裏事情、諸説、未確定の真相候補。\nただし、単一キャンペーンの黒幕や結末を固定しすぎないこと。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　地理・気候・自然環境】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■2-1. 全体地理\n・地形\n・気候\n・季節\n・海、山、川、森、砂漠、雪原、火山、湿地など\n・自然災害\n・交通の難所\n・地図上の大まかな構造\n\n■2-2. 地域区分\n舞台内を、最低5つの地域に分ける。\n各地域について以下を記載する。\n\n【地域名】\n【地形】\n【気候】\n【主な住民】\n【主要産業】\n【信仰・文化】\n【危険】\n【代表的な拠点】\n【冒険の種】\n\n■2-3. 旅と移動\n・主要街道\n・船路\n・飛行船や転移装置の有無\n・関所\n・旅の危険\n・季節による移動制限\n・一般人の移動感覚\n・冒険者が重宝される理由\n\n■2-4. 自然環境から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　歴史】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■3-1. 神話・伝承時代\n・建国神話\n・土地の始まりに関する伝承\n・神、精霊、古代種族、英雄など\n・現在の信仰や政治にどう影響しているか\n・事実かどうか曖昧な点\n\n■3-2. 古代・文明期\n・古い王朝、都市、文明、遺跡\n・魔法文明、魔動機文明、神紀文明など公式世界との接続\n・古代の失敗や遺産\n・現在も残る技術や禁忌\n\n■3-3. 近世・大災害・戦乱\n・大きな戦争\n・災害\n・侵略\n・魔域\n・蛮族や魔神との関係\n・統治体制が変わった出来事\n\n■3-4. 現在\n・現在の時代状況\n・復興中なのか、安定期なのか、衰退期なのか\n・外部との交流状況\n・現在も残る未解決問題\n\n■3-5. 歴史から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　政治・統治・法】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■4-1. 統治体制\n・最高権力者または最高機関\n・地方統治\n・役人、貴族、領主、評議会、神殿、商会などの関係\n・権力の正統性\n\n■4-2. 主要派閥\n最低5つの政治的・社会的勢力を定義する。\n\n各勢力について以下を記載する。\n\n【勢力名】\n【種別】\n【拠点】\n【表向きの目的】\n【実際の利害】\n【支持層】\n【対立相手】\n【PCとの関わり方】\n【シナリオフック】\n\n■4-3. 法と治安\n・犯罪の扱い\n・裁判や処罰\n・衛兵、奉行所、騎士団、神殿、ギルドの権限\n・冒険者が合法的に活動できる理由\n・法の届きにくい場所\n\n■4-4. 政治・法から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　信仰・宗教・祭祀】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■5-1. 主流信仰\n・主要な神格\n・公式世界の神との接続\n・神殿や社の役割\n・信仰が政治や生活に与える影響\n\n■5-2. 地方信仰・民間信仰\n・土地神\n・精霊信仰\n・祖霊信仰\n・自然崇拝\n・迷信\n・禁忌\n・民間療法や呪い避け\n\n■5-3. 祭祀と年中行事\n・祭り\n・葬儀\n・婚姻\n・成人儀礼\n・収穫祭\n・航海安全祈願\n・戦勝祈願\n・鎮魂儀礼\n\n■5-4. 宗教組織の実務\n・神官や祭祀者が普段何をしているか\n・治療、記録、教育、葬儀、相談、祓いなど\n・神殿と行政の関係\n・冒険者へ依頼が来る理由\n\n■5-5. 信仰から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　種族・人口・社会階層】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■6-1. 主要種族分布\n・人族の分布\n・蛮族との関係\n・希少種族や外来種族の扱い\n・種族ごとの社会的立場\n・差別や融和の状況\n\n■6-2. 社会階層\n・支配層\n・神官層\n・商人\n・職人\n・農民\n・漁民\n・遊牧民\n・傭兵\n・冒険者\n・被差別層や周縁民がいる場合の扱い\n\n■6-3. 家族・共同体・身分\n・家族観\n・相続\n・婚姻\n・養子\n・氏族\n・部族\n・都市共同体\n・ギルド共同体\n\n■6-4. 種族・階層から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第7章　経済・産業・流通】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■7-1. 主要産業\n・農業\n・漁業\n・牧畜\n・鉱業\n・工芸\n・魔法産業\n・交易\n・観光\n・傭兵業\n・冒険者業など\n\n■7-2. 特産品\n最低10個提示する。\n各特産品について以下を記載する。\n\n【名称】\n【産地】\n【用途】\n【価値】\n【危険や問題】\n【シナリオフック】\n\n■7-3. 交易と物流\n・主要交易路\n・交易相手\n・商会\n・関税\n・密輸\n・輸送上の危険\n・外部世界との経済関係\n\n■7-4. 経済から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第8章　都市・拠点・危険地帯】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■8-1. 主要都市\n最低5都市を作成する。\n各都市について以下を記載する。\n\n【都市名】\n【別名・通称】\n【立地】\n【人口規模の目安】\n【主な住民】\n【統治者・管理機関】\n【主要産業】\n【信仰】\n【治安】\n【冒険者への態度】\n【名所】\n【問題点】\n【シナリオフック】\n\n■8-2. 小規模拠点\n最低8つ提示する。\n村、宿場、港、砦、鉱山町、巡礼地、学術拠点、温泉地などを含める。\n\n■8-3. 危険地帯・禁足地\n最低8つ提示する。\n各地点について以下を記載する。\n\n【名称】\n【種類】\n【場所】\n【危険内容】\n【地元民の認識】\n【実際の脅威】\n【探索の見返り】\n【シナリオフック】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第9章　文化・生活・名前】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■9-1. 生活文化\n・食文化\n・服飾\n・住居\n・娯楽\n・教育\n・医療\n・旅\n・宿\n・風呂や衛生\n・季節行事\n\n■9-2. 価値観\n・名誉\n・家族\n・死生観\n・信仰\n・富\n・戦い\n・冒険者\n・外来者\n・魔法や神への感覚\n\n■9-3. 名前の傾向\n・人名\n・地名\n・組織名\n・役職名\n・異名\n・地方差\n・モチーフ由来の語感\n・命名時の注意\n\n最低20個の人名例、20個の地名例、10個の組織名例を提示すること。\n\n■9-4. 文化から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第10章　軍事・防衛・冒険者制度】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■10-1. 正規戦力\n・軍\n・衛兵\n・騎士団\n・武士団\n・神殿戦力\n・魔法戦力\n・傭兵\n・民兵\n・密偵\n\n■10-2. 冒険者ギルド\n・存在するか\n・どの都市にあるか\n・依頼の流れ\n・公的機関との関係\n・冒険者の社会的評価\n・外部冒険者が受け入れられる理由\n・嫌われる理由\n\n■10-3. 外敵・脅威\n・蛮族\n・アンデッド\n・魔神\n・魔域\n・魔物\n・盗賊\n・他国\n・自然災害\n・怪異\n\n■10-4. 防衛と冒険者制度から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第11章　怪異・魔物・特殊な危険】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■11-1. この土地特有の脅威\n最低10種類提示する。\n各脅威について以下を記載する。\n\n【名称】\n【分類】\n公式システム上の魔物分類に近いものを示す。\n例：蛮族、動物、植物、アンデッド、魔法生物、魔動機、幻獣、妖精、魔神、人族、神族など。\n\n【発生地域】\n【外見・特徴】\n【生態・行動】\n【被害】\n【対処法】\n【地元民の呼び名】\n【専門家の見解】\n【シナリオフック】\n\n■11-2. 怪異と生活の関係\n・人々がどう対処しているか\n・迷信と実害\n・専門機関の有無\n・冒険者が必要になる理由\n\n■11-3. 脅威から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第12章　主要組織】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最低10組織を作成する。\n以下の種別をなるべく含めること。\n\n・統治機関\n・宗教組織\n・冒険者ギルド\n・商会\n・職人組合\n・軍事組織\n・密偵組織\n・学術組織\n・犯罪組織\n・地方共同体\n・怪異対策組織\n・敵対的勢力\n\n各組織について以下を記載する。\n\n【組織名】\n【種別】\n【拠点】\n【目的】\n【表向きの活動】\n【裏の活動・噂】\n【代表者候補】\n【PCとの関わり方】\n【対立組織】\n【依頼例】\n【シナリオフック】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第13章　公式NPC作成への橋渡し】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nこの章では、個別NPCの詳細作成は行わない。\n公式NPC資料を作る際に必要となる役割枠だけを整理する。\n\n■13-1. 必要な公式NPC枠\n最低15枠提示する。\n\n各枠について以下を記載する。\n\n【役割枠】\n例：首都の冒険者ギルドマスター、辺境砦の守備隊長、主流神殿の高位神官、禁足地を知る老案内人など。\n\n【必要な理由】\n【拠点】\n【PCとの接点】\n【出しすぎ注意点】\n【このNPCが担う世界観の側面】\n\n■13-2. 公式NPCに担わせてはいけない役割\n・PCの活躍を奪う役\n・シナリオの真相を一方的に説明する役\n・万能解決役\n・特定キャンペーンの主役化\nなどを整理する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第14章　冒険の種】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■14-1. 低レベル向け依頼\n最低10個。\n\n■14-2. 中レベル向け依頼\n最低10個。\n\n■14-3. 高レベル向け依頼\n最低10個。\n\n■14-4. 長期キャンペーン化できる火種\n最低10個。\n\n各フックは以下の形式で記載する。\n\n【依頼名】\n【導入】\n【表向きの問題】\n【実際の問題】\n【関与地域】\n【関与組織】\n【想定される判定・場面】\n【後続展開】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第15章　運用上の注意】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■15-1. GMが最初に開示してよい情報\nPCがこの舞台を訪れる前、または初回導入で説明してよい情報。\n\n■15-2. 判定で開示する情報\n見識判定、文献判定、聞き込み、探索、神聖魔法、地元民との会話などで段階的に出す情報。\n\n■15-3. 伏せておく情報\n最初から明かすと面白さが落ちる情報。\nただし、固定キャンペーンの核心にしすぎないこと。\n\n■15-4. 変更してよい余白\n各GMや各シナリオで自由に変えてよい部分。\n\n■15-5. 変更しない方がよい根幹\nこの舞台らしさを壊さないために維持すべき部分。\n\n■15-6. やりすぎ注意点\n・固有名詞過多\n・政治設定過多\n・現実文化の丸写し\n・強力NPCの出しすぎ\n・暗さの過剰投入\n・PCの行動余地を狭める設定\nなど、危険な運用を辛口で指摘する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第16章　マスターデータ要約】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最後に、今後参照しやすいように以下をまとめる。\n\n【舞台の一文定義】\n【中核テーマ】\n【主要地域】\n【主要都市】\n【主要組織】\n【主要な脅威】\n【冒険者が必要とされる理由】\n【最も重要な対立構造】\n【この舞台でやると映えるシナリオ】\n【この舞台でやると危険なシナリオ】\n【次に作るべき資料】\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、以下を確認してください。\n\n1. 採用済み舞台案の核が壊れていないか。\n2. 特定キャンペーン専用の一本道設定になっていないか。\n3. PCが冒険する理由が複数あるか。\n4. 地理、歴史、政治、信仰、経済、生活、危険が相互に接続されているか。\n5. 現実文化モチーフが表面的ではないか。\n6. 公式世界と矛盾しそうな箇所がないか。\n7. 固有名詞だけ増えて中身が薄い箇所がないか。\n8. 都市、組織、危険地帯がシナリオフックに繋がっているか。\n9. 公式NPC作成に進めるだけの役割枠が整理されているか。\n10. GMが使いやすい公開情報・専門情報・非公開情報の整理があるか。\n11. 単発にも長期キャンペーンにも使える余白が残っているか。\n12. 舞台の美点だけでなく、歪みや問題点が明確か。",

              "template": "# 命令書：オープンワールド用・公式NPCマスターデータ作成\n\nあなたはプロのTRPGシナリオライター兼キャラクターデザイナーです。\n以下の入力要素と世界観資料をもとに、特定キャンペーン専用ではなく、オープンワールド全体で繰り返し利用できる「公式NPCマスターデータ」を作成してください。\n\nここで作成するNPCは、単発シナリオ、長期キャンペーン、都市イベント、冒険者ギルド導入、地方案内、依頼仲介、情報提供、政治的接続、特殊技能の師匠、敵対勢力との交渉などに使用できる、舞台の顔となる人物たちです。\n\nただし、公式NPCは物語の主役ではありません。\nPCの活躍を奪わず、各シナリオの自作NPCやゲストNPCの感情線を食わないように設計してください。\n彼らは「世界の厚み」「制度の顔」「土地の空気」「依頼の窓口」「遠景の権威」として機能する存在です。\n\n==================================================\n# 入力要素\n==================================================\n\n1. **対象となる舞台名**\n[ここに地方・国・島・都市圏・辺境などの名称を入力]\n\n2. **使用システム**\n[例：ソード・ワールド2.5]\n\n3. **舞台の世界観資料**\n[作成済みの世界観マスターデータ、または添付資料を指定]\n\n4. **NPC作成の方向性**\n[例：冒険者ギルド関係者を厚めにする、各都市に一人ずつ顔役を置く、神殿関係者を重視する、敵対的だが協力可能なNPCも入れる、など]\n\n5. **必要なNPC数**\n[例：主要公式NPC 8名、地方顔役 10名、など]\n\n6. **必ず含めたい役割**\n[例：支配者、ギルドマスター、副ギルドマスター、神官、商人、密偵、学者、武芸師範、蛮族側の交渉役、辺境の案内人、など]\n\n7. **避けたい役割・設定**\n[例：強すぎる同行NPC、PCを指図しすぎる上司、万能解説役、過度なギャグキャラ、独自職業の乱発、など]\n\n8. **既存NPCとの重複禁止事項**\n[既にいるNPC名、役職、性格、種族、拠点、役割などを入力]\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・公式NPCは、特定キャンペーンの核心人物にしすぎないこと。\n・PCの代わりに問題を解決できる万能NPCにしないこと。\n・強力なNPCであっても、「なぜPCに依頼するのか」「なぜ自分で解決しないのか」を明確にすること。\n・各NPCには、所属、拠点、日常業務、PCとの接点、依頼例を必ず設定すること。\n・肩書きだけ立派で何をしているか分からないNPCにしないこと。\n・表の顔、活動内容、所属機関、拠点を具体化すること。\n・NPCごとに、世界観のどの側面を体現しているかを明記すること。\n・善人ばかりにしないこと。善良、怠惰、冷徹、俗物、理想家、現実主義者、危険人物などを混ぜること。\n・ただし、安易な裏切り者だらけにもしないこと。\n・敵対可能NPCや危険人物であっても、行動原理を論理的にすること。\n・PCに対する態度は、歓迎、警戒、利用、試験、取引、観察など、NPCごとに差をつけること。\n・同じ役割のNPCを量産しないこと。\n・名前、種族、年齢、性別、外見、口調、能力、弱点、関係性を明確にすること。\n・NPCの悲しい過去は、現在の行動へ直結している場合のみ設定すること。免罪符として使わないこと。\n・「何に怒るのか」「何を恐れるのか」を主要NPCには必ず設定すること。\n・ただし、スポット的な地方顔役には簡略化してよい。\n\n==================================================\n# NPC分類\n==================================================\n\n作成するNPCは、以下の分類に分けてください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【A. 中央・国家規模の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n舞台全体の政治、信仰、軍事、外交、冒険者制度などに関わるNPC。\n強い権威や知名度を持つが、シナリオの主役にはしない。\n\n例：\n・君主、領主、皇子、王族\n・宰相、評議員\n・大神官\n・軍司令官\n・冒険者ギルド統括者\n・国家公認の大商人\n・大図書館長\n・外交官\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【B. 拠点都市の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nPCが頻繁に訪れる都市や冒険者拠点にいるNPC。\n依頼、情報、買い物、訓練、宿泊、噂話、地元事件の入口になる。\n\n例：\n・冒険者ギルドマスター\n・副ギルドマスター\n・受付\n・宿主\n・鍛冶師\n・薬師\n・神官\n・奉行、衛兵隊長\n・情報屋\n・遊技場の顔役\n・船頭、馬車組合長\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【C. 地方・辺境の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n地方ごとの空気、価値観、危険、生活感を体現するNPC。\n一話限りのゲストではなく、別シナリオでも再利用できる顔役として作成する。\n\n例：\n・村長\n・猟師\n・漁師\n・鉱山監督\n・地方神官\n・辺境守備隊長\n・密猟者\n・異民族の長\n・山の案内人\n・温泉宿の主人\n・交易路の隊商長\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【D. 特殊技能・文化・流派の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nその土地特有の技術、信仰、武術、魔法、職能、文化をPCに伝えるNPC。\n師匠、職人、研究者、芸能者、禁術管理者など。\n\n例：\n・武術道場の師範\n・陰陽師\n・修験者\n・呪符職人\n・魔動機技師\n・錬金術師\n・舞踊家\n・刀鍛冶\n・祭具師\n・怪異研究家\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【E. 危険だが交渉可能な公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n敵対勢力、蛮族、犯罪組織、怪異側、辺境勢力などに属するが、条件次第でPCと関われるNPC。\n安易な味方化は避け、緊張感を保つこと。\n\n例：\n・蛮族派閥の長\n・盗賊団の顔役\n・禁足地の守護者\n・犯罪都市の調停者\n・人族と取引する魔物\n・呪われた土地の番人\n・ならず者集団の義侠的リーダー\n\n==================================================\n# 出力形式\n==================================================\n\nまず、全体方針を出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　公式NPC設計方針】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. この舞台における公式NPCの役割\n・PCとの距離感\n・シナリオへの関与範囲\n・自作NPCやゲストNPCを食わないための制限\n・強者NPCを出す場合の運用ルール\n\n■1-2. NPC総量の方針\n・中央NPC、都市NPC、地方NPC、特殊技能NPC、危険NPCの推奨人数\n・増やしすぎると危険な枠\n・再利用しやすい枠\n\n■1-3. PCとの接点\n・依頼\n・情報提供\n・許可\n・訓練\n・物資\n・交渉\n・対立\n・同行する場合の制限\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　NPC一覧】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の表を作成してください。\n\n【名前】\n【異名】\n【分類】\n【種族】\n【性別】\n【年齢】\n【拠点】\n【所属】\n【役割】\n【PCへの基本態度】\n【主な利用場面】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　個別NPC詳細】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各NPCについて、以下の形式で詳細を作成してください。\n\n==================================================\n■“異名” 名前\n==================================================\n\n【基本情報】\n・名前：\n・異名：\n・種族：\n・性別：\n・年齢：\n・拠点：\n・所属：\n・役職：\n・立場：\n・舞台内での知名度：\n\n【一言台詞】\nそのNPCらしさが一発で伝わる短い台詞を1つ作成する。\n\n【概要】\n・何者か\n・どこで何をしているか\n・舞台全体のどの側面を体現しているか\n・PCがどう関わるか\n\n【外見】\n・体格\n・顔立ち\n・服装\n・装備\n・特徴的な小物\n・雰囲気\n\n【性格】\n・第一印象\n・実際の性格\n・長所\n・欠点\n・人間味\n・扱いにくさ\n\n【口調】\n・一人称\n・二人称\n・話し方\n・よく使う言葉\n・怒った時の変化\n・親しい相手への態度\n\n【能力・技能】\n・戦闘能力の目安\n・得意分野\n・苦手分野\n・使える技能、魔法、流派、職能\n・PCより優れている点\n・PCに任せるべき点\n\n【日常業務】\n・普段何をしているか\n・何に忙しいか\n・どのような相談が持ち込まれるか\n・PCが訪ねた時に何をしていそうか\n\n【PCとの関わり】\n・依頼を出す場合\n・情報をくれる場合\n・許可を出す場合\n・協力を拒む場合\n・敵対する場合\n・同行する場合の制限\n\n【依頼例】\n最低3つ作成する。\nそれぞれ以下を含めること。\n・依頼名\n・依頼内容\n・なぜ本人が直接解決しないのか\n・想定レベル帯\n・報酬の方向性\n・事件の裏にあるもの\n\n【人間関係】\n・味方\n・対立相手\n・苦手な相手\n・過去の関係者\n・他NPCとの接点\n\n【怒りの核】\n主要公式NPCの場合のみ記載。\n・何に一番怒るのか\n・それはなぜか\n・PCが何をすると怒るか\n・怒った時どう振る舞うか\n\n【恐怖の核】\n主要公式NPCの場合のみ記載。\n・何を最も恐れているか\n・それはなぜか\n・普段どう隠しているか\n・露呈する場面\n\n【弱点・制限】\n・なぜ万能ではないのか\n・どんな問題には関われないのか\n・権力、立場、身体、信条、過去、人間関係による制限\n・PCが活躍できる余地\n\n【運用上の注意】\n・このNPCを使う時に注意すべきこと\n・出しすぎると何が悪いか\n・やらせてはいけないこと\n・PCの活躍を奪わないための扱い\n・キャンペーン専用NPCと混同しないための指針\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　NPC同士の関係図】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n文章形式で、以下を整理してください。\n\n・協力関係\n・対立関係\n・腐れ縁\n・師弟関係\n・政治的緊張\n・商売上の利害\n・秘密を知っている関係\n・PCが間に入ると面白い関係\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　都市・地域別NPC配置】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各都市、地方、拠点ごとに、どのNPCがいるかを整理してください。\n\n【地域名】\n・常駐NPC\n・時々来るNPC\n・噂だけ聞けるNPC\n・その地域で発生しやすい依頼\n・そのNPCを絡めたシナリオフック\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　再利用用シナリオフック集】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n公式NPCを使った短いシナリオフックを、最低20個作成してください。\n\n各フックは以下の形式にすること。\n\n【フック名】\n【関与NPC】\n【導入】\n【表向きの依頼】\n【実際の問題】\n【PCが選べる対応】\n【後味】\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、最後に以下を確認してください。\n\n1. NPCがPCの活躍を奪う万能人物になっていないか。\n2. 各NPCの所属・拠点・活動内容が明確か。\n3. 同じ役割や性格のNPCが重複していないか。\n4. 公式NPCとして再利用しやすいか。\n5. 特定キャンペーンの核心に寄りすぎていないか。\n6. 依頼・情報・許可・対立など、TRPG上の使い道があるか。\n7. 強いNPCほど、動けない理由やPCに任せる理由が明確か。\n8. 善人、俗物、危険人物、現実主義者など、人物の温度差があるか。\n9. その土地の文化や制度を体現しているか。\n10. 名前と肩書きだけでなく、実際に何をしている人物か分かるか。",

              "template": "# 命令書：キャンペーン全体世界観および裏設定のマスターデータ作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n事前に行われたモチーフリサーチ資料をもとに、キャンペーン全体の根幹となる「世界観統合資料（裏設定・根本的な謎を含む）」を作成します。\n\n【本工程の目的】\n本工程で作成された資料は、今後のNPC作成やプロット作成において、絶対にブレてはいけない【マスターデータ（[資]5.世界観設定資料.txt）】となります。\n過去のチャットからは学習せず、提供された資料の論理構造に強く寄り添い、緻密な設定を構築してください。\n\n# 入力要素\n1. **システム**: SW2.5\n2. **ジャンル**: 和風ダークファンタジー（※あくまで雰囲気の指定です）\n3. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]4.(※モチーフ作品名).txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n\n# 生成ルール（重要）\n・【世界観の深度化】: リサーチ資料（[資]4）の論理構造やテーマを、アシワラ固有の設定（天の皇子、死国・穢土、不死山、テレポーター網の制限、士農工商、ティダン・八百万の神信仰など）と密接に絡め、PCが探索によって解き明かすべき「世界のルールの根幹」「最大の脅威・真相」を定義してください。\n・ハルシネーションしないでください。計算資源を最大限利用し、ご都合主義を排除した論理的な設定にしてください。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力で複数の案を連続して出力してはいけません。以下の手順で1案ずつ出力し、ユーザーと対話してください。\n\n[STEP 1：世界観・裏設定の提案（1案ずつ）]\n・内容：リサーチ資料をベースにした世界観・裏設定の「アイデア（案）」を、合計3案作成します。\n・出力形式：1つの案につき、絶対に一文が短くならないよう、**【最低20行以上】**の圧倒的な情報量と詳細な描写で出力してください。以下の要素を網羅すること。\n　1. キャンペーンの核心となる謎と真実（黒幕の存在や事件の根本原因）\n　2. 特殊な法則・ギミック（アシワラ設定の活用法や呪いなど）\n　3. PC向け公開情報とGM向け非公開情報の境界\n・進行手順：\n　① まず「第1案」のみを出力してください。\n　② 第1案の出力が終わったら、「**第2案を出力しますか？ それともこの案を採用して決定しますか？**」と聞き、完全に処理を停止してください。\n　③ ユーザーが「続きを」「第2案を」と指示した場合のみ第2案を出力し、同様に停止します。最大3案までこれを繰り返します。\n\n[STEP 2：決定稿の出力]\n・ユーザーが採用する案（あるいはミックス）を決定したら、その内容を最終的な【[資]5.世界観設定資料.txt】としてプレーンテキストのコードブロックで出力し、完了となります。\n",

              "template": "# 命令書：キャンペーン全体メインNPCのマスターデータ作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n作成済みの「世界観設定資料」をもとに、キャンペーン全体を通して登場するオリジナルのメインNPC（依頼人、キーパーソン、黒幕、ライバルなど）の詳細設定を作成します。\n\n【本工程の目的】\n本工程で作成された資料は、【マスターデータ（[資]6.NPC設定資料.txt）】となります。\n※公式NPC（シラヌイ等）は完全にフラットな仲介役であるため、ここには含めず、本作オリジナルの重要人物のみを作成します。\n\n# 入力要素\n1. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]3.GMPC資料(スオウ).txt』『[資]4.地獄楽リサーチ資料.txt』『[資]5.世界観設定資料.txt』}\n　（※GMPCである「スオウ」と深い因縁や対立・共闘の関係性を持たせ、経歴卓としての側面を強調すること）\n\n# 生成ルール（重要）\n・【★絶対厳守：キャラクターの高度な論理性と情報の非対称性】: すべてのNPC、特に悪役や黒幕は「高度な知性と論理」を持っています。自身の目的達成のために最も合理的で無駄のない手順を踏み、PCに都合よくボロを出すようなことは絶対にさせないでください。「認知の限界」を厳密に設定してください。\n・【モチーフの反映】：『地獄楽』における「監視役と罪人」のような歪んだバディ関係や、常軌を逸した目的を持つ超越者（天仙など）のエッセンスを、SW2.5のルールの範疇でNPCの役割や思想に組み込んでください。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力で複数のNPC、または複数の案を連続して出力してはいけません。\n\n[STEP 1：NPC人数の決定]\n・まず最初に「**今回のキャンペーンで作成するメインNPCは何人ですか？（※GMPCを除く）**」とユーザーに質問し、完全に処理を停止してください。\n\n[STEP 2：NPCごとのアイデア出し（1人ずつ、1案ずつ）]\n・ユーザーが人数（例：5人）を指定したら、1人目のNPCのアイデア出しを開始します。\n・1人のNPCにつき「3つの異なる方向性の案」を作成しますが、必ず**【1案ずつ】**出力してください。\n・1つの案は、そのNPCの「表の顔」「裏の顔・目的」「世界観（[資]5）およびスオウとの関わり」を含め、一文が短くならないよう**【最低20行以上】**で重厚に語ってください。\n・進行手順：\n　① 対象となるNPCの「第1案」を出力。\n　② 出力後、「**このNPCの第2案を出力しますか？ それともこの案を採用しますか？**」と聞き、処理を停止。\n　③ ユーザーが採用案を決定したら、直ちに**[STEP 3]**へ移行します。\n\n[STEP 3：決定稿のマスターデータ出力と次NPCへのループ]\n・[STEP 2]で1人分のNPC設定が決定したら、すぐにそのNPCのデータを以下の【SW2.5 魅力構築型NPCプロファイルシート】に従って詳細に書き起こし、1つのプレーンテキストのコードブロック（[資]6.NPC設定資料.txt 用）として出力してください。\n・出力完了後、「**次のNPCのアイデア出し（STEP 2）に進みますか？**」とユーザーに確認し、処理を停止してください。\n・ユーザーの同意を得たら、次のNPCの[STEP 2]へ戻り、指定された人数分このループ（STEP 2 → STEP 3 → STEP 2...）を繰り返します。\n・全員分の作成が完了したら、最終的な完了報告を行ってください。\n\n==================================================\n【SW2.5 魅力構築型NPCプロファイルシート】\n==================================================\n\n■基本情報（SW2.5データ基盤）\n【名前】\n【種族】　　　　　【年齢】　　　【性別】\n【主な技能／レベル】（例：ファイター7 / プリースト（ルミエル）5）\n【穢れ度】（人族・蛮族の判別、蘇生歴など設定上の立ち位置）\n【信仰／信条】（神紀文明の神々への信仰、あるいは無神論など個人的な行動原理）\n\n■存在意義と舞台への干渉（記事理論：役割と舞台設定のセット運用）\n【シナリオ上の役割】\n（例：PCへの依頼人、情報提供者、事件の黒幕、道中での支援者など。TRPGにおける最大の存在意義を明確化）\n【世界観・地域社会との繋がり】\n（例：冒険者ギルドの受付、特定国家の魔動機殻部隊員、蛮族領域の斥候など。ラクシアという舞台設定に対して、このNPCがどう干渉し、どんな社会的立場にあるか）\n\n■魅力の配合バランス（記事理論：リアルとアニメ的魅力のブレンド）\n【リアルな魅力要素（シリアス・現実味）】\n（例：日々の糧を得るための苦労、家族への現実的な愛情、異種族間の寿命差に対する葛藤、厳格な倫理観など）\n【漫画・アニメ的な魅力要素（デフォルメ・属性）】\n（例：タビット特有の極端な知識欲と愛らしさ、ルーンフォークの無機質なツンデレ、特定部位の強調、記号的な性癖など）\n【配合比率イメージ】\n（リアル：アニメ ＝ 〇：〇。シナリオ全体のトーンに合わせて比率を決定し、描写の指針とする）\n\n■要素の構成とモチーフ（記事理論：要素の分類と構築）\n【外見的特徴・要素】\n（例：銀髪、常に身に着けているマギスフィア、隻眼、過剰な装飾など。箇条書きで要素を羅列）\n【内面的特徴・要素】\n（例：義理堅い、金銭に執着する、魔法至上主義、極度の方向音痴など）\n【ベースとしたモチーフ】\n（例：「世話焼きな幼馴染」「ハードボイルド映画の悪徳警官」など、着想の土台となった既存の概念やキャラクター像）\n\n■二面性と深み（記事理論：表と裏の要素）\n【表の顔（周囲からの評価・普段の態度）】\n（例：誰にでも愛想が良く、値引きにも応じる気のいい街の武器屋の親父）\n【裏の顔（隠された秘密・本音・過去）】\n（例：実はかつて名のある「奈落の魔域（シャロウアビス）」探索者であり、過去のトラウマから特定の依頼には絶対に首を突っ込まない）\n【※例外指定（裏表なし／絶対悪／真のヒーロー）】\n（※あえて「裏表のない純粋な善」や「一切の善意を持たない完全な蛮族（絶対悪）」とする場合は、その理由とシナリオ上で果たす強烈な役割・演出意図をここに記載）\n\n■ロールプレイ（RP）指針\n【一人称】\n【二人称】\n【口調・語尾の特徴】\n【印象的なセリフ（フレーバーテキスト）】\n・「（表の顔を象徴するセリフ）」\n・「（裏の顔、または重要な局面で放つセリフ）」\n・「（世界観やラクシアの情勢に対する独自の視点を示すセリフ）」\n==================================================\n",

              "template": "# 命令書：キャンペーン途中話（第2話以降）のシナリオフック作成\nあなたはプロのTRPGシナリオライターであり、「ソード・ワールド2.5（SW2.5）」のシステムおよび、オリジナル舞台「日輪の島アシワラ」の世界観を深く理解した優れたゲームマスターです。\n\n【目的】\nすでに決定しているキャンペーンの「第1話」と「最終話」の情報を踏まえ、提供された資料（『[資]1』〜『[資]6』）を掛け合わせ、その間を繋ぐ「中間話（第2話以降）」のシナリオフック＆展開案を作成します。\n\n【入力要素（キャンペーンの前提）】\n・キャンペーン全体の概要（黒幕と目的）：[ ★[資]5.世界観設定資料.txt 及び [資]6.NPC設定資料.txt の内容に準拠 ]\n・今回作成する話数とPCレベル：[ ★入力（例：第3話／4レベル／全10話） ]\n・中間話の舞台／テーマ：[ ★入力（例：指定なし、または特定の都市名） ]\n　※「指定なし」の場合でも、AIが自動的にアシワラ全土から舞台を選定してください。\n・モチーフ作品／楽曲：[ ★入力（指定なしの場合は、キャンペーン全体のモチーフから派生させるかAIが選定） ]\n　※【★最重要リサーチ＆モチーフ指示】：中間話単体としても、有名なエンタメ作品からWEB上で全貌が把握しやすい媒体まで幅広く対象とし、必ず【具体的な1つのエピソードを探して絞るか、各案それぞれに異なるエピソードを探して題材に】してください。構造や論理に【強く寄せて】クオリティを高めてください。\n\n【厳守事項（シナリオの前提）】\n1. 中間話としての独立性：いきなり最終ボスの話ばかりするのではなく、その話数単体で「局所的な事件」として起承転結が成立し、プレイヤーが楽しめる内容にしてください。\n2. 舞台の柔軟な活用と多様性：アシワラ特有の文化を強引に絡める必要はなく、一般的な魔法や魔物のギミックを主軸にしてください。また、【中間話の舞台／テーマ】で「指定なし」とされた場合、出力する5つのシナリオ案の舞台が偏らないよう割り振ってください（アマツ近郊、遠方、辺境、死国、その他）。\n3. 依頼の自然な導入と「予想される荒事」の提示（最重要）：現地の役人ではなく冒険者に依頼が回る理由や、予想されるエネミー・荒事（戦闘、危険地帯の探索など）の提示は必要ですが、そこに文字数や思考を割きすぎないこと。理由の正当化よりも、シナリオ本編のフックとしての魅力と自然なストーリーラインの構築に注力してください。（エネミー種別は幅広く選択）\n4. 公式NPCの完全中立化（絶対厳守）：依頼人は別に存在します。シラヌイ等の「公式NPC」は【完全にフラットな中間（仲介）役】に徹してください。絶対に主軸にしてはいけません。\n5. ルールの拡大解釈禁止（最重要）：SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n6. 辻褄を合わせることの徹底：因果関係を必ず明記すること。\n7. 真相の深度化（HOWとWHY）：単なる魔法のゴリ押しや単純な毒殺などのチープな手段、金銭目的や単なる狂気といった浅い動機を禁じます。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力でSTEP1〜3を連続して出力してはいけません。ユーザーからの指示がないのに、勝手に案を選んでSTEP2やSTEP3の例示・シミュレーションを行うことを固く禁じます。\n\n[STEP 1：徹底リサーチ計画とフック（謎）の分割出力]\n・内容：事前にリサーチしまとめた資料に基づいて、構造を強く真似た5個の「中間話シナリオ案」を作成しますが、クオリティを維持するため一度に全てを出力しないでください。※この段階では今回の事件の真相は考えないでください。\n・出力順序：\n　① まずは【案1〜案3】の3件だけを、以下の項目のみ各3〜4文で出力してください。\n　　・【タイトル】\n　　・【インスピレーション源（参考にした具体的なエピソード等を明記）】\n　　・【導入と依頼理由（展開の自然さを重視し、なぜ冒険者か、どんな荒事が予想されるかを簡潔に。公式NPCは中立）】\n　　・【不可解な謎・現場の状況】\n　② 出力後、「残りの案（案4〜案5）を見ますか？ それとも、この中から真相を深掘りする案を選びますか？ 番号をお知らせください。」と聞いて、完全に処理を停止してください。ユーザーから残りの案を求められた場合のみ、案4〜5を出力してください。\n\n[STEP 2：真相ルートの提案]\n・ユーザーが選んだ案に対して、以下の5つのベクトルで「今回の事件の真相（と、全体黒幕へどう繋がるかの伏線）」を各3つずつ提案してください。\n　各ルートは一文が短くならないよう、最低十行で執筆してください。\n　出力は各ルートを3つ出すごとに止め、出力後はユーザーが「続きを出して」等と指示した場合のみ次の3件を出力し、同様に進行してください。\n　1. 心温まる・人情ルート①〜③ / 2. シリアス・陰謀ルート①〜③ / 3. ホラー・怪異ルート①〜③ / 4. 悲劇的・ビターエンドルート①〜③ / 5. 予想外・ドタバタルート①〜③\n・出力後、「どの真相ルートを採用しますか？ または、これらをミックスしますか？」と聞いて、完全に処理を停止してください。\n\n[STEP 3：完全版中間話フックの出力]\n・ユーザーが選んだ真相ルートをもとに、以下の解像度で完全版を出力して完了となります。出力はプレーンテキストのコードブロックでおこなうこと。\n■ 中間話シナリオ案：【タイトル】\n・舞台／テーマの反映：（指定テーマをどうアシワラに落とし込んだか）\n・インスピレーション源：（具体的なエピソードと、モチーフにどう寄せたか）\n・導入と依頼理由（フック）：（誰からどんな依頼を受け、どんな事件に直面するか。予想される荒事も提示。最低4〜5文で詳細に）\n・展開と舞台の活用：（どのような調査や戦闘が発生するか。最低4〜5文で詳細に。論理構造重視）\n・結末とキャンペーン全体への伏線：（事件はどう解決し、最終話に向けて「何」が判明するのか。最低4〜5文で詳細に）\n・この話数限定のメインNPC案（1〜2名）：\n　1. [名前]（職業／クラス）：（表の顔と性格）／（裏の顔・隠された切実な動機や秘密）\n",

              "template": "# 命令書：キャンペーンシナリオの全体プロット作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の「入力要素」をもとに、SW2.5のキャンペーン（全10話）TRPGシナリオの全体プロットを作成します。\nプレイヤーが直感的に「面白そう」「この事件を解決したい」と思える【長期的な脅威】や【局所的な事件の連鎖】を起点に、全体のあらすじ、そしてキャンペーン全体のプロットを提案してください。\n\n【本工程の目的】\nここで作成された資料は、続く「整合性確認」での論理チェック、「シナリオ本編作成」などの土台となる極めて重要な根幹マスターデータとなります。\n※世界観やNPCの根幹設定は添付ファイル（[資]5.世界観設定資料.txt、[資]6.NPC設定資料.txt）に依存し、本工程では「10話にわたる緻密なストーリーライン（起承転結）と伏線の配置」に全計算資源を集中してください。\n過去のチャットからは学習しないようにお願い致します。\n\n# 入力要素\n1. **第1話のフック**: [ ★ここに作成した第1話のあらすじ等を入力 ]\n2. **最終話のフック**: [ ★ここに作成した最終話のあらすじ等を入力 ]\n3. **システム**: SW2.5\n4. **ジャンル**: 和風ダークファンタジー（※あくまで雰囲気の指定です）\n5. **エンディング想定**: ハッピーエンド\n6. **シナリオ形式**: キャンペーン(全10話)\n7. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]3.GMPC資料.txt(※存在する場合のみ)』『[資]4.(※モチーフ作品名).txt』『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n8. **使用してはいけない要素**: 世界観や公式NPCについて設定や存在を揺るがしかねない要素や設定を加えること\n\n# 生成ルール（重要）\n・入力された第1話・最終話のフックと『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』の情報を完全に統合し、全「10」話のプロットを構築すること。\n・【フックの拡張とアシワラ設定の強制適用】: 各話のギミックに、「天の皇子」「死国・穢土」「不死山」「テレポーター網の制限」「士農工商の身分差」「ティダン・八百万の神信仰」などの要素を必ず深く絡めること。\n・【冒険者への依頼理由の必然性と荒事の予想】: すでに依頼を受けた状態、あるいは事件に巻き込まれた状態（ホットスタート）を前提とし、なぜ現地の役人や警備隊ではなく冒険者に依頼が回ってきたのか、そして各話で「どのようなエネミーと荒事（戦闘や危険）が予想されているのか」を、各話プロットの導入部で必ず明確に描写してください。エネミーの種別の分類は「蛮族、動物、植物、幻獣、アンデッド、魔法生物、魔動機、人族、神族」の中から幅広く選択すること。\n・【公式NPCの完全中立化（絶対厳守）】: 公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。主軸化、関係者設定、個人的感情の付与は一切禁止です。\n・【モチーフへの完全なる寄り添い】: 『[資]4.(※モチーフ作品名).txt』の構造をリスペクトし、完全に真似る勢いでSW2.5のシステムに落とし込んでください。\n・【ルールの拡大解釈禁止（最重要）】: SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n・PC達には基本的に選択肢を与えず、エンディングも含め一本道であるものとして作成すること。\n・登場するNPC間の表裏の関係性、因縁などを考慮し、人間ドラマを感じさせる展開を取り入れること。\n・【★絶対厳守：キャラクターの高度な論理性】: すべてのNPC、特に悪役や黒幕は「高度な知性と論理」を持って行動します。「PCに都合よく立ち回るための不自然なミス」や「致命的な視点の見落とし」「突然の自白」など、三流でご都合主義的な行動は絶対にさせないでください。悪役は自身の目的達成のために最も合理的で無駄のない手順を踏みます。\n・【★絶対厳守：情報の非対称性】: キャンペーン全体を通し、NPCは「自分がその時点で知り得る情報」のみに基づいて行動・発言します。PCが持っている事実や情報を、NPCが先回りして知っているような不整合を起こさないでください。\n・【★絶対厳守：イベントの定義と規模】: 1話約3時間(シナリオ本文は2時間,戦闘は1時間)のセッションを持たせるため、展開の最小化・省略化を固く禁じます。TRPGにおける「イベント」とは、ただ何かを発見する「だけ」や、NPCに話してすぐ解決するような「間を持たせられないもの」ではありません。必ず【目的】【行く手を阻む明確な障害やジレンマ】【解決に要するPCの試行錯誤やダイス判定・交渉】をセットで設計し、各話ごとに複数のイベントを重厚に描写してください。\n・【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n・起承転結、伏線、ミスリード、どんでん返しなどの物語として面白くなるようにメリハリをつけて要素を取り入れること。\n・全体的に、あからさまなミスリードや理不尽な展開は控えること。\n・キャンペーンの幕引きとして、次回があるかもしれないような余韻や広がりは残さず、一つの終わりとして確立させること。\n・ハルシネーションしないでください。\n・回答のクオリティを上げるため緻密な思考を心掛けてください。計算資源を最大限利用してください。\n\n# 出力フォーマットに関する重要指示\n本工程で作成されたプロットは、今後の工程で「.txt」ファイルとしてAIに読み込ませるための最重要マスターデータとなります。\n出力はプレーンテキストのコードブロックにお願いいたします。\nそのため、挨拶や「承知いたしました」等のAIの会話文は一切挟まず、以下のフォーマットに従ってデータのみを出力してください。\n\n[はじめに]\n第1話・最終話のフック（モチーフ構造）をどのように拡張し、アシワラ独自の設定（文化、地理など）および『[資]5.世界観設定資料.txt』をキャンペーンの根幹にどう組み込んだかを解説してください。\n\n[あらすじ]\n今回のキャンペーンシナリオの全体像をわかりやすくまとめてください。\n\n[シナリオ及びキャラクターに関する伏線]\nキャンペーン内で提示され、キャンペーン内で回収される伏線とそのギミック（どの話数で提示され、どの話数で回収されるか）を列挙してください。\n\n[各話ごとの起承転結及びどんでん返し（全10話）]\n※注意：AI特有の「駆け足の要約」を禁じます。各話のイベントは必ず「障害」と「判定」を伴うよう詳細に記述してください。敵の正体や真相（事態の元凶など）は、敵の不用意なミスや自白ではなく、必ず「PCの能動的な探索や行動」によって論理的に明らかになるよう構成してください。また、各話の導入で「なぜ冒険者か」「どんな荒事が予想されるか」を明記してください。\n\n【キャンペーンプロット設計のやり方・形式】\n1話、2話……などという風に設定し、どの話がどの役割を持っているか明示すること。\nまた、必ず各話、内容を詳細に記載すること。\n以下の『キャンペーン展開のやり方』の定義に従って各話の役割を割り振ること。\n\n【キャンペーン展開のやり方】\n[NPC顔見せ卓]\n - 本編に入る前、短話完結の小エピソード。がっつり絡むわけではなく、依頼人がそのNPC、あるいは展開上そのNPCが重要人物として登場する流れがあるなど、PCたちに接点を持たせる為の回\n - 上記の説明からも分かる通り、NPC1人につき1話のパターンが多い。ただしこれは主要なNPCのみに限られるものとする。\n\n[導入部]\n - インパクトのある幕開け、プロローグ\n - ◯◯編や◯章などがある長期キャンペーンである場合、それごとに挟まれる可能性がある\n\n[展開部]\n - 必要に応じて複数回挟み、話数を増やす\n - 必要に応じて軽い情報やそれに伴う展開、伏線を散りばめる\n\n[幕間部]\n- 閑話休題的に挟まれる1話完結の話\n- あまり本編とは関係のないものの、後ほどあっと言わせる為の細かい伏線が気づかれない程度に貼られたりすることもある\n\n[情報部]\n - 前提として挟まない可能性がある\n - キャンペーンにおいての目標や謎をキャラクター達へ明かすことを大きく取り扱う\n - ロールプレイメインの部でもある\n - その為、戦闘したとしても軽くあしらえる程度の雑魚敵。基本は戦闘もなし。\n - キャンペーンに1回のみ挟む構造が望ましい。展開部に小刻みに情報を散りばめるやり方もある為、前提で説明した通り、挟まない場合もある。\n - 話数の多い長期キャンペーン(5話以上)であれば早めに置いて、キャンペーンにおける目標と設定を明かす回にするといい。こういったキャンペーンは基本、ショートキャンペーンの寄せ集めになっていることが多いため。要は◯◯編や第◯章といった区切りのことをいうが、例えばキャンペーンの中で宇宙人と戦う部隊に所属するならば、「宇宙人と戦う」「奴らはどういう存在か」「どうしてこんなことになっているのか、奴らの目的はなんなのか」「これからやっていくべき同一条件の説明」「その他etc...」といった感じでやっていくことや目標を早めに共有する、など。あくまでも一例である。例えば「ここを段階的に調査していくだけ」で物語上はそれに伴って話が進んでいくパターンやそれに類似する場合、簡潔な説明で済むので端折ってもいい。\n - 逆に話数の少ない短期キャンペーン(4話以下)であれば、そういった固定の目標を初めに定めたりはしないので(起承転結でコンパクトに押さえられるため)、終盤の[戦闘部]の前に置いて、[情報部]でキャンペーンに於いての重大情報を明かした後、強敵が現れて次回！といったような劇的な幕引きも演出することができる。\n\n[戦闘部]\n - 情報は最低限に、[展開部]または[情報部]を経て、強敵を倒すだけの部分を設ける\n - その後の話の幕引きとして、大きな展開を見せる起点としても使える部\n\n[戦闘部+エピローグ]\n - ラスボスとの戦いはここに類する\n - その後は余韻のを残すエピローグ\n\n◆補足\n上から順に沿って一つずつとするのではなく、必ず説明を鑑みて、必要な箇所をその話の該当する役割に沿って、並び替えたり追加したりしてください。展開部が3回続くとかも全然あるわけです。臨機応変に頼みます。\n",

              "template": "# 命令書：シナリオの自動洗練と深度化（整合性ロジックチェッカー）\nあなたはベテランのTRPGシナリオライター兼、極めて論理的で厳格な編集者（ロジックチェッカー）です。\nこれまでの会話履歴にある「最新のシナリオプロット」または「直前に出力されたシナリオのパート」を対象に、**深度（深み）・整合性・面白さ**を飛躍的に向上させるための推論と改稿を行ってください。\n\n新たな入力情報は与えません。既存の文脈と添付資料（[資]1〜[資]6を含む各種辞書・資料）の知識を最大限に活用し、以下の工程で自律的にブラッシュアップを実行してください。\n\n---\n\n### 【工程1：クリティカル・レビュー（思考プロセス）】\nまず、現状の対象テキストに対して「意地悪で極めて論理的な読者」の視点で徹底的に「突っ込み」を入れ、論理的弱点を洗い出してください。\n以下の観点で厳密にチェックを行い、課題点を列挙すること。\n\n1.  **登場人物のIQと論理的整合性（★最重要追加項目）**\n    * 悪役や黒幕は「致命的な視点の見落とし」をしていないか？彼らの行動は自身の目的に対して真に合理的か？\n    * 突然の自供など、三流悪役のような「シナリオ進行上のご都合主義の行動」をとっていないか？\n    * NPCが「本来知り得ない情報」をもとに行動・発言していないか？（情報の非対称性の破綻。特にキャンペーンでは話数をまたぐ情報の管理に注意）\n    * ルールの「拡大解釈（曲解）」を利用したアンフェアな行動やトリックになっていないか？\n2.  **公式NPCの完全中立化（★最重要追加項目）**\n    * 公式NPC（シラヌイ、ムーザン等）が、依頼や関係者に対して「個人的な特別な感情」を持っていたり、関係者設定になっていたりしないか？（完全にフラットな仲介役になっているか）\n3.  **冒険者への依頼理由と荒事の必然性（★最重要追加項目）**\n    * 「なぜ役人や警備隊ではなく冒険者が呼ばれたのか」という理由付けと、「どのような荒事が予想されるのか」という危険性の提示は、論理的で納得できるものになっているか？（TRPGとしての戦う理由があるか）\n4.  **モチーフ構造への寄り添い（★追加項目）**\n    * ベースとなった「具体的な1つのエピソード（文学・実話等）」の優れた構造にしっかり寄り添いつつ、TRPGのシナリオとして破綻なく成立しているか？\n5.  **アシワラ固有の論理と世界観の整合性（★アシワラ特化項目）**\n    * 公式NPC（シラヌイ、ムーザン、ギン、ラショウなど）の性格や能力、立ち位置から逸脱した行動をとっていないか？\n    * テレポーターの制限、死国や穢土、不死山などの地理的・歴史的制約を無視していないか？\n6.  **イベントの密度と質（★規模チェック）**\n    * 各フェーズのイベントが、ただ何かを発見する「だけ」や、話して終わる「だけ」の薄い内容に要約されていないか？\n    * プレイヤーが試行錯誤やダイス判定、交渉を行うための「間」と「障害」が設計されているか？（1話あたり約3時間(シナリオ本文は2時間,戦闘は1時間)プレイできる分量か）\n7.  **因果律の強度**\n    * 「なぜそこでそうなるのか？」に必然性はあるか？（ご都合主義の排除）\n    * 敵や黒幕の行動原理は、彼らの信念や背景に基づいているか？（ただの悪役になっていないか）\n8.  **ミスリードと伏線の品質**\n    * そのミスリードはPC（プレイヤー）にとって「騙された！」と納得できるものか？（理不尽な後出しジャンケンになっていないか）\n    * 伏線は適切に配置されているか？\n9.  **TRPGとしての構造**\n    * PC（プレイヤーキャラクター）が主役になっているか？\n    * 一本道であっても、PCが「自分たちの意思で選んだ」と感じさせる誘導ができているか？\n10. **展開の必要性**\n    * そのシーンは物語の進行や事件の解決（または脅威の描写）に不可欠か？（蛇足の削除）\n    * 感情を揺さぶる「谷（受難）」と「山（カタルシス）」の落差は十分か？\n11. **キャンペーン展開の適切さ**\n    * 各話に割り振られた役割（[導入部]、[展開部]、[情報部]、[戦闘部]など）は、キャンペーンの総話数に対して適切なペース配分で配置されているか？\n    * [情報部]で明かされる謎や、[戦闘部]の配置に不自然な偏りはないか？\n\n### 【工程2：ソリューション（修正案の提示）】\n工程1で洗い出した課題に対し、具体的な解決策（アイデア）を考案してください。特に「論理の破綻」「ルールの拡大解釈」「冒険者への依頼理由の欠如」「公式NPCの中立性違反」「イベントの短縮・規模不足」「悪役の頭の悪さ」が発見された場合は、計画と障害をより緻密で隙のないものに再構築してください。\n\n### 【工程3：リファイン・アウトプット（最終出力）】\n修正案を反映し、**「洗練された完全版（プロットまたはシナリオパート）」**を出力してください。\n記述は具体的かつドラマチックに行い、各イベントの「障害」と「判定」を明確化し、GMがそのままマスタリングの指針にできるレベルまで解像度を高めてください。\n\n---\n\n**■出力形式に関する重要指示**\n出力はプレーンテキストのコードブロックにお願いいたします。\n本工程で最終出力される内容は、次工程への重要なマスターデータとなります。\n分析レポート等の後、最終的な【洗練版テキスト】を出力する際は、単なるプレーンテキストのコードブロックとして出力してください。\n\n1.  **【分析レポート】**：懸念点と、それをどう論理的に修正したか（工程1・2の要約）。\n2.  **【洗練版テキスト】（※独立して出力）**：プロットまたはシナリオパートの洗練された内容。\n    * 変更・加筆した部分は、なぜそうしたかが分かるように（※注釈：論理的整合性のための修正、等）などで補足を入れること。\n\n**■制約事項**\n* ハルシネーション（事実に基づかない捏造）を避け、これまでの設定と矛盾しないこと。\n* 安易な解決や自白を避け、キャラクターが葛藤し、成長するプロセスを重視すること。\n* 思考力を最大限に使用し、長文になっても構わないので緻密かつ論理的に構成すること。\n",

              "template": "# 命令書：キャンペーン形式各話の詳細シナリオプロットおよびゲストNPC作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の「入力要素」をもとに、SW2.5の連続キャンペーンシナリオにおける【今回作成する指定話数】の詳細なTRPGプロットを作成します。\n作成された【キャンペーン全体プロット】と『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』のマスターデータを土台とし、情報量の多い緻密な各話用プロットを提案してください。\nその際、必ず、過去のチャットからは学習しないようにお願い致します。\n\n# 入力要素\n1. **全体プロットデータ**: [ ★ここに作成した「全体あらすじ」「各話ごとの起承転結」を入力 ]\n2. **今回作成する話数**: 第[ N ]話 （全[ X ]話中）\n3. **今回の話の役割**: [導入部、展開部、幕間部、情報部、戦闘部、エピローグのいずれか]\n4. **システム**: SW2.5\n5. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]3.GMPC資料.txt(※存在する場合のみ)』『[資]4.(※モチーフ作品名).txt』『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n6. **使用してはいけない要素**: 世界観や公式NPCについて設定や存在を揺るがしかねない要素や設定を加えること。\n\n# 生成ルール（重要）\n・【キャンペーン本筋との連動と情報の開示】: 今回の話がキャンペーン全体の中でどのような役割（展開、情報開示など）を果たすのかを明確にしてください。全体マスター設定に基づき、黒幕の陰謀がどう進行しているのか、そして今回の事件を通じてPCたちに「キャンペーンの謎に関するどんな情報」がどの程度明かされるのか（あるいは誤認させられるのか）を緻密に設計してください。\n・【冒険者への依頼理由の必然性と荒事の予想】: ホットスタートを前提とし、なぜ現地の役人や警備隊ではなく冒険者に依頼が回ってきたのか、そして「どのようなエネミーと荒事（戦闘や危険）が予想されているのか」を、プロットの起点で必ず明確に描写してください。\n・【公式NPCの完全中立化（絶対厳守）】: 公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。主軸化、関係者設定、個人的感情の付与は一切禁止です。\n・【ゲストNPCの追加制限】: キャンペーン全体を通した主要NPC（[資]6のNPC）以外に、今回の話数限定で登場する「ゲストNPC（今回の直接の依頼人、現場の責任者、中ボスなど）」を最低1人〜最高3人まで追加し、深掘りしてください。\n・【★絶対厳守：ご都合主義の排除と情報の非対称性】: 全NPCは「高度な知性と論理」で行動します。PCの行動を待たずにボロを出したり、伏線なしに新事実が生える論理飛躍を固く禁じます。悪役は自らの計画や弱点を絶対に自分から語らず、PCから決定的な事実を突きつけられない限り言い逃れようとします。\n・【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n・ハルシネーションしないでください。計算資源を最大限利用してください。\n\n# 出力フォーマットに関する重要指示\n本工程で作成された各話プロットおよびゲストNPC設定は、今後の工程（本編シナリオデータ作成など）の土台となる極めて重要なデータとなります。\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n[今回のエピソードの役割とキャンペーン本筋への影響]\n今回の事件の局所的な論理構造（HOWとWHY）に加え、キャンペーン全体の進行度（黒幕の動向、今回回収される伏線、新たに提示される謎）を簡潔に記載。\n\n[ゲストNPC一覧及び背景設定]\n※今回の話数限定で登場する主要なゲストNPC（1〜3名）について、必ず以下のフォーマットで出力すること。（全体メインNPCのデータは出力不要ですが、彼らが今回のエピソードにどう絡むかはプロット内で描写してください）\n\n==================================================\n【SW2.5 魅力構築型NPCプロファイルシート】\n==================================================\n\n■基本情報（SW2.5データ基盤）\n【名前】\n【種族】　　　　　【年齢】　　　【性別】\n【主な技能／レベル】（例：ファイター7 / プリースト（ルミエル）5）\n【穢れ度】（人族・蛮族の判別、蘇生歴など設定上の立ち位置）\n【信仰／信条】（神紀文明の神々への信仰、あるいは無神論など個人的な行動原理）\n\n■存在意義と舞台への干渉（記事理論：役割と舞台設定のセット運用）\n【シナリオ上の役割】\n（例：PCへの依頼人、情報提供者、事件の黒幕、道中での支援者など。TRPGにおける最大の存在意義を明確化）\n【世界観・地域社会との繋がり】\n（例：冒険者ギルドの受付、特定国家の魔動機殻部隊員、蛮族領域の斥候など。ラクシアという舞台設定に対して、このNPCがどう干渉し、どんな社会的立場にあるか）\n\n■魅力の配合バランス（記事理論：リアルとアニメ的魅力のブレンド）\n【リアルな魅力要素（シリアス・現実味）】\n（例：日々の糧を得るための苦労、家族への現実的な愛情、異種族間の寿命差に対する葛藤、厳格な倫理観など）\n【漫画・アニメ的な魅力要素（デフォルメ・属性）】\n（例：タビット特有の極端な知識欲と愛らしさ、ルーンフォークの無機質なツンデレ、特定部位の強調、記号的な性癖など）\n【配合比率イメージ】\n（リアル：アニメ ＝ 〇：〇。シナリオ全体のトーンに合わせて比率を決定し、描写の指針とする）\n\n■要素の構成とモチーフ（記事理論：要素の分類と構築）\n【外見的特徴・要素】\n（例：銀髪、常に身に着けているマギスフィア、隻眼、過剰な装飾など。箇条書きで要素を羅列）\n【内面的特徴・要素】\n（例：義理堅い、金銭に執着する、魔法至上主義、極度の方向音痴など）\n【ベースとしたモチーフ】\n（例：「世話焼きな幼馴染」「ハードボイルド映画の悪徳警官」など、着想の土台となった既存の概念やキャラクター像）\n\n■二面性と深み（記事理論：表と裏の要素）\n【表の顔（周囲からの評価・普段の態度）】\n（例：誰にでも愛想が良く、値引きにも応じる気のいい街の武器屋の親父）\n【裏の顔（隠された秘密・本音・過去）】\n（例：実はかつて名のある「奈落の魔域（シャロウアビス）」探索者であり、過去のトラウマから特定の依頼には絶対に首を突っ込まない）\n【※例外指定（裏表なし／絶対悪／真のヒーロー）】\n（※あえて「裏表のない純粋な善」や「一切の善意を持たない完全な蛮族（絶対悪）」とする場合は、その理由とシナリオ上で果たす強烈な役割・演出意図をここに記載）\n\n■ロールプレイ（RP）指針\n【一人称】\n【二人称】\n【口調・語尾の特徴】\n【印象的なセリフ（フレーバーテキスト）】\n・「（表の顔を象徴するセリフ）」\n・「（裏の顔、または重要な局面で放つセリフ）」\n・「（世界観やラクシアの情勢に対する独自の視点を示すセリフ）」\n==================================================\n\n[各話用シナリオプロット（高密度イベント指定）]\n※【最重要警告】：AI特有の「駆け足の要約」や「1フェーズにつき1つの場面しか書かない簡素な出力」を固く禁じます。\n各フェーズで発生するイベントを箇条書きで細かく分割し、圧倒的な情報量と論理性を持って出力してください。各イベントには必ず【場所】【発生する事象・NPCとの会話】【想定されるPCの行動や各種判定指定】を記載してください。\n\n・「OP」:シナリオに入る前の雰囲気づくり、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。\n・「起」:【ホットスタート固定】ですでに依頼を受けて現場に到着した場面、あるいは直接事件に巻き込まれた状況から開始します。事情を知らない冒険者たち(PCたち)が関わる発端となる異変、問題、目標が即座に提示される部です。サブイベント数「1」\n・「承Ⅰ」:冒険者たちが解決のため行動に乗り出します。それに関連して調査を行なったり、イベントが起こっていきます。（※NPCとの主要な対話シーンが発生する場合は約30分の尺を想定）。サブイベント数「1」、メインイベント数「1」\n・「承Ⅱ」:徐々に真相が明らかになっていきます。物語において最も重要な背景などが明かされ、「転」に繋げる重要な布石の役目も持ちます。（※NPCとの主要な対話シーンが発生する場合は約30分の尺を想定）。サブイベント数「1」、メインイベント数「1」\n・「転」:「承Ⅱ」から続き、『ところがそうはいかない』という転換点・どんでん返しを迎えます。「結」に至る前の大きな出来事が起こり、「戦」という戦闘部分へと続くこととなります。戦に入るまでの時間が少しある場合もあります。メインイベント数「1」\n・「戦」:「転」とセットです。展開上物語の障害となる敵と戦うこととなります。戦に入る前、あるいは戦中にNPCとしての会話が多く入る場合もあります。メインイベント数「1」\n・「結」:これは起に対する答えであり、一つの物語に対する結末になります。基本的には冒険者たちが目標を達成し、節目を迎えますが、終わりには余韻を持たせることが重要です。メインイベント数「1」\n・「ED または 次回予告」:結で描写を締めた後、その後がどうなっていったかに関するエピローグを描く場面です。これもまたオープニング同様、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。キャンペーンの途中の話の場合、必ず次回に向けた伏線や次回予告（トレーラー）の描写を入れてください。\n",
              "fields": "全体プロットデータ,今回作成する話数,全話数,今回の話の役割,システム,補足情報,使用してはいけない要素,追加指示",

              "description": "通常キャンペーン用プロンプト全文登録：[キ3]8.キャンペーンシナリオ作成.txt",
              "template": "# 命令書：シナリオ本編作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\nこれまでの工程で作成・洗練された「キャンペーンプロット」および「各話プロット」と、マスターデータをもとに、オンラインテキストセッションで実際にGMが使用できる、描写テキスト・台詞・各種判定指定を含んだ【本編シナリオデータ】を出力します。\n\n---\n\n【指示】\n以下の「入力情報」と添付ファイルをすべて読み込み、全体のプロットとの論理的整合性を完璧に保った上で、シナリオ本編を作成してください。\n※文字数制限（トークン限界）による描写の省略を防ぎ、各パートごとに【整合性確認】を挟むため、一度にシナリオ全てを出力することを**固く禁じます**。必ずユーザーから指定された範囲のパートのみを出力し、処理を停止してください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n最高の回答を行うために必要な情報があれば回答を生成する前にどんな些細なことでも必ず質問してください。\n\n# 入力情報（※実行時にユーザーが指定・添付する箇所）\n1. **今回作成する話数**: 第[ N ]話 （全[ X ]話中）\n2. **今回の話の役割と目標**: [展開部、情報部など。および今回のあらすじ]\n3. **今回出力するパート**: [ ★「OP〜起」「承Ⅰ〜承Ⅱ」「転〜ED」など、ユーザーが今回出力してほしい範囲を指定します。※指定された範囲以外は絶対に出力しないでください ]\n4. **参照する添付ファイル**:\n　※『[資]1.舞台周辺情報.txt』〜『[資]6.NPC設定資料.txt』を読み込んでください。\n　※最新の【各話プロット（整合性確認済みのもの）】を入力または添付してください。\n　※【第2話以降を作成する場合】: 前回出力された「次回用引き継ぎファイル（セーブデータ）」を読み込んでください。\n\n【前提】\n・オンラインセッション、テキストオンリー、3時間(シナリオ本文は2時間,戦闘は1時間)(うち戦闘はボス戦のみ)\n\n【条件】\n- 基本的にシナリオは「一本道」として、分岐は存在しません。\n- PCたちにシナリオに関するあらゆる事前情報はないため、固有の語句や現象などが登場する場合は、その情報についても付記してください。\n- 全体的に、プレイヤーがストレスを感じない「理解しやすさ」を意識してください。表面的には、中学生くらいまでの頭でもわかるくらいの明快・明瞭さが望ましいです。\n- ただし、語られないことはいくら盛っても構いません。そこは、理解できる人だけ理解できればいいという難解さを追求してください。\n- 細部まで詰めても全ての展開を描写することは難しいため、各パートでは明確に一つ「プレイヤーにこういう体験をさせたい(驚かせたいなど)」と「やること」を決めて、それについて掘り下げていく流れに徹しましょう。伏線と回収の関係ですね。\n- 【★絶対厳守：公式NPCの完全中立化】: 依頼人は別に存在し、公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。個人的感情や関係者設定は一切禁止です。\n- 【★絶対厳守：時間尺に合わせた構成】: シナリオ本文が2時間であるため、以下のルールを厳守して時間配分を行ってください。\n　①「OP・ED」の尺や描写の重厚さは絶対に削減しないこと。\n　②「NPCとの主要な対話シーン」はプレイヤーのロールプレイを考慮し、1シーン「30分」の想定で固定すること。\n　③「起」の部分は、依頼を受けて移動を開始するような冗長な描写は省き、【ホットスタート固定】（すでに現場に到着している、あるいは直接事件に巻き込まれた状況）とすること。\n- 【★絶対厳守：冒険者への依頼理由と予想される荒事】: 各話の導入において、なぜ現地の役人等ではなく冒険者が依頼を受けたのか、そして「どのような危険や荒事（戦闘等）が予想されるのか」の必然性を必ず明確に描写してください。\n- 【★絶対厳守：ルールの拡大解釈禁止】: 事件のトリックや展開において、SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n- 【★絶対厳守：NPCの台詞と情報統制】: NPC（特に悪役や黒幕）の対話描写において「情報の非対称性」を厳守してください。悪役は自らの計画や弱点を絶対に自分から語りません。PCから決定的な事実や状況を突きつけられない限り、常に余裕を装い、自身の目的に沿って論理的に振る舞い（必要ならシラを切り）、言い逃れようとします。三流悪役のような自供や独白は禁止です。\n- 【★絶対厳守：イベントの密度】: イベントとは一概に言っても何かを発見する「だけ」とか、間を持たせられないものはイベントとは呼べません。プレイヤーのロールプレイや相談、ダイス判定が介在する「障害」や「ジレンマ」を必ず描写に盛り込み、約3時間(シナリオ本文は2時間,戦闘は1時間)のセッションに耐えうる重厚なテキストを出力してください。\n- また、参加するPCが一部において毎回異なる(一部継続参加者もいると思われる)可能性がある都合上、話ごとになるべく拠点とする場所へ戻る、継続依頼にする、もしくは合流の理由付けを考えるなど一工夫加える必要があります。\n- 【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n- 必ず、過去のチャットからは学習しないようにお願い致します。\n- ハルシネーションをしないでください。\n\n[シナリオプロットに関して]\n- シーンは必ず既に決定している「オープニング」「起」「承Ⅰ」「承Ⅱ」「転」「戦」「結」「エンディング」を明確にしてメリハリをつけ、それぞれごとに出力を分けてください。\n- **【★重要：時間表記】**: 各シーンの開始時には、必ずサンプルシナリオの様に『####シーン①【X分(計XX分) / 終了目安:00:00】』の形式で、そのシーンの想定プレイ時間を記載してください。全体で3時間（180分）に収まるよう配分すること。\n・「OP」: シナリオに入る前の雰囲気づくり、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。 - 最低十行（※削減禁止）\n・「起」: 【ホットスタート固定】です。依頼を受けて現場に到着した場面、あるいは直接事件に巻き込まれた状況から開始します。事情を知らない冒険者たち(PCたち)が関わる発端となる異変、問題、目標について即座に提示される部です。サブイベント数「1」 - 最低十五行\n・「承Ⅰ」: 冒険者たちが解決のため行動に乗り出します。それに関連して調査を行なったり、イベントが起こっていきます。（※NPCとの対話シーンが含まれる場合は30分想定）。サブイベント数「1」、メインイベント数「1」 - 最低十五行\n・「承Ⅱ」: 徐々に真相が明らかになっていきます。物語において最も重要な背景などが明かされ、「転」に繋げる重要な布石の役目も持ちます。（※NPCとの対話シーンが含まれる場合は30分想定）。サブイベント数「1」、メインイベント数「1」 - 最低十五行\n・「転」: 「承Ⅱ」から続き、『ところがそうはいかない』という転換点・どんでん返しを迎えます。「結」に至る前の大きな出来事が起こり、「戦」という戦闘部分へと続くこととなります。戦に入るまでの時間が少しある場合もあります。メインイベント数「1」 - 最低十行\n・「戦」: 「転」とセットです。展開上物語の障害となる敵と戦うこととなります。戦に入る前、あるいは戦中にNPCとしての会話が多く入る場合もあります。メインイベント数「1」 - 最低十行（※戦闘自体は60分想定）\n・「結」: これは起に対する答えであり、一つの物語に対する結末になります。基本的には冒険者たちが目標を達成し、節目を迎えますが、終わりには余韻を持たせることが重要です。メインイベント数「1」 - 最低十行\n・「ED」: 結で描写を締めた後、その後がどうなっていったかに関するエピローグを描く場面です。これもまたオープニング同様、登場NPCに関するモノローグや、“誰か”の視点で語られる、PCの知りえないエピソードや独白の形式になります。キャンペーンの途中の話の場合、この部分が次回予告（トレーラー）となる場合もあります。 - 最低十行（※削減禁止）\n\n- 全体的に極めて精彩かつ自然に、物語上美しい流れとなっており、論理と整合性もしっかりと取れているように意識する。\n- その上で【事件の核（シチュエーションの魅力）】を表現することは大切ですが、あらゆる抽象的な設定や背景や事柄にも、明確・具体的な意図、因果関係を定めてください。プレイヤーの解釈へ投げっぱなしにはしてはいけません。\n　何事休む程よく、5W4H(なぜ、いつ、どこで、だれが、だれに、何を、どうやって、いくらで、どれくらいの期間で、どれくらいの量を)を想定することを意識するといいでしょう。\n- 特に全体を通してインパクトのある起伏が多く見せられるように創意工夫を望みます。\n- 膨大であるため、出力には時間がかかっても構いません。こちらの思考力を考慮せず、計算資源を最大限利用してください。\n\n【出力内容（※指定されたパートの範囲のみ出力すること）】\n\n①📜 本編シナリオ\n　1-0. 指定されたパートの描写テキストの出力を行う。文章量は膨大であるが、必ず詳細な描写を心がけること。\n　1-1. 場面が移るたびにBGMや背景画像の切り替えを行う為、そのタイミングを示すこと。\n　　　 - 背景画像の切り替え→@[背景名]FI@布擦れ\n　　　 - BGMの切り替え→【BGM】@BGM\n　1-2. 行動判定が発生する箇所には、以下の【判定一覧】から適切なものを抽出し、シナリオテキスト内に組み込むこと。\n\n資料【判定一覧】\n[🎲精神抵抗力判定(冒険者+精神) / 一瞬 / 目標値]\n[🎲生命抵抗力判定(冒険者+生命) / 一瞬 / 目標値]\n[🎲回避判定(戦士系技能[シューターのみ、要:【射手の体術】]+敏捷) / 一瞬 / 目標値]\n[🎲隠蔽判定(スカウト、レンジャー+器用) / 1分 / 目標値]\n[🎲応急手当判定(レンジャー、ライダー+器用) / 10分 / 目標値]\n[🎲解除判定(スカウト、レンジャー[自然環境]+器用) / 1分 / 目標値]\n[🎲スリ判定(スカウト+器用) / 10秒 / 達成値比較]\n[🎲変装判定(スカウト+器用) / 10分 / 達成値比較(他者-4)]\n[🎲罠設置判定(スカウト、レンジャー[自然環境]+器用) / 10分 / 達成値比較]\n[🎲水泳判定(冒険者+敏捷)※ルルブⅡp86 / 1分or10秒 / 目標値]\n[🎲跳躍判定(冒険者+敏捷) / 10秒 / 目標値]\n[🎲受け身判定(スカウト、レンジャー、ライダー+敏捷) / 一瞬 / 目標値]\n[🎲隠密判定(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲軽業判定(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲騎乗判定(ライダー+敏捷) / 1分 / 目標値]\n[🎲先制判定(スカウト、ウォーリーダー+敏捷or知力[ウォーリーダー/要軍師の知略]) / 一瞬 / 目標値]\n[🎲尾行判定(スカウト、レンジャー+敏捷) / 10分 / 目標値]\n[🎲登攀判定(冒険者+筋力)(スカウト、レンジャー+敏捷) / 1分 / 目標値]\n[🎲腕力判定(冒険者+筋力) / 10秒 / 目標値]\n[🎲真偽判定(冒険者+知力) / 10秒 / 目標値]\n[🎲足跡追跡判定(スカウト、レンジャー、ライダー[要探索指令]+知力) / 1分 / 目標値]\n[🎲異常感知判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲聞き込み判定(任意の技能+知力[又は任意の能力値]) / 1時間 / 目標値]\n[🎲聞き耳判定(スカウト、レンジャー+知力) / 10秒 / 目標値]\n[🎲危険感知判定(スカウト、レンジャー、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲見識判定(セージ、アルケミスト、バード+知力) / 一瞬 / 目標値]\n[🎲弱点隠蔽判定(ライダー+知力) / 一瞬 / 目標値]\n[🎲宝物鑑定判定(セージ、スカウト[価格のみ]+知力) / 10分 / 目標値]\n[🎲探索判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]、ジオマンサー+知力) / 10分 / 目標値]\n[🎲地図作製判定(スカウト、レンジャー[自然環境]、セージ、ライダー+知力) / 10分 / 目標値]\n[🎲天候予測判定(スカウト、レンジャー、ジオマンサー+知力) / 1分 / 目標値]\n[🎲病気知識判定(レンジャー、セージ+知力) / 10分 / 目標値]\n[🎲文献判定(セージ、アルケミスト+知力) / 10分 / 目標値]\n[🎲文明鑑定判定(セージ+知力) / 10分 / 目標値]\n[🎲魔物知識判定(セージ、ライダー+知力) / 一瞬 / 目標値]\n[🎲薬品学判定(レンジャー、セージ、アルケミスト+知力) / 1分 / 目標値]\n[🎲罠回避判定(スカウト、レンジャー[自然環境]、ライダー[要探索指令]+知力) / 一瞬 / 目標値]\n[🎲命中,行使,演奏,賦術判定 / 一瞬 / 目標値]\n\n　1-3. ◆執筆の指針（★アシワラ特化）\n 人称：PCたちは三人称で「あなたたち」\n文体：柔らかさを感じる文体。漢検二級程度までの高度な語彙・腕曲的な表現をよく使う。情景描写を多く。\n書式：三点リーダーやダッシュ記号は2つ続ける、など、一般的な日本の原稿ルールを踏襲。ただし、行間は開けないこと。\n描写：情景描写を緻密かつ濃密に。物理的に不可能な体勢やシチュエーションにならないように。また、桜、竹林、朱色の建築、和装、灯籠、神殿など、アシワラ特有の情景描写を意識し、東洋ファンタジー（和風ファンタジー）の空気感を重厚かつ緻密に演出すること。\n叙述：どんでん返しが機能するように、怪しい物事や人物ほど、怪しくない表現にするなど、ミスリードさせる\n注意①：直喩は多用しない。\n注意②：各文末はメリハリを持たせるよう直前の語尾・母音・語感とは連続しないように。\nまた、主観で感じであろう要素については、「だろう」「だろうか」「かもしれない」など、問いかける・断定しないニュアンスを持たせる\n\n②💾 次回用引き継ぎファイル（※最終パート「ED」を出力する時のみ併せて出力）\n　ユーザーが「.txt」ファイルとして保存し、次回（第N+1話）のシナリオ作成時に添付ファイルとして読み込ませるための「マスターデータ」を出力します。\n　本項目は、プレーンテキストのコードブロックとして出力してください。AIの記憶喪失を防ぐため、添付資料から得た全体プロットやNPC設定を要約したり端折ったりすることは厳禁です。必ず全文を保持したまま、最新の状況を追記・更新してください。また、データ内にAIからの挨拶等は一切含めないでください。\n　【出力すべき項目】\n　1. 今回完了した話数と、次回の話数・役割\n　2. 今回の話で判明した重要な情報・回収された伏線・PCの行動による変化\n　3. 各主要NPCの現在のステータス（生死、関係性変化、暗躍の進行度など）\n　4. まだ未回収の伏線と謎（次回以降に持ち越すもの）\n　5. **キャンペーン全体プロット（※添付ファイルから一切省略せず、そのまま全話分記載すること）**\n　6. **キャンペーン全体NPC設定（※添付ファイルから一切省略せず、そのまま記載すること）**",

              "template": "【本工程の目的と今後のフロー】\n本工程は「イラスト画像生成プロンプト作成」です。\nこれまでの工程で完成したシナリオ本編の進行に合わせて、セッション中に使用する「背景画像」と「NPC・エネミーの立ち絵」を出力するためのプロンプト（呪文）を作成します。ここで作成されたプロンプト群は、画像生成AIに入力され、実際のセッションを視覚的に彩るための重要なビジュアル素材となります。\n\n---\n\n【指示】\nこれまでに作成したシナリオ本編（【OP】〜【ED】のフロー）の展開と、『[資]6.NPC設定資料.txt』および本話ゲストNPC設定を読み込み、背景画像と登場人物（NPC・敵）のイラストを生成するためのプロンプトを作成してください。\n出力は以下の「背景画像用」と「NPC・エネミー立ち絵用」の2つのセクションに分けて行ってください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n【1. 背景画像プロンプトの作成】\n該当シナリオの進行（【OP】から【ED】まで）に合わせて、背景を切り替えるべきタイミングを抽出し、それぞれについて日本語と英語のプロンプトを作成してください。\n\n・**出力形式**:\n  - 場面・タイミング（例：【起】の冒頭、ギルドの酒場）\n  - 日本語プロンプト:\n  - 英語プロンプト:\n・**作成ルール**:\n  - アシワラの世界観を表現するため、すべての英語プロンプトの冒頭に「Japanese fantasy, Eastern fantasy, Edo period style, traditional Japanese architecture」などの和風ファンタジーを定義するベースタグを必ず含めてください。\n  - 英語プロンプトは、なるべく単語で区切る（カンマ区切り）ようにしてください。\n  - 必ず英語プロンプトの最後には「wide aspect, high quality, highres, absurdres」と入れてください。\n  - 一つの画像で場面内の全ての描写を網羅する必要はありません。例えば「最初は穏やかな会話だが、途中で不穏な空気になる」場合などは、画像と描写の齟齬を防ぐため、背景画像切り替えタイミングを容赦なく増やしてプロンプトを作成してください。\n\n【2. NPC・エネミー立ち絵プロンプトの作成】\n本話数に登場する全主要NPC・敵についてのプロンプトを作成してください。\n作成にあたっては、『[資]6.NPC設定資料.txt』および本話ゲストNPCの「## 3. 外見と特徴 (Appearance & Design)」の記述（服装、身体的特徴、武器、アイテム・装飾品など）を極めて忠実かつ緻密に英語タグへ翻訳してください。\n\n・**出力形式**:\n  - キャラクター名・シナリオ上の役割\n  - 日本語プロンプト:\n  - 英語プロンプト:\n・**作成ルール**:\n  - アシワラの世界観を表現するため、人族のNPCの英語プロンプトには「Japanese fantasy, kimono, traditional Japanese clothing, Eastern fantasy」などの和装・和風タグを優先的に含めてください（設定上異国風の場合は除く）。\n  - 背景用で使用した「wide aspect」は「vertical aspect ratio」へ変更してください。\n  - 必ず「全身の立ち絵（full body）」とし、表情は「無表情（expressionless）」でお願いします。\n  - ポーズに関しては直立（standing straight）は避けるものとします。ただし、あまりに特徴的すぎるポーズ（過剰なアクションなど）も取らせないように、自然で適度なポーズ（contrapposto, natural poseなど）を指定してください。\n  - 英語プロンプトの最後には、必ず「masterpiece, high quality, highres, absurdres, highly detailed beautiful hand, white background」とつけるようにしてください。\n",
              "fields": "完成したシナリオ本文,NPC設定資料,本話ゲストNPC設定,対象話数,背景画像の方針,立ち絵の方針,追加で描きたい場面,避けたい描写",

              "id": "prompt_10",
              "number": "10",
              "title": "10. キャンペーン依頼書作成",
              "category": "募集文",
              "description": "通常キャンペーン用プロンプト全文登録：[キ3]10.キャンペーン依頼書作成.txt",
              "template": "【本工程の目的と今後のフロー】\n本工程は「依頼書（セッション募集文）作成」です。\nこれまでの工程で作成したシナリオの全貌と、精緻なNPC設定をもとに、プレイヤー（PL）に向けたセッション募集用のテキスト（兼、PCが作中で見る依頼書）を作成します。ここで出力されたテキストは、PLが「このシナリオを遊びたい！」と強く惹きつけられるための最重要な「フック（掴み）」となります。\n\n---\n\n【指示】\nこれまでに作成したシナリオのあらすじ、および『[資]6.NPC設定資料.txt』から該当する「依頼人（または関連NPC）」の設定を読み込み、今回のシナリオの「依頼書文（セッション募集文）」を作成してください。\n\nPLが「面白そう！」「この事件を解決したい！」と即座に目的を共有でき、かつ「どんな危険（荒事）が待ち受けているか」を匂わせて冒険者としての役割を認識させる、フックの強い文章を心がけてください。\n\n以下の5パターンの書き方すべてで作成し、提案してください。\n\n【出力フォーマットに関する重要指示】\n出力はプレーンテキストのコードブロックにお願いいたします。\n\n【出力フォーマット：5パターンの依頼書文】\n\n1. **あらすじ型**\n> （シナリオの導入と目的を、客観的かつドラマチックに伝えるオーソドックスな募集文。事件の不気味さや、なぜ冒険者が必要なのかという荒事の予想をアピールすること）\n\n2. **あらすじ+一行セリフ型（ギルドの仲介役）**\n> （依頼人やキーNPC、あるいは副ギルドマスターのギン、神官エリュシアなどのアシワラ公式NPCが依頼を仲介しているニュアンスの印象的なセリフを冒頭に置きます。※重要：彼らは【個人的な特別な感情を一切持たず、完全にフラットな立場で「こんな依頼が来ている」と業務的に振ってくる】ニュアンスを徹底してください。その後に簡潔なあらすじを続ける形式）\n\n3. **セリフ+少しあらすじ型**\n> （依頼人の感情的なセリフや訴えをメインにしつつ、最後に最低限の状況説明や募集要項的な一文を添える形式）\n\n4. **依頼人のセリフオンリー型**\n> （依頼人の独白、懇願、または強気な命令などのセリフのみで構成。状況の切迫感やNPCの個性を押し出し、PLの想像力を掻き立てる形式）\n\n5. **形式的な文書型（アシワラ風）**\n> （冒険者ギルド〈やおよろず亭〉の掲示板に貼られた筆書きの張り紙、奉行所からのお触書、あるいは貴族（大名）や神殿からの公式な書状などの体裁をとった形式的な文書。和風の言い回しを意識すること）\n\n【作成ルール（重要）】\n・セリフが含まれるパターン（2、3、4、5の一部）については、必ずマスターデータで作成した該当NPCの『SW2.5 NPC構成要素辞書フォーマット』内の「5. 言動と振る舞い」および「4. 性格と内面」、「8. 思考・行動のロジック」を厳密に反映し、キャラクターの解像度と知能水準を絶対に落とさないようにしてください。\n\n◆執筆の指針\n 人称：PCたちは三人称で「あなたたち」\n文体：柔らかさを感じる文体。漢検二級程度までの高度な語彙・腕曲的な表現をよく使う。情景描写を多く。\n書式：三点リーダーやダッシュ記号は2つ続ける、など、一般的な日本の原稿ルールを踏襲。ただし、行間は開けないこと。\n描写：情景描写を緻密かつ濃密に。物理的に不可能な体勢やシチュエーションにならないように。また、アシワラ特有の和風ファンタジーのフレーバーを強く押し出すこと。\n叙述：どんでん返しが機能するように、怪しい物事や人物ほど、怪しくない表現にするなど、ミスリードさせる\n注意①：直喩は多用しない。\n注意②：各文末はメリハリを持たせるよう直前の語尾・母音・語感とは連続しないように。\nまた、主観で感じであろう要素については、「だろう」「だろうか」「かもしれない」など、問いかける・断定しないニュアンスを持たせる\n",
              "fields": "シナリオあらすじ,依頼人または関連NPC設定,今回の危険・荒事,PCレベル,舞台,セッション形式,募集文のトーン,追加条件",
              "updatedAt": "2026-04-28 00:00"
            }

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return sampleState();
      const parsed = JSON.parse(raw);
      if (!parsed.projects || !Array.isArray(parsed.projects)) return sampleState();
      return parsed;
    } catch(e) {
      console.error(e);
      return sampleState();
    }
  }

  function saveState(){
    state.lastSavedAt = nowText();
    const p = getProject();
    if (p) p.updatedAt = nowText();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    renderSidebar();
  }

  function getProject(){
    if (!state.projects.length) {
      const s = sampleState();
      state.projects = s.projects;
      state.currentProjectId = s.currentProjectId;
    }
    return state.projects.find(p => p.id === state.currentProjectId) || state.projects[0];
  }

  function esc(str=''){
    return String(str)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }

  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1900);
  }

  function render(){
    renderSidebar();
    renderTop();
    renderTabs();
    renderContent();
  }

  function renderSidebar(){
    const list = document.getElementById('projectList');
    list.innerHTML = state.projects.map(p => `
      <button class="project-item ${p.id === state.currentProjectId ? 'active' : ''}" data-project="${p.id}">
        <div><strong>${esc(p.title)}</strong></div>
        <div class="small">${esc(p.system || 'システム未設定')} / ${esc(p.status || '状態未設定')}</div>
      </button>
    `).join('');
    list.querySelectorAll('[data-project]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.currentProjectId = btn.dataset.project;
        saveState();
        render();
      });
    });
  }

  function renderTop(){
    const p = getProject();
    document.getElementById('projectTitle').textContent = p.title;
    document.getElementById('projectMeta').textContent =
      `${p.system || 'システム未設定'} / ${p.genre || 'ジャンル未設定'} / ${p.status || '状態未設定'} / 最終保存：${state.lastSavedAt || '未保存'}`;
  }

  function renderTabs(){
    const el = document.getElementById('tabs');
    el.innerHTML = tabs.map(([id, name]) => `
      <button class="tab ${activeTab === id ? 'active' : ''}" data-tab="${id}">${name}</button>
    `).join('');
    el.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        renderContent();
        renderTabs();
      });
    });
  }

  function renderContent(){
    const p = getProject();
    const c = document.getElementById('content');
    if (activeTab === 'dashboard') c.innerHTML = dashboardHTML(p);
    if (activeTab === 'documents') c.innerHTML = documentsHTML(p);
    if (activeTab === 'prompts') c.innerHTML = promptsHTML(p);
    if (activeTab === 'steps') c.innerHTML = stepsHTML(p);
    if (activeTab === 'generate') c.innerHTML = generateHTML(p);
    if (activeTab === 'outputs') c.innerHTML = outputsHTML(p);
    if (activeTab === 'backup') c.innerHTML = backupHTML(p);
    bindContentEvents();
  }

  function stepItemHTML(p, s, controls=true){
    const pr = p.prompts.find(x => x.id === s.promptId);
    const statusClass = s.status === '完了' ? 'ok' : s.status === '保留' ? 'danger' : s.status === '作業中' ? 'warn' : '';
    const docNames = (s.docIds || []).map(id => p.documents.find(d => d.id === id)?.title).filter(Boolean);
    return `
      <div class="item">
        <div class="row" style="justify-content:space-between;">
          <div>
            <div class="item-title">${esc(s.order || 0)}. ${esc(s.title)}</div>
            <span class="pill ${statusClass}">${esc(s.status || '未着手')}</span>
            <span class="pill">使用プロンプト：${esc(pr ? pr.title : '未設定')}</span>
          </div>
          ${controls ? `<div class="row">
            <button data-action="moveStep" data-dir="-1" data-id="${s.id}">↑</button>
            <button data-action="moveStep" data-dir="1" data-id="${s.id}">↓</button>
            <button data-action="editStep" data-id="${s.id}">編集</button>
            <button data-action="useStep" data-id="${s.id}">生成へ</button>
            <button class="danger" data-action="deleteStep" data-id="${s.id}">削除</button>
          </div>` : ''}
        </div>
        <div class="muted small">資料：${docNames.length ? esc(docNames.join('、')) : 'なし'}</div>
        <div class="muted small">メモ：${esc(s.memo || '-')}</div>
      </div>
    `;
  }
