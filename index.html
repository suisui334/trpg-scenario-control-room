<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRPGシナリオ管制室 v0.5</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #181b22;
      --panel2: #20242d;
      --text: #f0f2f5;
      --muted: #aeb6c2;
      --line: #343946;
      --accent: #9f7aea;
      --accent2: #6ee7b7;
      --danger: #f87171;
      --warn: #fbbf24;
      --ok: #34d399;
      --input: #0f1117;
      --shadow: rgba(0,0,0,.35);
      --radius: 14px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #202438 0, #111318 45%, #0b0d11 100%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
    }
    button, input, textarea, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel2);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      transition: .12s ease;
    }
    button:hover { border-color: var(--accent); transform: translateY(-1px); }
    button.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-color: #7c3aed;
    }
    button.good { border-color: rgba(52,211,153,.55); }
    button.warn { border-color: rgba(251,191,36,.55); }
    button.danger { border-color: rgba(248,113,113,.55); color: #fecaca; }
    button.ghost { background: transparent; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--input);
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }
    textarea { min-height: 130px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(159,122,234,.15);
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 5px;
    }
    .app {
      display: grid;
      grid-template-columns: 310px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(17,19,24,.9);
      backdrop-filter: blur(10px);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: 0 10px 25px var(--shadow);
    }
    .brand h1 {
      font-size: 17px;
      margin: 0;
      line-height: 1.2;
    }
    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .sidebar-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }
    .project-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .project-item {
      text-align: left;
      width: 100%;
      padding: 10px;
      background: rgba(32,36,45,.75);
    }
    .project-item.active {
      border-color: var(--accent);
      background: rgba(159,122,234,.16);
    }
    .project-item .small {
      color: var(--muted);
      font-size: 12px;
    }
    .main {
      padding: 22px;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .topbar h2 { margin: 0; font-size: 24px; }
    .topbar .meta { color: var(--muted); font-size: 13px; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      background: rgba(32,36,45,.7);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .tab.active {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(159,122,234,.18);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .card {
      background: rgba(24,27,34,.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: 0 12px 28px var(--shadow);
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }
    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stack { display: grid; gap: 10px; }
    .item {
      border: 1px solid var(--line);
      background: rgba(32,36,45,.58);
      border-radius: 12px;
      padding: 12px;
    }
    .item-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      background: rgba(15,17,23,.65);
      color: var(--muted);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .pill.ok { color: #bbf7d0; border-color: rgba(52,211,153,.4); }
    .pill.warn { color: #fde68a; border-color: rgba(251,191,36,.4); }
    .pill.danger { color: #fecaca; border-color: rgba(248,113,113,.4); }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .hidden { display: none !important; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
    }
    .notice {
      border: 1px solid rgba(159,122,234,.45);
      background: rgba(159,122,234,.12);
      color: #ddd6fe;
      border-radius: 12px;
      padding: 12px;
    }
    .danger-zone {
      border-color: rgba(248,113,113,.35);
      background: rgba(127,29,29,.12);
    }
    .checkbox-list {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: rgba(15,17,23,.55);
    }
    .checkbox-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 8px;
      align-items: start;
      padding: 6px;
      border-bottom: 1px solid rgba(52,57,70,.55);
    }
    .checkbox-row:last-child { border-bottom: 0; }
    .checkbox-row input { width: auto; margin-top: 5px; }
    .generated {
      min-height: 360px;
      font-size: 13px;
      line-height: 1.55;
    }
    .field-hint {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
      line-height: 1.45;
    }
    .generated-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .generated-header h3 { margin: 0; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #111827;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 12px;
      box-shadow: 0 12px 30px var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: .15s ease;
      pointer-events: none;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.62);
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 10;
    }
    .modal {
      width: min(900px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #151821;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 25px 70px rgba(0,0,0,.55);
    }
    .modal h3 { margin-top: 0; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .main { padding: 14px; }
      .topbar { display: grid; }
      .span-8, .span-6, .span-4, .span-3 { grid-column: span 12; }
      .form-grid { grid-template-columns: 1fr; }
      .project-list {
        grid-template-columns: 1fr;
      }
      .sidebar details summary { cursor: pointer; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">卓</div>
        <div>
          <h1>TRPGシナリオ管制室</h1>
          <p>v0.5 / 入力補助・公開記事強化版</p>
        </div>
      </div>

      <div class="notice small">
        同じブラウザでは自動保存されます。大事な資料は必ずJSONエクスポートしてください。
      </div>

      <div class="sidebar-section">
        <div class="row" style="justify-content:space-between;">
          <strong>プロジェクト</strong>
          <button class="primary" id="addProjectBtn">追加</button>
        </div>
        <div id="projectList" class="project-list"></div>
      </div>

      <div class="sidebar-section stack">
        <button id="quickExportBtn">JSONバックアップ</button>
        <label class="small">JSONインポート</label>
        <input id="quickImportInput" type="file" accept="application/json,.json" />
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="projectTitle">読み込み中...</h2>
          <div class="meta" id="projectMeta"></div>
        </div>
        <div class="row">
          <button id="renameProjectBtn">プロジェクト編集</button>
          <button id="duplicateProjectBtn">複製</button>
          <button class="danger" id="deleteProjectBtn">削除</button>
        </div>
      </div>

      <div class="tabs" id="tabs"></div>
      <section id="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

                              "template": "# 【事前分析】モチーフ作品「[ ★ここに作品名やエピソード名を入力 ]」の徹底解剖\nあなたはプロのシナリオライター兼アナリストです。今後作成するTRPGシナリオのモチーフとして、「[ ★ここに作品名やエピソード名を入力 ]」を使用します。\nディープリサーチを最大限に活用し、この作品（または具体的なエピソード）を以下の観点から徹底的かつ網羅的に分析し、言語化して出力してください。\n（※注意：この段階ではTRPGのシナリオギミックや、具体的なストーリー案の考案は絶対に行わないこと。あくまで作品の純粋な解剖・構造分析に徹してください）\n\n1. **核となるテーマと空気感**: 作品全体を貫く哲学、死生観、倫理観、あるいは独特の雰囲気やジャンル感（日常、ホラー、サスペンスなど）について。\n2. **特有の舞台設定・ギミック（お約束）**: その作品ならではの特殊な環境、物理法則、超常的な要素、あるいは物語を動かすための象徴的な装置や独自のルールについて。\n3. **キャラクター・関係性の構造**: 登場人物たちの立ち位置、対立構造、バディや群像劇としての力学、彼らが抱えている過去や因縁について。\n4. **エモーショナルな展開とカタルシス**: 絶望から希望への転換、自己犠牲、知的な謎解きの爽快感、笑いや涙など、受け手の感情を最も大きく揺さぶるポイントについて。\n5. **物語の論理構造**: なぜそのような事件・現象・葛藤が起きるのか、WHY（動機や原因）とHOW（手口や過程）の整合性、因果関係について。\n",

                              "template": "# 命令書：オープンワールド用・新規舞台コンセプト案作成＆比較プロンプト\n\nあなたはプロのTRPGワールドデザイナー兼シナリオライターです。\n以下の入力要素をもとに、まだ名称や詳細設定が確定していない新規舞台について、オープンワールド運用に耐える「舞台コンセプト案」を複数作成し、辛口で比較・検討してください。\n\nこの段階では、完成版の世界観マスターデータを作成するのではありません。\n目的は、以後の世界観資料、公式NPC資料、都市設定、シナリオフック、敵勢力、冒険者ギルド、地方文化を展開するための「舞台の核」を選定することです。\n\n表面的にそれらしい国や地方を作るのではなく、\n「PCがなぜ訪れるのか」\n「どのような事件が自然発生するのか」\n「その土地でしかできない冒険は何か」\n「既存世界の中でどういう意味を持つのか」\nを明確にしてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【作成対象の範囲】\n[例：大陸内の一地方、島国、都市国家群、辺境領、砂漠地帯、山岳国家、交易圏、宗教圏、未踏地域、泡沫世界、異界領域など]\n\n一地方内の一国のその周辺\n何らかの原因で人蛮混合で共存が成立している国\n\n3. 【既に決まっている上位条件】\n[例：ラクシア世界内、アルフレイム大陸周辺、ブルライト地方の近隣、公式現行時代、〈大破局〉後の復興期、魔動機文明の遺産が多い／少ない、蛮族領に近い、海路でしか行けない、など]\nアルフレイム大陸、公式現行時代\nドーデン地方(ただし資料は貼れない為、検索を加えて情報を収集すること)\n\n4. 【舞台名】\n[未定 / 仮名あり / 正式名称あり]\n※未定の場合は、各案ごとに仮称を提示すること。\n※名称はモチーフの語感を参考にしてよいが、現実の国名・都市名の丸写しは避けること。\n\n未定\n\n5. 【現実文化・歴史・地域モチーフ】\n[例：和風、古代エジプト風、ロシア風、ビザンツ風、中央アジア遊牧民風、東南アジア海洋国家風、ケルト風、北欧風、インド風、メソアメリカ風、イスラム黄金時代風、近世ヨーロッパ風など]\n※ざっくりした指定でもよい。\n※複数指定された場合は、どの要素をどの層に使うか整理すること。\n※現実文化を丸写しせず、ファンタジー世界に合わせて再構成すること。\n\n指定なし。モチーフ作品は地獄楽と進撃の巨人。\n\n6. 【モチーフの反映度】\n[強く反映 / 風味程度 / 建築と服飾中心 / 信仰と政治中心 / 名前の響き中心 / 複数文化を混ぜたい / あえて現実文化から離したい]\n\n風味程度\n\n7. 【ジャンル・空気感】\n[例：王道冒険、ダークファンタジー、秘境探索、政治劇、怪異譚、海洋冒険、辺境開拓、退廃都市、宗教幻想、古代遺跡探索、戦乱の国、交易と陰謀の都市群など]\n\n指定はないが、さまざまな要素を汲み取りたい\n\n8. 【舞台の主要テーマ】\n[例：失われた栄光、復興、信仰と政治、自然との共存、古代遺産の再発見、民族間対立、死者と生者の境界、交易と欲望、神話の嘘、辺境の自由、帝国の衰退など]\n\n指定なし\n\n9. 【必ず含めたい要素】\n[例：巨大河川、砂漠、雪原、火山、空中都市、地下都市、魔動機遺跡、神殿都市、遊牧民、港町、古代王墓、霊峰、禁足地、冒険者ギルド、特殊な魔法体系など]\n\n指定なし\n\n10. 【避けたい要素】\n[例：魔動機要素を薄めたい、現実の宗教名を直接出したくない、暗すぎる世界にしたくない、政治を複雑にしすぎたくない、固有名詞を増やしすぎたくない、既存地方と被らせたくない、など]\n\n暗すぎる世界にしたくない\n\n11. 【舞台の規模感】\n[例：一都市と周辺地域 / 複数都市を含む地方 / 国家規模 / 列島規模 / 大陸の一角 / 異界全域]\n\n国家規模、一都市と周辺地域\n\n12. 【PCの想定立場】\n[例：外から来た冒険者、現地出身者、ギルド所属、国家に雇われた調査員、流れ者、開拓者、密命を受けた者、特に固定しない]\n\nこの国にある冒険者ギルド「〇〇亭」(命名例:雪山の峠亭など)所属の予定。あくまでも予定\n世界観に相応しい立場が他にあるならそれでも構わない\n\n13. 【参照してよい資料】\n[添付資料がある場合はここに列挙。ない場合は「なし」とする]\n\nなし\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・この段階では、完成版世界観資料を作らないこと。\n・まずは複数の舞台コンセプト案を出し、比較し、採用候補を絞ること。\n・各案は、単なる観光地や雰囲気設定ではなく、TRPGで冒険が発生する構造を持たせること。\n・現実文化モチーフを使う場合、服装や名前だけで終わらせないこと。\n・モチーフは、地理、気候、建築、食、信仰、政治制度、軍事、交易、死生観、祝祭、階級制度、生活習慣へ分解して再構成すること。\n・現実の国や民族をそのままファンタジー種族へ置き換えるような雑な処理は避けること。\n・複数モチーフを混ぜる場合は、どの要素を採用し、どの要素を採用しないか明記すること。\n・既存公式世界がある場合、その世界の神、種族、魔法、歴史、文明水準と矛盾しないようにすること。\n・名称は、モチーフの語感を参考にしつつも、舞台独自の命名規則を作ること。\n・PCが関わる余地を必ず作ること。\n・NPCや黒幕を作り込みすぎないこと。この段階では舞台の核を決めることを優先する。\n・美点だけでなく、問題点、歪み、危険、運用上の弱点も明記すること。\n・辛口で比較すること。すべてを褒めて終わらせないこと。\n・必要に応じて、複数案の良い部分を混ぜたミックス案を提示してよい。\n\n==================================================\n# 出力形式\n==================================================\n\n以下の構成で出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　前提整理】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. 入力条件の要約\nユーザーが指定した条件を簡潔に整理する。\n\n■1-2. 設計上の重要ポイント\nこの舞台を作る上で特に重視すべき点を整理する。\n\n例：\n・既存地方との差別化\n・PCが訪れる理由\n・冒険の発生源\n・文化モチーフの扱い\n・公式設定との整合性\n・長期運用のしやすさ\n\n■1-3. 注意すべき落とし穴\nこの舞台を作る際に陥りやすい問題を辛口で指摘する。\n\n例：\n・モチーフが表面的になる\n・固有名詞だけが増える\n・PCが関与しづらい\n・政治設定が重すぎる\n・既存の国や地方と役割が被る\n・舞台が美しいだけで事件が起きない\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　舞台コンセプト案】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最低3案、必要に応じて最大5案まで提示すること。\n\n各案は以下の形式で作成する。\n\n==================================================\n■案A：［仮称］\n==================================================\n\n【仮称】\n舞台の仮名を提示する。\n未定の場合でも、この案の方向性に合う仮称をつけること。\n\n【一言コンセプト】\nこの舞台を一文で表す。\n\n【現実文化・歴史モチーフ】\nどの文化、歴史、地域、神話、地理を参考にしているか。\n複数ある場合は、どの要素をどこに使うか明記する。\n\n【モチーフの翻案方針】\n現実文化をそのまま使わず、ファンタジー世界にどう再構成するか。\n\n【地理・気候】\n舞台の自然環境、地形、気候、交通上の特徴。\n\n【政治・統治】\n誰が支配しているのか。\nどのような統治構造か。\n中央集権か、都市連合か、部族連合か、神殿支配か、交易組合支配か。\n\n【信仰・価値観】\n人々が何を信じ、何を尊び、何を恐れているか。\n既存神格や公式世界との接続がある場合は明記する。\n\n【経済・産業】\n何で栄えているか。\n何が不足しているか。\n交易品、特産品、争奪対象となる資源。\n\n【文化・生活】\n服飾、食、建築、祭り、身分、家族観、死生観、娯楽など。\n\n【外部との関係】\n周辺国、他地方、蛮族、魔域、交易路、移民、冒険者との関係。\n\n【冒険の発生源】\nこの舞台で自然に起こる事件の種類。\n最低5つ挙げること。\n\n【PCが訪れる理由】\n外部冒険者、現地出身者、国家雇用、ギルド依頼など、PCが関わる導線。\n\n【TRPG的な強み】\n探索、戦闘、調査、交渉、政治、怪異、遺跡、旅情など、何に強い舞台か。\n\n【弱点・懸念点】\nこの案の欠点、運用上の難しさ、薄くなりそうな点を辛口で書く。\n\n【長期運用の拡張性】\n単発だけでなく、複数話・長期キャンペーンに発展できる要素。\n\n【向いているシナリオ傾向】\nこの案に向くシナリオジャンルを挙げる。\n\n【向いていないシナリオ傾向】\nこの案と相性が悪いシナリオジャンルを挙げる。\n\n【採用する場合の調整案】\n弱点を補うために、どこを調整すべきか。\n\n※案B以降も同じ形式で作成する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　案ごとの比較】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の観点で、各案を比較すること。\n\n■3-1. TRPG運用性\n・PCが関わりやすいか\n・依頼が作りやすいか\n・探索、戦闘、調査、交渉のバランスがよいか\n\n■3-2. オープンワールド適性\n・複数の都市、地域、組織、危険地帯を作りやすいか\n・単発にも長期にも使えるか\n・シナリオの幅が狭くなりすぎないか\n\n■3-3. モチーフの強度\n・文化モチーフが表面的ではないか\n・現実文化の丸写しになっていないか\n・ファンタジー世界として自立しているか\n\n■3-4. 既存世界との接続性\n・公式設定と矛盾しにくいか\n・既存の大陸、地方、種族、神、魔法、文明史と接続しやすいか\n・既存舞台との差別化ができているか\n\n■3-5. シナリオフックの豊富さ\n・自然に事件が起こるか\n・政治、怪異、遺跡、魔物、交易、信仰など複数の事件源があるか\n・毎回同じような話にならないか\n\n■3-6. 情緒・魅力\n・プレイヤーが行ってみたいと思えるか\n・土地の匂い、季節感、生活感が出せるか\n・ただの設定資料で終わらず、物語の舞台として映えるか\n\n■3-7. 危険な弱点\n各案について、最も危険な弱点を一つずつ明記すること。\n遠慮なく辛口でよい。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　比較表】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の形式で比較表を作成する。\n\n| 観点 | 案A | 案B | 案C |\n|---|---|---|---|\n| TRPG運用性 |  |  |  |\n| オープンワールド適性 |  |  |  |\n| モチーフの独自性 |  |  |  |\n| 既存世界との接続 |  |  |  |\n| シナリオフック量 |  |  |  |\n| 長期運用性 |  |  |  |\n| 情緒・魅力 |  |  |  |\n| 弱点の重さ |  |  |  |\n| 総合評価 |  |  |  |\n\n評価は、◎、○、△、×を用いること。\nただし、記号だけで終わらせず、表の後に必ず短評を添えること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　辛口総評】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各案について、以下の形式で総評する。\n\n■案Aの総評\n・良い点\n・悪い点\n・採用するなら何を削るべきか\n・採用するなら何を足すべきか\n・そのまま採用してよいか\n\n■案Bの総評\n同上。\n\n■案Cの総評\n同上。\n\nその後、全体として最も危険な設計上の問題を指摘すること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　採用候補の選定】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下のいずれかの形で、次のステップに進める採用候補を提示すること。\n\n■6-1. 単独採用案\n最も優れている案を1つ選び、その理由を説明する。\n\n■6-2. ミックス案\n複数案の良い部分を組み合わせる場合は、以下を記載する。\n\n【ベースにする案】\n【取り入れる要素】\n・案Aから：\n・案Bから：\n・案Cから：\n\n【捨てる要素】\n採用しない要素を明記する。\n全部載せにしないこと。\n\n【ミックス後の一言コンセプト】\n統合後の舞台を一文で表す。\n\n【ミックス後の強み】\nなぜ単独案より良いのか。\n\n【ミックス後の懸念】\n混ぜたことで発生する危険や、調整すべき点。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第7章　採用候補の骨子】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n採用候補について、次の世界観マスターデータ作成へ進むための骨子を整理する。\n\n【正式名称候補】\n最低5案提示する。\nそれぞれ語感、由来、印象を説明する。\n\n【最有力名称】\n1つ選び、その理由を説明する。\n\n【舞台の一文定義】\nこの舞台を一文で表す。\n\n【中核テーマ】\n3つまでに絞る。\n\n【主要な対立構造】\n最低3つ提示する。\n例：\n・中央と地方\n・信仰と商業\n・古代遺産と現代社会\n・定住民と遊牧民\n・生者と死者\n・冒険者と既存権力\n\n【主要地域の候補】\n最低5つ提示する。\n各地域について、名前、特徴、冒険の種を簡潔に記載する。\n\n【主要組織の候補】\n最低5つ提示する。\n各組織について、目的、表向きの役割、火種を簡潔に記載する。\n\n【公式NPC候補の方向性】\nこの舞台で必要になりそうな公式NPCの役割を整理する。\nまだ個別NPCを詳細作成しないこと。\n\n【代表的なシナリオフック】\n最低10個提示する。\n単発向けと長期向けを混ぜること。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第8章　次ステップへの引き継ぎ】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最後に、次に作成すべき資料を提案する。\n\n例：\n1. 世界観マスターデータ決定稿\n2. 主要都市一覧\n3. 公式NPC一覧\n4. 冒険者ギルド設定\n5. 地方別シナリオフック集\n6. 敵対勢力・危険地域資料\n7. 種族分布・文化資料\n\nまた、次に世界観マスターデータを作る場合に、絶対に引き継ぐべき設定と、まだ確定しない方がよい設定を分けて記載すること。\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、以下を確認してください。\n\n1. 舞台案が単なる観光地紹介になっていないか。\n2. PCが関わる理由が明確か。\n3. 事件が自然発生する構造があるか。\n4. 現実文化モチーフが表面的ではないか。\n5. 既存世界と接続できる余地があるか。\n6. 複数のシナリオジャンルに耐えられるか。\n7. 各案の弱点をきちんと指摘しているか。\n8. 全部載せの雑なミックス案になっていないか。\n9. 次の世界観マスターデータ作成へ進める骨子があるか。\n10. 固有名詞だけが増えて、中身が薄くなっていないか。",

                              "template": "# 命令書：採用済み舞台案をオープンワールド用・世界観マスターデータへ変換するプロンプト\n\nあなたはプロのTRPGワールドデザイナー兼シナリオライターです。\n以下の「採用済み舞台案」をもとに、今後の単発シナリオ、長期キャンペーン、公式NPC作成、都市設定、怪異設計、政治事件、冒険者依頼、地方探索、敵対勢力作成の土台となる、オープンワールド用の世界観マスターデータを作成してください。\n\nこの資料は、特定の一キャンペーン専用資料ではありません。\n舞台全体を長期運用するための根幹資料です。\n\nただし、世界観資料だからといって、設定を無制限に増やしてはいけません。\n重要なのは「広げられる骨格」を作ることです。\n固有名詞を並べただけの百科事典ではなく、TRPGで実際に使える舞台資料にしてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【採用済み舞台案】\nミックス案とします\n\n3. 【舞台の正式名称】\n[未定 / 候補あり / 決定済み]\n※未定の場合は、採用済み舞台案に基づいて正式名称候補を複数提示し、最有力案を選定すること。\n\n“灰壁と花霧の国”ヴェルガルド\n\n4. 【舞台の規模】\n[例：一都市と周辺地域 / 複数都市を含む地方 / 国家規模 / 列島規模 / 大陸の一角 / 異界全域]\n\n前回の通り\n\n5. 【上位世界・時代条件】\n[例：ラクシア世界内、アルフレイム大陸周辺、ブルライト地方近隣、公式現行時代、〈大破局〉後の復興期、魔動機文明の遺産が少ない、など]\n\n前回の通り\n\n6. 【現実文化・歴史モチーフ】\n[例：和風、古代エジプト風、ロシア風、中央アジア遊牧民風、東南アジア海洋国家風など]\n※採用案に含まれている場合も、再確認して整理すること。\n\n前回の通り\n\n7. 【モチーフの反映方針】\n[例：強く反映 / 風味程度 / 建築と服飾中心 / 信仰と政治中心 / 名前の響き中心 / 複数文化を混ぜる]\n\n前回の通り\n\n8. 【ジャンル・空気感】\n[例：王道冒険、ダークファンタジー、秘境探索、政治劇、怪異譚、海洋冒険、辺境開拓、退廃都市、宗教幻想、古代遺跡探索など]\n\n前回の通り\n\n9. 【舞台の中核テーマ】\n[例：復興、失われた栄光、信仰と政治、自然との共存、古代遺産の再発見、民族間対立、死者と生者の境界、交易と欲望など]\n\n前回の通り\n\n10. 【必ず残したい要素】\n[採用案から絶対に残したい設定、地理、文化、対立構造、組織、雰囲気など]\n\n案の通りでOK\n\n11. 【削ってよい要素】\n[採用案にあるが、重すぎる・扱いづらい・まだ確定しない方がよい要素など]\n\n特になし\n\n12. 【避けたい要素】\n[例：魔動機要素を増やしすぎない、現実宗教を直接出さない、政治を複雑にしすぎない、特定キャンペーンの黒幕を決めない、など]\n\n前回の通り\n\n13. 【PCの想定立場】\n[例：外から来た冒険者、現地出身者、ギルド所属、国家に雇われた調査員、流れ者、開拓者、特に固定しない]\n\n前回の通り\n\n14. 【冒険の主な方向性】\n[例：各地探索、都市事件解決、遺跡調査、怪異退治、交易路開拓、政治陰謀、辺境防衛、神話の真相解明など]\n\n指定なし\n\n15. 【参照してよい資料】\n[添付資料がある場合はここに列挙。ない場合は「なし」とする]\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・採用済み舞台案を尊重し、その核を壊さないこと。\n・ただし、採用案の内容をそのまま水増しせず、マスターデータとして再整理すること。\n・特定キャンペーンの黒幕、最終ボス、一本道の真相を決めすぎないこと。\n・単発シナリオにも長期キャンペーンにも使える余白を残すこと。\n・PCがこの舞台で冒険する理由を複数用意すること。\n・地理、歴史、政治、信仰、経済、生活、危険、組織、冒険者制度を相互に接続すること。\n・現実文化モチーフを、名前や衣装だけで終わらせないこと。\n・モチーフは、地理、気候、建築、食、信仰、政治制度、軍事、交易、死生観、祝祭、階級制度、生活習慣へ分解して再構成すること。\n・現実の国や民族をそのままファンタジー種族に置き換えるような雑な処理は避けること。\n・既存公式世界がある場合、その世界の神、種族、魔法、歴史、文明水準と矛盾しないようにすること。\n・独自用語を作る場合は、初出時に意味を説明すること。\n・固有名詞を増やしすぎず、重要度に応じて整理すること。\n・公開情報、専門知識、GM向け非公開情報を分けること。\n・ただしGM向け非公開情報は、複数の解釈やシナリオに展開できる形にし、固定しすぎないこと。\n・美点だけでなく、問題点、歪み、危険、生活上の不便、政治的摩擦を必ず定義すること。\n・各章には、TRPGでの使い道やシナリオフックへ繋がる要素を含めること。\n・名前だけの組織、活動内容のない都市、役割のない信仰を作らないこと。\n・「PCが何を調べ、どこへ行き、誰と交渉し、何と戦うのか」が見える資料にすること。\n\n==================================================\n# 出力形式\n==================================================\n\n以下の構成で、内容を端折らずに出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第0章　採用案の再整理】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■0-1. 採用案の要約\n採用済み舞台案の中核を、以下の観点で整理する。\n\n・舞台の一文定義\n・規模\n・文化モチーフ\n・ジャンル\n・中核テーマ\n・主要対立\n・冒険の方向性\n・必ず残すべき魅力\n\n■0-2. マスターデータ化にあたっての調整方針\n採用案を世界観資料へ変換する際、何を広げ、何を抑えるかを明記する。\n\n・広げる要素\n・抑える要素\n・まだ確定しない要素\n・公式NPC作成時に回す要素\n・シナリオ個別作成時に回す要素\n\n■0-3. 危険な肥大化ポイント\nこの舞台を作る際に、設定過多・固有名詞過多・政治過多・神話過多になりやすい箇所を辛口で指摘する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　舞台の基本定義】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. 舞台名称\n正式名称を決める。\n未定の場合は、最低5案を提示し、語感、由来、印象、欠点を整理した上で最有力案を選ぶ。\n\n【名称候補】\n1.\n2.\n3.\n4.\n5.\n\n【最有力名称】\n・名称：\n・理由：\n・略称や通称：\n・外部の人々からの呼ばれ方：\n・現地民からの呼ばれ方：\n\n■1-2. 舞台の概要\n・どこにあるのか\n・どの程度の広さか\n・どのような土地か\n・外部からどう見られているか\n・現地民は自分たちの土地をどう理解しているか\n・一言で言うならどのような舞台か\n\n■1-3. 中核コンセプト\n・この舞台を他地域と差別化する核\n・美点\n・危険性\n・TRPG的に面白い矛盾\n・この土地でしか起こりにくい事件\n\n■1-4. 公開情報・専門情報・GM情報\n以下の三段階で情報を整理する。\n\n【一般公開情報】\n旅人、商人、冒険者が普通に知っていてよい情報。\n\n【専門情報】\nセージ、神官、地元民、学者、役人、ギルド関係者などが判定や調査で知る情報。\n\n【GM向け非公開情報】\n裏事情、諸説、未確定の真相候補。\nただし、単一キャンペーンの黒幕や結末を固定しすぎないこと。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　地理・気候・自然環境】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■2-1. 全体地理\n・地形\n・気候\n・季節\n・海、山、川、森、砂漠、雪原、火山、湿地など\n・自然災害\n・交通の難所\n・地図上の大まかな構造\n\n■2-2. 地域区分\n舞台内を、最低5つの地域に分ける。\n各地域について以下を記載する。\n\n【地域名】\n【地形】\n【気候】\n【主な住民】\n【主要産業】\n【信仰・文化】\n【危険】\n【代表的な拠点】\n【冒険の種】\n\n■2-3. 旅と移動\n・主要街道\n・船路\n・飛行船や転移装置の有無\n・関所\n・旅の危険\n・季節による移動制限\n・一般人の移動感覚\n・冒険者が重宝される理由\n\n■2-4. 自然環境から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　歴史】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■3-1. 神話・伝承時代\n・建国神話\n・土地の始まりに関する伝承\n・神、精霊、古代種族、英雄など\n・現在の信仰や政治にどう影響しているか\n・事実かどうか曖昧な点\n\n■3-2. 古代・文明期\n・古い王朝、都市、文明、遺跡\n・魔法文明、魔動機文明、神紀文明など公式世界との接続\n・古代の失敗や遺産\n・現在も残る技術や禁忌\n\n■3-3. 近世・大災害・戦乱\n・大きな戦争\n・災害\n・侵略\n・魔域\n・蛮族や魔神との関係\n・統治体制が変わった出来事\n\n■3-4. 現在\n・現在の時代状況\n・復興中なのか、安定期なのか、衰退期なのか\n・外部との交流状況\n・現在も残る未解決問題\n\n■3-5. 歴史から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　政治・統治・法】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■4-1. 統治体制\n・最高権力者または最高機関\n・地方統治\n・役人、貴族、領主、評議会、神殿、商会などの関係\n・権力の正統性\n\n■4-2. 主要派閥\n最低5つの政治的・社会的勢力を定義する。\n\n各勢力について以下を記載する。\n\n【勢力名】\n【種別】\n【拠点】\n【表向きの目的】\n【実際の利害】\n【支持層】\n【対立相手】\n【PCとの関わり方】\n【シナリオフック】\n\n■4-3. 法と治安\n・犯罪の扱い\n・裁判や処罰\n・衛兵、奉行所、騎士団、神殿、ギルドの権限\n・冒険者が合法的に活動できる理由\n・法の届きにくい場所\n\n■4-4. 政治・法から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　信仰・宗教・祭祀】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■5-1. 主流信仰\n・主要な神格\n・公式世界の神との接続\n・神殿や社の役割\n・信仰が政治や生活に与える影響\n\n■5-2. 地方信仰・民間信仰\n・土地神\n・精霊信仰\n・祖霊信仰\n・自然崇拝\n・迷信\n・禁忌\n・民間療法や呪い避け\n\n■5-3. 祭祀と年中行事\n・祭り\n・葬儀\n・婚姻\n・成人儀礼\n・収穫祭\n・航海安全祈願\n・戦勝祈願\n・鎮魂儀礼\n\n■5-4. 宗教組織の実務\n・神官や祭祀者が普段何をしているか\n・治療、記録、教育、葬儀、相談、祓いなど\n・神殿と行政の関係\n・冒険者へ依頼が来る理由\n\n■5-5. 信仰から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　種族・人口・社会階層】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■6-1. 主要種族分布\n・人族の分布\n・蛮族との関係\n・希少種族や外来種族の扱い\n・種族ごとの社会的立場\n・差別や融和の状況\n\n■6-2. 社会階層\n・支配層\n・神官層\n・商人\n・職人\n・農民\n・漁民\n・遊牧民\n・傭兵\n・冒険者\n・被差別層や周縁民がいる場合の扱い\n\n■6-3. 家族・共同体・身分\n・家族観\n・相続\n・婚姻\n・養子\n・氏族\n・部族\n・都市共同体\n・ギルド共同体\n\n■6-4. 種族・階層から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第7章　経済・産業・流通】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■7-1. 主要産業\n・農業\n・漁業\n・牧畜\n・鉱業\n・工芸\n・魔法産業\n・交易\n・観光\n・傭兵業\n・冒険者業など\n\n■7-2. 特産品\n最低10個提示する。\n各特産品について以下を記載する。\n\n【名称】\n【産地】\n【用途】\n【価値】\n【危険や問題】\n【シナリオフック】\n\n■7-3. 交易と物流\n・主要交易路\n・交易相手\n・商会\n・関税\n・密輸\n・輸送上の危険\n・外部世界との経済関係\n\n■7-4. 経済から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第8章　都市・拠点・危険地帯】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■8-1. 主要都市\n最低5都市を作成する。\n各都市について以下を記載する。\n\n【都市名】\n【別名・通称】\n【立地】\n【人口規模の目安】\n【主な住民】\n【統治者・管理機関】\n【主要産業】\n【信仰】\n【治安】\n【冒険者への態度】\n【名所】\n【問題点】\n【シナリオフック】\n\n■8-2. 小規模拠点\n最低8つ提示する。\n村、宿場、港、砦、鉱山町、巡礼地、学術拠点、温泉地などを含める。\n\n■8-3. 危険地帯・禁足地\n最低8つ提示する。\n各地点について以下を記載する。\n\n【名称】\n【種類】\n【場所】\n【危険内容】\n【地元民の認識】\n【実際の脅威】\n【探索の見返り】\n【シナリオフック】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第9章　文化・生活・名前】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■9-1. 生活文化\n・食文化\n・服飾\n・住居\n・娯楽\n・教育\n・医療\n・旅\n・宿\n・風呂や衛生\n・季節行事\n\n■9-2. 価値観\n・名誉\n・家族\n・死生観\n・信仰\n・富\n・戦い\n・冒険者\n・外来者\n・魔法や神への感覚\n\n■9-3. 名前の傾向\n・人名\n・地名\n・組織名\n・役職名\n・異名\n・地方差\n・モチーフ由来の語感\n・命名時の注意\n\n最低20個の人名例、20個の地名例、10個の組織名例を提示すること。\n\n■9-4. 文化から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第10章　軍事・防衛・冒険者制度】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■10-1. 正規戦力\n・軍\n・衛兵\n・騎士団\n・武士団\n・神殿戦力\n・魔法戦力\n・傭兵\n・民兵\n・密偵\n\n■10-2. 冒険者ギルド\n・存在するか\n・どの都市にあるか\n・依頼の流れ\n・公的機関との関係\n・冒険者の社会的評価\n・外部冒険者が受け入れられる理由\n・嫌われる理由\n\n■10-3. 外敵・脅威\n・蛮族\n・アンデッド\n・魔神\n・魔域\n・魔物\n・盗賊\n・他国\n・自然災害\n・怪異\n\n■10-4. 防衛と冒険者制度から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第11章　怪異・魔物・特殊な危険】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■11-1. この土地特有の脅威\n最低10種類提示する。\n各脅威について以下を記載する。\n\n【名称】\n【分類】\n公式システム上の魔物分類に近いものを示す。\n例：蛮族、動物、植物、アンデッド、魔法生物、魔動機、幻獣、妖精、魔神、人族、神族など。\n\n【発生地域】\n【外見・特徴】\n【生態・行動】\n【被害】\n【対処法】\n【地元民の呼び名】\n【専門家の見解】\n【シナリオフック】\n\n■11-2. 怪異と生活の関係\n・人々がどう対処しているか\n・迷信と実害\n・専門機関の有無\n・冒険者が必要になる理由\n\n■11-3. 脅威から生まれるシナリオフック\n最低10個提示する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第12章　主要組織】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最低10組織を作成する。\n以下の種別をなるべく含めること。\n\n・統治機関\n・宗教組織\n・冒険者ギルド\n・商会\n・職人組合\n・軍事組織\n・密偵組織\n・学術組織\n・犯罪組織\n・地方共同体\n・怪異対策組織\n・敵対的勢力\n\n各組織について以下を記載する。\n\n【組織名】\n【種別】\n【拠点】\n【目的】\n【表向きの活動】\n【裏の活動・噂】\n【代表者候補】\n【PCとの関わり方】\n【対立組織】\n【依頼例】\n【シナリオフック】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第13章　公式NPC作成への橋渡し】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nこの章では、個別NPCの詳細作成は行わない。\n公式NPC資料を作る際に必要となる役割枠だけを整理する。\n\n■13-1. 必要な公式NPC枠\n最低15枠提示する。\n\n各枠について以下を記載する。\n\n【役割枠】\n例：首都の冒険者ギルドマスター、辺境砦の守備隊長、主流神殿の高位神官、禁足地を知る老案内人など。\n\n【必要な理由】\n【拠点】\n【PCとの接点】\n【出しすぎ注意点】\n【このNPCが担う世界観の側面】\n\n■13-2. 公式NPCに担わせてはいけない役割\n・PCの活躍を奪う役\n・シナリオの真相を一方的に説明する役\n・万能解決役\n・特定キャンペーンの主役化\nなどを整理する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第14章　冒険の種】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■14-1. 低レベル向け依頼\n最低10個。\n\n■14-2. 中レベル向け依頼\n最低10個。\n\n■14-3. 高レベル向け依頼\n最低10個。\n\n■14-4. 長期キャンペーン化できる火種\n最低10個。\n\n各フックは以下の形式で記載する。\n\n【依頼名】\n【導入】\n【表向きの問題】\n【実際の問題】\n【関与地域】\n【関与組織】\n【想定される判定・場面】\n【後続展開】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第15章　運用上の注意】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■15-1. GMが最初に開示してよい情報\nPCがこの舞台を訪れる前、または初回導入で説明してよい情報。\n\n■15-2. 判定で開示する情報\n見識判定、文献判定、聞き込み、探索、神聖魔法、地元民との会話などで段階的に出す情報。\n\n■15-3. 伏せておく情報\n最初から明かすと面白さが落ちる情報。\nただし、固定キャンペーンの核心にしすぎないこと。\n\n■15-4. 変更してよい余白\n各GMや各シナリオで自由に変えてよい部分。\n\n■15-5. 変更しない方がよい根幹\nこの舞台らしさを壊さないために維持すべき部分。\n\n■15-6. やりすぎ注意点\n・固有名詞過多\n・政治設定過多\n・現実文化の丸写し\n・強力NPCの出しすぎ\n・暗さの過剰投入\n・PCの行動余地を狭める設定\nなど、危険な運用を辛口で指摘する。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第16章　マスターデータ要約】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n最後に、今後参照しやすいように以下をまとめる。\n\n【舞台の一文定義】\n【中核テーマ】\n【主要地域】\n【主要都市】\n【主要組織】\n【主要な脅威】\n【冒険者が必要とされる理由】\n【最も重要な対立構造】\n【この舞台でやると映えるシナリオ】\n【この舞台でやると危険なシナリオ】\n【次に作るべき資料】\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、以下を確認してください。\n\n1. 採用済み舞台案の核が壊れていないか。\n2. 特定キャンペーン専用の一本道設定になっていないか。\n3. PCが冒険する理由が複数あるか。\n4. 地理、歴史、政治、信仰、経済、生活、危険が相互に接続されているか。\n5. 現実文化モチーフが表面的ではないか。\n6. 公式世界と矛盾しそうな箇所がないか。\n7. 固有名詞だけ増えて中身が薄い箇所がないか。\n8. 都市、組織、危険地帯がシナリオフックに繋がっているか。\n9. 公式NPC作成に進めるだけの役割枠が整理されているか。\n10. GMが使いやすい公開情報・専門情報・非公開情報の整理があるか。\n11. 単発にも長期キャンペーンにも使える余白が残っているか。\n12. 舞台の美点だけでなく、歪みや問題点が明確か。",

                              "template": "# 命令書：世界観決定稿の資料成形\n\nあなたはプロのTRPGワールドデザイナー兼編集者です。\n以下の入力要素と資料をもとに、作成済みの世界観資料を、今後のシナリオ作成・NPC作成・プレイヤー向け共有・GM用参照に耐える正式なマスターデータへ成形してください。\n\n本工程では、新しい設定を無制限に追加することが目的ではありません。\n目的は、既に作成された世界観決定稿を読み直し、情報の重複、短文の羅列、説明不足、章構成の乱れ、初出語の不親切さを整理し、TRPGで実際に参照しやすい資料へ整えることです。\n\n本工程で作成された資料は、必要に応じて以下の資料の改訂版として扱います。\n\n・[資]1.オープンワールド世界観マスターデータ.txt\n・[資]5.キャンペーン世界観・裏設定資料.txt\n・その他、世界観に関する正式資料\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【成形対象資料】\n[ここに成形したい世界観資料本文を入力]\n\n2. 【資料の種別】\n[例：オープンワールド世界観資料 / キャンペーン世界観資料 / 都市設定資料 / 地方設定資料 / 裏設定資料 など]\n\n3. 【使用システム】\nソード・ワールド2.5\n\n4. 【対象舞台名】\n[舞台名、国名、地方名、都市名など]\n\n5. 【対象読者】\n[例：GM専用 / PLにも一部公開可能 / 外部向け記事の下地 / 今後のAI作業用マスターデータ など]\n\n6. 【秘匿情報の扱い】\n[例：GM向け非公開情報を保持する / PL公開情報と分離する / 今回は秘匿を含めない / 秘匿情報を伏せ字化する など]\n\n7. 【成形方針】\n[例：章立てを整理したい / 短文を減らしたい / 初出語の説明を増やしたい / 固有名詞を整理したい / TRPGで使いやすくしたい など]\n\n8. 【残したい要素】\n[絶対に削らず残したい設定、固有名詞、雰囲気、章、対立構造など]\n\n9. 【削ってよい要素】\n[重複、冗長、不要になった案、未採用設定など]\n\n10. 【追加してよい補足】\n[例：初出語の説明、TRPGでの使い道、判定で分かる情報、公開情報と秘匿情報の境界など]\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・成形対象資料の核を壊さないこと。\n・未確定の設定を、確定情報のように書かないこと。\n・資料に存在しない公式設定を捏造しないこと。\n・ソード・ワールド2.5の公式設定を不用意に改変しないこと。\n・固有名詞を増やしすぎないこと。\n・説明が足りない初出語には、自然な補足を加えること。\n・ただし、補足のために新設定を過剰に増やさないこと。\n・短文や箇条書きを、必要に応じて重厚で読みやすい文章へ成形すること。\n・TRPGで実際に使う資料として、どの章が何に使えるか分かるようにすること。\n・公開情報、専門情報、GM向け非公開情報を必要に応じて分けること。\n・設定の美しさだけでなく、冒険の発生源、PCの関与余地、シナリオフックへの接続を意識すること。\n・矛盾、重複、役割の曖昧な組織や地名があれば整理すること。\n・ただの百科事典ではなく、セッション運用に使える資料にすること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力された資料と添付資料のみを参照してください。\n\n==================================================\n# 成形時の重点項目\n==================================================\n\n1. 【章構成】\n・章の順番は自然か。\n・世界観の基本定義、地理、歴史、政治、信仰、生活、危険、冒険の種が整理されているか。\n・GM向け情報とPL公開可能情報が混ざりすぎていないか。\n\n2. 【初出語の説明】\n・固有名詞が初めて登場した時に意味が分かるか。\n・PC視点で知っていてよい情報と、判定や調査で分かる情報が分かれているか。\n・読者が「何のこと？」となる語句が放置されていないか。\n\n3. 【文章の密度】\n・短文の羅列になっていないか。\n・逆に、長すぎて何を言っているのか分からない文章になっていないか。\n・必要に応じて、短文を接続し、因果関係を持つ段落へ成形すること。\n\n4. 【TRPGでの使用性】\n・PCがどこへ行き、誰と会い、何を調べ、何と戦うのかが見えるか。\n・依頼、探索、交渉、戦闘、怪異、政治事件、旅情に接続できるか。\n・冒険者が関わる理由が自然に生まれるか。\n\n5. 【情報の階層化】\n・一般公開情報。\n・専門知識や判定で分かる情報。\n・GM向け非公開情報。\n・未確定情報や複数解釈可能な情報。\nこれらを必要に応じて分けること。\n\n6. 【矛盾と肥大化の整理】\n・同じ役割の組織やNPCが重複していないか。\n・使い道のない固有名詞が増えていないか。\n・設定がシナリオを圧迫していないか。\n・政治、宗教、神話、歴史が複雑になりすぎていないか。\n\n==================================================\n# 出力形式\n==================================================\n\n以下の構成で出力してください。\n出力はプレーンテキストのコードブロックにしてください。\n余計な挨拶や会話文は挟まないでください。\n\n==================================================\n【世界観資料・成形版】\n==================================================\n\n■0. 成形方針\n【対象資料】\n【資料種別】\n【対象読者】\n【秘匿情報の扱い】\n【今回の成形で重視したこと】\n【新規追加を抑えた点】\n【補足を加えた点】\n\n■1. 資料の一文定義\n\n■2. 基本概要\n\n■3. 重要用語一覧\n【用語】\n【読み・表記】\n【分類】\n【一般公開情報】\n【専門情報】\n【GM向け非公開情報】\n【シナリオでの使い道】\n\n■4. 公開情報・専門情報・GM情報の整理\n【一般公開情報】\n【専門情報】\n【GM向け非公開情報】\n\n■5. 章別成形本文\n成形対象資料を、必要に応じて章立てし直し、正式資料として再出力する。\n元資料の内容を端折らず、ただし重複は統合すること。\n\n■6. TRPG運用メモ\n【PCが関わる導線】\n【自然に発生する依頼】\n【探索対象】\n【交渉対象】\n【戦闘や危険】\n【判定で開示できる情報】\n【シナリオフックへ繋がる要素】\n\n■7. 肥大化防止メモ\n【増やしすぎると危険な要素】\n【今後のNPC作成に回す要素】\n【各話シナリオ作成に回す要素】\n【まだ確定しない方がよい要素】\n【削除・統合した方がよい要素】\n\n■8. 次工程への引き継ぎ\n【次に参照すべき資料】\n【NPC作成時に使うべき要素】\n【シナリオフック作成時に使うべき要素】\n【Notion向け外部記事化で公開してよい要素】\n【Notion向け外部記事化で伏せるべき要素】\n\n==================================================\n\n出力後、必要であれば、\n「次に短文排除・重厚文体化工程へ進みますか？」\nと確認し、処理を停止してください。\n",

                              "description": "オープンワールド世界観資料の短文・箇条書きを重厚で読みやすい本文へ改稿する工程。1-3-A後に実行。",
                              "template": "# 命令書：短文排除・重厚文体化プロンプト\n\nあなたはプロのTRPGワールドデザイナー兼文芸編集者です。\n以下の入力資料をもとに、短文の羅列、箇条書きの断片、説明不足の設定文を、重厚で読み応えのある正式資料文へ改稿してください。\n\n本工程の目的は、新しい設定を大量に追加することではありません。\n目的は、既存の設定を読みやすく、格調ある文章へ整え、世界観資料・NPC資料・シナリオ資料としての説得力を高めることです。\n\n短文をただ長くするのではなく、因果関係、生活感、歴史的背景、TRPGでの使い道が自然に伝わるように文章を接続してください。\nただし、冗長な美文や抽象表現に逃げてはいけません。\n読み応えは必要ですが、使えない文章は不要です。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【改稿対象本文】\n[ここに短文や箇条書きが目立つ資料本文を入力]\n\n2. 【資料の種別】\n[例：世界観資料 / NPC資料 / 都市設定 / 組織設定 / シナリオプロット / 依頼文 / 外部紹介記事の下書き など]\n\n3. 【使用システム】\nソード・ワールド2.5\n\n4. 【対象舞台・対象資料名】\n[舞台名、国名、都市名、資料名など]\n\n5. 【目標文体】\n[例：重厚 / 読みやすい / 和風ダークファンタジー / 公式資料風 / GM用資料風 / PL向け紹介文風 など]\n\n6. 【文章量の目標】\n[例：現在の1.5倍程度 / 2倍程度 / 必要な箇所のみ増量 / 章ごとに最低〇行 など]\n\n7. 【残したい表現】\n[元文の中で必ず残したい言い回し、固有名詞、雰囲気など]\n\n8. 【避けたい表現】\n[例：抽象的すぎる表現、詩的すぎる言い回し、断定しすぎる文章、くどすぎる美文、独自用語の乱発など]\n\n9. 【秘匿情報の扱い】\n[例：保持する / 伏せる / GM情報として分離する / PL向けにぼかす など]\n\n10. 【追加してよい補足】\n[例：初出語の簡単な説明、生活感、TRPGでの使い道、PCが知る情報とGM情報の分離など]\n\n==================================================\n# 改稿方針\n==================================================\n\n・元資料の意味を変えないこと。\n・設定を勝手に増やしすぎないこと。\n・存在しない公式設定やルールを捏造しないこと。\n・ソード・ワールド2.5のルールを不用意に拡大解釈しないこと。\n・短文を単に接続するだけでなく、因果関係が分かる段落へ整えること。\n・一文を長くしすぎて読みにくくしないこと。\n・短文をすべて消す必要はない。要点や見出し、一覧では短文を残してよい。\n・重厚さと可読性を両立すること。\n・抽象的な言い回しだけで逃げないこと。\n・TRPGで使える情報を保つこと。\n・固有名詞は初出時に自然な説明を添えること。\n・PC視点で知ってよい情報と、GM向け秘匿情報を混ぜすぎないこと。\n・資料として参照しやすいよう、必要に応じて見出しを整理すること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力された資料と添付資料のみを参照してください。\n\n==================================================\n# 文体ルール\n==================================================\n\n・文体は、平板すぎず、しかし過剰に詩的にしないこと。\n・短文の連続を避け、複数の情報を因果関係で接続すること。\n・ただし、一文に情報を詰め込みすぎて息苦しくしないこと。\n・「〜である」「〜している」「〜とされる」「〜と考えられている」などを使い分け、断定と伝聞の差を明確にすること。\n・秘匿情報や未確定情報は、「真実である」と断定しすぎず、GM情報や諸説として扱うこと。\n・和風ダークファンタジー資料の場合、情景や制度の重さを出してよいが、雰囲気だけで内容をぼかさないこと。\n・読み手が資料として使えるよう、段落ごとに役割を持たせること。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n余計な挨拶や会話文は挟まないでください。\n\n==================================================\n【短文排除・重厚文体化：改稿結果】\n==================================================\n\n■1. 改稿方針\n【資料種別】\n【対象資料名】\n【目標文体】\n【文章量の目標】\n【秘匿情報の扱い】\n【今回重視した点】\n\n■2. 改稿前の問題点\n【短文の連続】\n【説明不足】\n【因果関係の弱さ】\n【資料としての使いにくさ】\n【過剰または不足している情報】\n【秘匿情報の混在】\n\n■3. 改稿後本文\n入力資料を、重厚で読みやすい正式資料文へ改稿して出力する。\n元資料の内容を端折らず、必要に応じて章立てを整理すること。\nただし、重複は統合してよい。\n\n■4. 補足した内容\n【初出語への補足】\n【生活感への補足】\n【因果関係への補足】\n【TRPG運用上の補足】\n【GM向け注意】\n\n■5. 追加しなかった内容\n【新規設定として増やさなかったもの】\n【NPC作成へ回すもの】\n【シナリオ作成へ回すもの】\n【Notion向け記事化で扱うもの】\n\n■6. 次工程への引き継ぎ\n【この本文を使うべき工程】\n【さらに成形が必要な箇所】\n【PL公開時に伏せるべき箇所】\n【Notion向け記事化時の注意】\n\n==================================================\n\n出力後、必要であれば、\n「次にオープンワールド舞台紹介記事作成工程へ進みますか？」\nと確認し、処理を停止してください。\n",
                              "fields": "改稿対象本文,資料の種別,対象舞台・対象資料名,目標文体,文章量の目標,残したい表現,避けたい表現,秘匿情報の扱い,追加してよい補足",

                              "title": "1-4-A. オープンワールドNPC配置資料作成",
                              "category": "オープンワールドNPC",
                              "description": "[資]2-1.オープンワールドNPC配置資料.txt 用。舞台常設NPCの配置方針と作成対象を決める工程。",
                              "template": "# 命令書：オープンワールドNPC配置資料作成\n\nあなたはプロのTRPGワールドデザイナー兼キャンペーン設計者です。\n以下の入力要素と資料をもとに、オープンワールド舞台に常設されるNPCの「配置方針」と「作成対象」を定義するための、オープンワールドNPC配置資料を作成してください。\n\n本工程では、NPC個人の詳細設定を完成させるのではありません。\n目的は、今後作成するオープンワールド公式NPCについて、\n「どの土地にどのような役割の人物が必要か」\n「どの組織・施設・スポットに代表者や窓口が必要か」\n「どのNPCを再利用可能な公式NPCとして作るべきか」\n「どのNPCは単発・各話ゲストNPCとして後回しにすべきか」\nを整理することです。\n\nこの工程で作成された資料は、以後の\n[資]2-2.オープンワールド公式NPCマスターデータ.txt\nおよび、単発シナリオ、キャンペーン、都市設定、依頼導線、公式NPC作成の土台となる\n[資]2-1.オープンワールドNPC配置資料.txt\nとして扱います。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【オープンワールド舞台名】\n[国名、地方名、都市名、地域名など]\n\n3. 【舞台の形式】\n[例：国 / 地方 / 都市圏 / 辺境地域 / 複数都市を含む広域舞台 / 冒険者ギルド拠点型 / 探索型オープンワールド など]\n\n4. 【オープンワールド世界観資料】\n[資]1.オープンワールド世界観マスターデータ.txt\n※作成済みの場合は添付または貼り付けること。\n\n5. 【世界観決定稿の成形版】\n[1-3-A、1-3-Bで成形・重厚化した資料があれば添付または貼り付けること]\n\n6. 【モチーフ作品リサーチ資料】\n[資]4.モチーフ作品リサーチ資料.txt\n※存在する場合のみ参照すること。\n\n7. 【既に決定している常設NPC】\n[既に作成済みの公式NPC、ギルド関係者、都市代表、神殿関係者、商人、案内人などがあれば列挙。いない場合は「なし」とする]\n\n8. 【キャンペーン専用NPCとの切り分け方針】\n[例：キャンペーン専用NPCはまだ作らない / 公式NPCは中立運用 / 公式NPCを黒幕や因縁相手にしない / 特定キャンペーンに深く絡めすぎない など]\n\n9. 【必要になりそうな施設・組織・スポット】\n[例：冒険者ギルド、神殿、商人組合、職人組合、港、関所、宿場町、廃墟、禁足地、辺境村、学術機関、魔法研究施設など]\n\n10. 【避けたいNPC配置】\n[例：NPCが多すぎる、ギルドマスターが万能すぎる、公式NPCがキャンペーン主役化する、各スポット代表が全員濃すぎる、同じ役割のNPCが重複する、など]\n\n11. 【今回の配置方針メモ】\n[ユーザーが考えている地域の顔役、拠点NPC、組織代表、案内人、情報屋、商人、敵対勢力ではない障害役など]\n\n==================================================\n# 本工程の目的\n==================================================\n\nオープンワールド公式NPCは、特定キャンペーン専用のNPCではありません。\n舞台そのものに常設され、複数の単発シナリオ、複数キャンペーン、依頼導線、地域描写、PL向け世界観共有において再利用される人物です。\n\nそのため、以下の役割を重視してください。\n\n・舞台の制度や生活感を見せる\n・PCが依頼を受ける窓口になる\n・土地の空気を伝える\n・各スポットの代表や管理者として機能する\n・公式NPCとして繰り返し使える\n・ただし、特定キャンペーンの主役や黒幕にしない\n・PCの活躍を奪わない\n・必要以上に因縁や悲劇を背負わせない\n\n公式NPCは「舞台の顔」です。\nキャンペーンNPCは「物語の刃」です。\nこの2つを混同しないでください。\n\n==================================================\n# NPC重要度分類\n==================================================\n\n本工程では、オープンワールドNPCを以下の分類で扱います。\n\n【◎：舞台中核NPC】\n舞台全体、主要都市、冒険者ギルド、政治、宗教、交易、治安などに関わる中核人物。\n複数シナリオで繰り返し登場する可能性が高い。\nただし、PCの代わりに事件を解決する存在ではない。\n\n【○：地域・施設代表NPC】\n特定の街、村、神殿、商会、組合、港、関所、研究施設、禁足地周辺などを代表する人物。\nその地域や施設を訪れた時に、PCが接触する可能性が高い。\n\n【△：補助・窓口NPC】\n受付、案内人、情報屋、宿屋、商人、職人、書記官、神官、警備担当など。\n必要な時に舞台の生活感や情報導線を補助する人物。\n濃くしすぎないこと。\n\n【◇：特殊スポットNPC】\n禁足地、遺跡、怪異の多い土地、辺境、異種族圏、危険地域など、特殊なスポットに紐づく人物。\n単なる解説役ではなく、そのスポットを運用するための入口となる。\n\n【ゲストNPC】\n単発シナリオや各話詳細プロットで作成される一時的な依頼人、被害者、現場責任者、局地的敵役など。\n本工程では原則として詳細作成しない。\nただし、ゲストNPCで済ませるべき役割は、公式NPC化しないように判定する。\n\n==================================================\n# 重要な制約\n==================================================\n\n・オープンワールド公式NPCを増やしすぎないこと。\n・すべての施設やスポットに代表NPCを置く必要はない。\n・NPCではなく、地名・組織・制度・噂だけで済むものは、無理に人物化しないこと。\n・公式NPCは、原則として中立的な舞台装置、窓口、制度の顔、地域の象徴として扱うこと。\n・公式NPCを特定キャンペーンの黒幕、裏切り者、最終敵、GMPCの因縁相手として固定しないこと。\n・ただし、キャンペーンによって一時的に事件へ巻き込まれる余地は残してよい。\n・公式NPCは、PCの活躍を代替してはいけない。\n・強いNPCであっても、なぜPCに依頼するのか、なぜ自分で解決できないのかを設定段階で明確にすること。\n・各公式NPCには、表の職務、所属、拠点、日常業務を明確に設定すること。\n・独自創作の職業を乱発しないこと。\n・職業や所属は、世界観とソード・ワールド2.5の空気に沿った、活動内容の分かるものにすること。\n・既存NPCと役割、職業、拠点、性格が被りすぎないようにすること。\n・過剰な悲劇、裏設定、因縁を全員に背負わせないこと。\n・舞台紹介記事やPL公開資料に出してよい範囲と、GM向け非公開情報を分けること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料と添付資料のみを参照してください。\n\n==================================================\n# 配置対象として検討する役割枠\n==================================================\n\n以下はあくまで初期指標です。\n舞台規模、地域数、主要スポット数、冒険者ギルドの有無、政治・宗教・交易・怪異の比重に応じて、必要な枠を調整してください。\nそのまま固定採用せず、必ず辛口に検討すること。\n\n◎① 冒険者ギルド中核枠\n・ギルドマスター、支部長、受付責任者、依頼仲介役など。\n・PCが最も接触しやすい窓口。\n・万能解説役にしない。\n\n◎② 舞台の政治・行政枠\n・領主、代官、町長、役人、評議員、村長など。\n・舞台の制度や秩序を見せる人物。\n・キャンペーンごとに黒幕化しないこと。\n\n◎③ 信仰・神殿枠\n・神官、神殿長、巡回神官、祈祷師、葬送役など。\n・宗教、死生観、救護、儀礼を見せる人物。\n・神聖魔法で何でも解決する便利NPCにしない。\n\n○④ 商業・交易枠\n・商人、商会主、港湾関係者、問屋、行商人、宿場の顔役など。\n・物流、噂、依頼、物資調達に関わる。\n・情報屋化しすぎないこと。\n\n○⑤ 職人・技術枠\n・鍛冶師、薬師、細工師、書記、地図職人、船大工、採掘師など。\n・地域の産業や生活感を支える。\n・独自職業を作る場合は活動内容を明確にすること。\n\n○⑥ 治安・防衛枠\n・衛兵隊長、見張り役、警備担当、狩人、関所役人など。\n・事件の初動、現場封鎖、危険地域への警告を担う。\n・PCに命令するだけの嫌な役にしない。\n\n△⑦ 案内人・語り部枠\n・地元案内人、古老、旅籠の主、吟遊詩人、記録係など。\n・土地の歴史や噂を伝える。\n・長話だけのNPCにしない。\n\n△⑧ 生活・宿場枠\n・宿屋、料理人、茶屋、湯屋、運び屋、馬丁など。\n・舞台の温度、匂い、生活感を出す。\n・重要にしすぎず、再利用しやすくする。\n\n◇⑨ 特殊スポット代表枠\n・禁足地の見張り、遺跡管理者、辺境村の代表、異種族圏の交渉役、怪異地帯の生存者など。\n・スポットへPCを導く入口。\n・真相を知りすぎている便利NPCにしない。\n\n◇⑩ 異種族・周辺勢力接続枠\n・蛮族局地協力者、妖精郷の接触者、辺境の交易相手、異文化圏の案内人など。\n・世界の広がりを出す。\n・舞台の基本トーンから浮きすぎないこと。\n\n△⑪ 情報・噂枠\n・噂好きの酒場客、文書係、旅商人、掲示板管理人、郵便役など。\n・PLに情報導線を提供する。\n・何でも知っている情報屋にしない。\n\n==================================================\n# 対話型ステップ進行のルール\n==================================================\n\n【★警告】\nあなたは一度の出力で、オープンワールドNPC配置資料の完全版まで作成してはいけません。\n以下のSTEPに従って、ユーザーと対話しながら段階的に作成してください。\n\n[STEP 1：舞台規模とNPC総量の診断]\n・入力資料をもとに、舞台の規模、主要拠点数、冒険者ギルドの有無、政治・宗教・交易・怪異・辺境探索の比重を整理してください。\n・そのうえで、オープンワールド公式NPCとして管理すべきNPC総量の推奨値を提案してください。\n・以下を必ず検討してください。\n　1. 舞台中核NPCの推奨人数\n　2. 地域・施設代表NPCの推奨人数\n　3. 補助・窓口NPCの推奨人数\n　4. 特殊スポットNPCの推奨人数\n　5. ゲストNPCに回すべき人数・役割\n・多すぎる場合の危険、少なすぎる場合の弱点を辛口で指摘してください。\n・最後に、\n　「この総量方針でSTEP2に進みますか？ 修正したい人数や方針はありますか？」\n　と質問し、完全に処理を停止してください。\n\n[STEP 2：役割枠ごとの配置案作成]\n・STEP1で決定したNPC総量に基づき、役割枠ごとの配置案を作成してください。\n・以下を必ず含めること。\n　1. 役割番号\n　2. 重要度記号（◎○△◇）\n　3. 仮称または役割名\n　4. 所属・拠点\n　5. 舞台上の機能\n　6. PCとの接点\n　7. 再利用可能性\n　8. キャンペーン専用NPCと混同しないための注意\n　9. 後続の個別NPC作成で必ず決めるべき論点\n・配置案は最低2案、最大3案提示してください。\n・出力後、\n　「どの配置案を採用しますか？ あるいはミックスしますか？」\n　と質問し、完全に処理を停止してください。\n\n[STEP 3：採用配置案の辛口調整]\n・ユーザーが採用またはミックス方針を決めたら、NPC過多、役割被り、公式NPCの主役化、便利NPC化、舞台説明役の増えすぎ、キャンペーンNPCとの混同を辛口で検査してください。\n・問題があれば、削減・統合・重要度変更・拠点変更・役割変更を提案してください。\n・出力後、\n　「この調整案で[資]2-1.オープンワールドNPC配置資料.txt 用の決定稿を出力しますか？」\n　と質問し、完全に処理を停止してください。\n\n[STEP 4：オープンワールドNPC配置資料の決定稿出力]\n・採用された配置案を、[資]2-1.オープンワールドNPC配置資料.txt 用のマスターデータとして、プレーンテキストのコードブロックで出力してください。\n・出力には以下を必ず含めること。\n\n==================================================\n[資]2-1.オープンワールドNPC配置資料.txt\n==================================================\n\n■1. 本資料の目的\n■2. オープンワールドNPC分類\n■3. 舞台全体のNPC総量方針\n■4. NPC配置一覧\n■5. 冒険者ギルド・依頼窓口の配置方針\n■6. 地域・施設代表NPCの配置方針\n■7. 生活感・補助NPCの配置方針\n■8. 特殊スポットNPCの配置方針\n■9. 後続工程への引き継ぎ\n■10. 禁止事項\n\n・決定稿出力後、余計な挨拶や会話文を付けず、コードブロックのみで出力してください。\n",

                              "description": "[資]2-2.オープンワールド公式NPCマスターデータ.txt 用。1-4-Aの配置資料を前提に公式NPCを作成する工程。",
                              "template": "# 命令書：オープンワールド用・公式NPCマスターデータ作成\n\nあなたはプロのTRPGシナリオライター兼キャラクターデザイナーです。\n以下の入力要素と世界観資料をもとに、特定キャンペーン専用ではなく、オープンワールド全体で繰り返し利用できる「公式NPCマスターデータ」を作成してください。\n\nここで作成するNPCは、単発シナリオ、長期キャンペーン、都市イベント、冒険者ギルド導入、地方案内、依頼仲介、情報提供、政治的接続、特殊技能の師匠、敵対勢力との交渉などに使用できる、舞台の顔となる人物たちです。\n\nただし、公式NPCは物語の主役ではありません。\nPCの活躍を奪わず、各シナリオの自作NPCやゲストNPCの感情線を食わないように設計してください。\n彼らは「世界の厚み」「制度の顔」「土地の空気」「依頼の窓口」「遠景の権威」として機能する存在です。\n\n==================================================\n# 入力要素\n==================================================\n\n0. 【オープンワールドNPC配置資料】\n[資]2-1.オープンワールドNPC配置資料.txt\n※この資料で定義された役割枠、重要度、拠点、公式NPCとして作るべき対象を必ず参照すること。\n\n\n1. **対象となる舞台名**\n[ここに地方・国・島・都市圏・辺境などの名称を入力]\n\n2. **使用システム**\n[例：ソード・ワールド2.5]\n\n3. **舞台の世界観資料**\n[作成済みの世界観マスターデータ、または添付資料を指定]\n\n4. **NPC作成の方向性**\n[例：冒険者ギルド関係者を厚めにする、各都市に一人ずつ顔役を置く、神殿関係者を重視する、敵対的だが協力可能なNPCも入れる、など]\n\n5. **必要なNPC数**\n[例：主要公式NPC 8名、地方顔役 10名、など]\n\n6. **必ず含めたい役割**\n[例：支配者、ギルドマスター、副ギルドマスター、神官、商人、密偵、学者、武芸師範、蛮族側の交渉役、辺境の案内人、など]\n\n7. **避けたい役割・設定**\n[例：強すぎる同行NPC、PCを指図しすぎる上司、万能解説役、過度なギャグキャラ、独自職業の乱発、など]\n\n8. **既存NPCとの重複禁止事項**\n[既にいるNPC名、役職、性格、種族、拠点、役割などを入力]\n\n==================================================\n# 作成方針\n==================================================\n\n以下の方針を厳守してください。\n\n・公式NPCは、特定キャンペーンの核心人物にしすぎないこと。\n・PCの代わりに問題を解決できる万能NPCにしないこと。\n・強力なNPCであっても、「なぜPCに依頼するのか」「なぜ自分で解決しないのか」を明確にすること。\n・各NPCには、所属、拠点、日常業務、PCとの接点、依頼例を必ず設定すること。\n・肩書きだけ立派で何をしているか分からないNPCにしないこと。\n・表の顔、活動内容、所属機関、拠点を具体化すること。\n・NPCごとに、世界観のどの側面を体現しているかを明記すること。\n・善人ばかりにしないこと。善良、怠惰、冷徹、俗物、理想家、現実主義者、危険人物などを混ぜること。\n・ただし、安易な裏切り者だらけにもしないこと。\n・敵対可能NPCや危険人物であっても、行動原理を論理的にすること。\n・PCに対する態度は、歓迎、警戒、利用、試験、取引、観察など、NPCごとに差をつけること。\n・同じ役割のNPCを量産しないこと。\n・名前、種族、年齢、性別、外見、口調、能力、弱点、関係性を明確にすること。\n・NPCの悲しい過去は、現在の行動へ直結している場合のみ設定すること。免罪符として使わないこと。\n・「何に怒るのか」「何を恐れるのか」を主要NPCには必ず設定すること。\n・ただし、スポット的な地方顔役には簡略化してよい。\n\n==================================================\n# NPC分類\n==================================================\n\n作成するNPCは、以下の分類に分けてください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【A. 中央・国家規模の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n舞台全体の政治、信仰、軍事、外交、冒険者制度などに関わるNPC。\n強い権威や知名度を持つが、シナリオの主役にはしない。\n\n例：\n・君主、領主、皇子、王族\n・宰相、評議員\n・大神官\n・軍司令官\n・冒険者ギルド統括者\n・国家公認の大商人\n・大図書館長\n・外交官\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【B. 拠点都市の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nPCが頻繁に訪れる都市や冒険者拠点にいるNPC。\n依頼、情報、買い物、訓練、宿泊、噂話、地元事件の入口になる。\n\n例：\n・冒険者ギルドマスター\n・副ギルドマスター\n・受付\n・宿主\n・鍛冶師\n・薬師\n・神官\n・奉行、衛兵隊長\n・情報屋\n・遊技場の顔役\n・船頭、馬車組合長\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【C. 地方・辺境の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n地方ごとの空気、価値観、危険、生活感を体現するNPC。\n一話限りのゲストではなく、別シナリオでも再利用できる顔役として作成する。\n\n例：\n・村長\n・猟師\n・漁師\n・鉱山監督\n・地方神官\n・辺境守備隊長\n・密猟者\n・異民族の長\n・山の案内人\n・温泉宿の主人\n・交易路の隊商長\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【D. 特殊技能・文化・流派の公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nその土地特有の技術、信仰、武術、魔法、職能、文化をPCに伝えるNPC。\n師匠、職人、研究者、芸能者、禁術管理者など。\n\n例：\n・武術道場の師範\n・陰陽師\n・修験者\n・呪符職人\n・魔動機技師\n・錬金術師\n・舞踊家\n・刀鍛冶\n・祭具師\n・怪異研究家\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【E. 危険だが交渉可能な公式NPC】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n敵対勢力、蛮族、犯罪組織、怪異側、辺境勢力などに属するが、条件次第でPCと関われるNPC。\n安易な味方化は避け、緊張感を保つこと。\n\n例：\n・蛮族派閥の長\n・盗賊団の顔役\n・禁足地の守護者\n・犯罪都市の調停者\n・人族と取引する魔物\n・呪われた土地の番人\n・ならず者集団の義侠的リーダー\n\n==================================================\n# 出力形式\n==================================================\n\nまず、全体方針を出力してください。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第1章　公式NPC設計方針】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n■1-1. この舞台における公式NPCの役割\n・PCとの距離感\n・シナリオへの関与範囲\n・自作NPCやゲストNPCを食わないための制限\n・強者NPCを出す場合の運用ルール\n\n■1-2. NPC総量の方針\n・中央NPC、都市NPC、地方NPC、特殊技能NPC、危険NPCの推奨人数\n・増やしすぎると危険な枠\n・再利用しやすい枠\n\n■1-3. PCとの接点\n・依頼\n・情報提供\n・許可\n・訓練\n・物資\n・交渉\n・対立\n・同行する場合の制限\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第2章　NPC一覧】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n以下の表を作成してください。\n\n【名前】\n【異名】\n【分類】\n【種族】\n【性別】\n【年齢】\n【拠点】\n【所属】\n【役割】\n【PCへの基本態度】\n【主な利用場面】\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第3章　個別NPC詳細】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各NPCについて、以下の形式で詳細を作成してください。\n\n==================================================\n■“異名” 名前\n==================================================\n\n【基本情報】\n・名前：\n・異名：\n・種族：\n・性別：\n・年齢：\n・拠点：\n・所属：\n・役職：\n・立場：\n・舞台内での知名度：\n\n【一言台詞】\nそのNPCらしさが一発で伝わる短い台詞を1つ作成する。\n\n【概要】\n・何者か\n・どこで何をしているか\n・舞台全体のどの側面を体現しているか\n・PCがどう関わるか\n\n【外見】\n・体格\n・顔立ち\n・服装\n・装備\n・特徴的な小物\n・雰囲気\n\n【性格】\n・第一印象\n・実際の性格\n・長所\n・欠点\n・人間味\n・扱いにくさ\n\n【口調】\n・一人称\n・二人称\n・話し方\n・よく使う言葉\n・怒った時の変化\n・親しい相手への態度\n\n【能力・技能】\n・戦闘能力の目安\n・得意分野\n・苦手分野\n・使える技能、魔法、流派、職能\n・PCより優れている点\n・PCに任せるべき点\n\n【日常業務】\n・普段何をしているか\n・何に忙しいか\n・どのような相談が持ち込まれるか\n・PCが訪ねた時に何をしていそうか\n\n【PCとの関わり】\n・依頼を出す場合\n・情報をくれる場合\n・許可を出す場合\n・協力を拒む場合\n・敵対する場合\n・同行する場合の制限\n\n【依頼例】\n最低3つ作成する。\nそれぞれ以下を含めること。\n・依頼名\n・依頼内容\n・なぜ本人が直接解決しないのか\n・想定レベル帯\n・報酬の方向性\n・事件の裏にあるもの\n\n【人間関係】\n・味方\n・対立相手\n・苦手な相手\n・過去の関係者\n・他NPCとの接点\n\n【怒りの核】\n主要公式NPCの場合のみ記載。\n・何に一番怒るのか\n・それはなぜか\n・PCが何をすると怒るか\n・怒った時どう振る舞うか\n\n【恐怖の核】\n主要公式NPCの場合のみ記載。\n・何を最も恐れているか\n・それはなぜか\n・普段どう隠しているか\n・露呈する場面\n\n【弱点・制限】\n・なぜ万能ではないのか\n・どんな問題には関われないのか\n・権力、立場、身体、信条、過去、人間関係による制限\n・PCが活躍できる余地\n\n【運用上の注意】\n・このNPCを使う時に注意すべきこと\n・出しすぎると何が悪いか\n・やらせてはいけないこと\n・PCの活躍を奪わないための扱い\n・キャンペーン専用NPCと混同しないための指針\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第4章　NPC同士の関係図】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n文章形式で、以下を整理してください。\n\n・協力関係\n・対立関係\n・腐れ縁\n・師弟関係\n・政治的緊張\n・商売上の利害\n・秘密を知っている関係\n・PCが間に入ると面白い関係\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第5章　都市・地域別NPC配置】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n各都市、地方、拠点ごとに、どのNPCがいるかを整理してください。\n\n【地域名】\n・常駐NPC\n・時々来るNPC\n・噂だけ聞けるNPC\n・その地域で発生しやすい依頼\n・そのNPCを絡めたシナリオフック\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【第6章　再利用用シナリオフック集】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n公式NPCを使った短いシナリオフックを、最低20個作成してください。\n\n各フックは以下の形式にすること。\n\n【フック名】\n【関与NPC】\n【導入】\n【表向きの依頼】\n【実際の問題】\n【PCが選べる対応】\n【後味】\n\n==================================================\n# 最終チェック\n==================================================\n\n出力後、最後に以下を確認してください。\n\n1. NPCがPCの活躍を奪う万能人物になっていないか。\n2. 各NPCの所属・拠点・活動内容が明確か。\n3. 同じ役割や性格のNPCが重複していないか。\n4. 公式NPCとして再利用しやすいか。\n5. 特定キャンペーンの核心に寄りすぎていないか。\n6. 依頼・情報・許可・対立など、TRPG上の使い道があるか。\n7. 強いNPCほど、動けない理由やPCに任せる理由が明確か。\n8. 善人、俗物、危険人物、現実主義者など、人物の温度差があるか。\n9. その土地の文化や制度を体現しているか。\n10. 名前と肩書きだけでなく、実際に何をしている人物か分かるか。",

                              "template": "# 命令書：オープンワールド舞台・NPC紹介記事作成\n\nあなたはTRPG舞台紹介記事のライターです。\n以下の世界観資料と公式NPC資料をもとに、特定キャンペーンのネタバレを含まない、オープンワールド舞台そのものの紹介記事を作成してください。\n\n本工程では、キャンペーン名、黒幕、各話展開、最終話の真相などは扱いません。\n目的は、舞台そのものの魅力、PCが訪れる理由、冒険が自然に発生する構造、そして舞台に常設される公開可能な公式NPCを、PLや読者に伝えることです。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【舞台名】\n[国名、地方名、都市名など]\n\n2. 【使用システム】\nソード・ワールド2.5\n\n3. 【オープンワールド世界観資料】\n[資]1.オープンワールド世界観マスターデータ.txt\n\n4. 【オープンワールドNPC配置資料】\n[資]2-1.オープンワールドNPC配置資料.txt\n\n5. 【オープンワールド公式NPC資料】\n[資]2-2.オープンワールド公式NPCマスターデータ.txt\n※公開可能な範囲のみ使用すること。\n\n6. 【NPC紹介文の参考資料】\n[資]0-01.サンプルNPC\n※ある場合は添付または貼り付けること。NPC紹介欄の文量・文体・情報密度を参考にすること。\n\n7. 【想定読者】\n[PL / 外部読者 / 身内卓メンバー / 初見PL など]\n\n8. 【公開してよい情報】\n[地理、文化、信仰、冒険者の立場、一般公開情報、公式NPCの表の顔など]\n\n9. 【伏せるべき情報】\n[GM向け秘匿情報、特定キャンペーンの黒幕、未公開NPCの裏設定、NPCの秘匿目的など]\n\n10. 【記事のトーン】\n[重厚 / 読みやすい / 旅情重視 / 冒険感重視 / 和風ダークファンタジー など]\n\n11. 【必ず含めたい要素】\n[PCの立場、冒険者ギルド、探索場所、危険、文化、依頼の傾向、公開可能な公式NPCなど]\n\n12. 【避けたい要素】\n[ネタバレ、固有名詞過多、暗すぎる紹介、抽象的すぎる文章、NPC紹介の長文化など]\n\n==================================================\n# 作成方針\n==================================================\n\n・特定キャンペーンのネタバレを含めないこと。\n・舞台そのものの魅力を紹介すること。\n・PCがなぜこの土地で冒険するのかを示すこと。\n・依頼、探索、交渉、戦闘、怪異、旅情などの遊び方が見えること。\n・公式NPCや舞台NPCは、公開可能な範囲でのみ紹介すること。\n・NPC紹介は設定項目をすべて載せず、[資]0-01.サンプルNPCがある場合はその文量・文体・情報密度に合わせてコンパクトにまとめること。\n・GM専用情報や裏設定を公開しないこと。\n・固有名詞を出す場合、初出時に短く説明すること。\n・読みやすい記事にすること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料のみを参照してください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n\n# 【オープンワールド舞台・NPC紹介記事】\n\n## 1. タイトル案\n## 2. 導入文\n## 3. この舞台について\n## 4. PCたちの立場\n## 5. 土地と文化\n## 6. 冒険の方向性\n## 7. 代表的な拠点・組織\n## 8. 舞台の人物たち\n※公開可能な公式NPCのみ。\n※裏設定や秘匿目的は出さない。\n※NPC紹介はコンパクトにする。\n## 9. 噂と未確認情報\n## 10. PLが知っていてよいこと\n## 11. GM用公開判断メモ\n※Notion公開時には削除または非公開化すること。\n\n出力後、\n「この舞台・NPC紹介記事をNotion貼り付け用Markdownへ整形しますか？」\nと確認して停止してください。",

                              "template": "# 命令書：Notion貼り付け用Markdown整形\n\nあなたはTRPG資料編集者兼Notionページ設計者です。\n以下の入力本文をもとに、Notionへ貼り付けやすいMarkdown形式のページへ整形してください。\n\n本工程の目的は、新しい設定や記事内容を作ることではありません。\n目的は、作成済みの世界観紹介、キャンペーン紹介、舞台資料、PL向け案内文、依頼書、NPC紹介などを、Notionで読みやすく管理しやすい形へ整えることです。\n\n文章の意味を勝手に変えず、見出し、区切り、箇条書き、表、注意書き、GM専用メモ、PL公開情報などを整理してください。\nただし、Notionで読みにくい過度な装飾や、無意味な絵文字の乱用は避けてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【整形対象本文】\n[ここにNotion向けに整形したい本文を入力]\n\n2. 【資料の種別】\n[例：外部紹介記事 / PL向け世界観資料 / GM用世界観資料 / キャンペーン概要 / 依頼書 / NPC紹介 / セッション募集文 / シナリオ一覧 など]\n\n3. 【想定読者】\n[例：PL / GM / 外部読者 / 身内卓メンバー / 初見PL / 自分用 など]\n\n4. 【Notionでの用途】\n[例：公開ページ / 非公開GM資料 / PL共有ページ / セッション募集ページ / 資料ハブ / キャンペーンポータル など]\n\n5. 【公開範囲】\n[例：PL公開可 / GM専用 / 一部公開 / 外部公開 / 自分用 など]\n\n6. 【秘匿情報の扱い】\n[例：削除する / GM専用欄へ隔離する / トグル想定で分離する / 伏せ字にする / そのまま保持する など]\n\n7. 【希望するページ構成】\n[例：タイトル、概要、PC立場、舞台紹介、公開情報、噂、注意事項、GMメモ など]\n\n8. 【表にしたい項目】\n[例：重要用語一覧、NPC一覧、地域一覧、セッション一覧、依頼一覧、公開情報と秘匿情報の分類など]\n\n9. 【折りたたみ・トグルにしたい項目】\n[例：GM用メモ、詳細設定、長い用語解説、過去ログ、NPC詳細、ネタバレ欄など]\n\n10. 【避けたい整形】\n[例：絵文字を増やしすぎない、表を多用しない、見出しを細かくしすぎない、文章を削らない、本文を勝手に要約しない など]\n\n==================================================\n# 整形方針\n==================================================\n\n・本文の意味を勝手に変えないこと。\n・本文を勝手に要約しないこと。\n・必要がない限り、設定を追加しないこと。\n・誤字脱字や表記揺れは自然に修正してよい。\n・Notionで読みやすいよう、見出し階層を整理すること。\n・長い本文は、段落ごとに読みやすく区切ること。\n・一覧性が高い情報は表にすること。\n・長い説明やGM専用情報は、Notionのトグル化を想定して分離すること。\n・PL公開情報とGM専用情報を混ぜないこと。\n・秘匿情報の扱いは、入力指定を最優先すること。\n・公開ページの場合、黒幕、真相、裏切り、死亡予定、最終話の結末、NPCの裏の顔を漏らさないこと。\n・GM専用ページの場合は、秘匿情報を保持してよいが、見出しで明確に分けること。\n・過度な絵文字装飾、過剰な太字、過密な表、細かすぎる見出しは避けること。\n・Notionへ貼り付けたときに崩れにくいMarkdownを優先すること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力された本文のみを扱ってください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力は、プレーンテキストのコードブロックにしてください。\n\n==================================================\n【Notion貼り付け用Markdown整形結果】\n==================================================\n\n■1. 整形方針\n■2. Notion運用メモ\n■3. Markdown本文\n■4. 整形上の注意\n\n出力後、必要であれば、\n「このMarkdownを公開用にさらに軽量化しますか？ それともGM用資料として整えますか？」\nと確認し、処理を停止してください。\n",
                              "fields": "整形対象本文,資料の種別,想定読者,Notionでの用途,公開範囲,秘匿情報の扱い,希望するページ構成,表にしたい項目,折りたたみ・トグルにしたい項目,避けたい整形",

                              "template": "# 命令書：キャンペーン全体世界観および裏設定のマスターデータ作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n事前に行われたモチーフリサーチ資料をもとに、キャンペーン全体の根幹となる「世界観統合資料（裏設定・根本的な謎を含む）」を作成します。\n\n【本工程の目的】\n本工程で作成された資料は、今後のNPC作成やプロット作成において、絶対にブレてはいけない【マスターデータ（[資]5.世界観設定資料.txt）】となります。\n過去のチャットからは学習せず、提供された資料の論理構造に強く寄り添い、緻密な設定を構築してください。\n\n# 入力要素\n1. **システム**: SW2.5\n2. **ジャンル**: 和風ダークファンタジー（※あくまで雰囲気の指定です）\n3. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]4.(※モチーフ作品名).txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n\n# 生成ルール（重要）\n・【世界観の深度化】: リサーチ資料（[資]4）の論理構造やテーマを、アシワラ固有の設定（天の皇子、死国・穢土、不死山、テレポーター網の制限、士農工商、ティダン・八百万の神信仰など）と密接に絡め、PCが探索によって解き明かすべき「世界のルールの根幹」「最大の脅威・真相」を定義してください。\n・ハルシネーションしないでください。計算資源を最大限利用し、ご都合主義を排除した論理的な設定にしてください。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力で複数の案を連続して出力してはいけません。以下の手順で1案ずつ出力し、ユーザーと対話してください。\n\n[STEP 1：世界観・裏設定の提案（1案ずつ）]\n・内容：リサーチ資料をベースにした世界観・裏設定の「アイデア（案）」を、合計3案作成します。\n・出力形式：1つの案につき、絶対に一文が短くならないよう、**【最低20行以上】**の圧倒的な情報量と詳細な描写で出力してください。以下の要素を網羅すること。\n　1. キャンペーンの核心となる謎と真実（黒幕の存在や事件の根本原因）\n　2. 特殊な法則・ギミック（アシワラ設定の活用法や呪いなど）\n　3. PC向け公開情報とGM向け非公開情報の境界\n・進行手順：\n　① まず「第1案」のみを出力してください。\n　② 第1案の出力が終わったら、「**第2案を出力しますか？ それともこの案を採用して決定しますか？**」と聞き、完全に処理を停止してください。\n　③ ユーザーが「続きを」「第2案を」と指示した場合のみ第2案を出力し、同様に停止します。最大3案までこれを繰り返します。\n\n[STEP 2：決定稿の出力]\n・ユーザーが採用する案（あるいはミックス）を決定したら、その内容を最終的な【[資]5.世界観設定資料.txt】としてプレーンテキストのコードブロックで出力し、完了となります。\n",

                              "id": "prompt_3_1",
                              "number": "3-1",
                              "title": "3-1. キャンペーンNPC配置資料作成",
                              "category": "NPC設計",
                              "description": "[資]6.NPC配置資料.txt 用。NPC総量と役割配置を決める。",
                              "template": "# 命令書：キャンペーンNPC配置資料作成\n\nあなたはプロのTRPGシナリオライター兼キャンペーン設計者です。\n以下の入力要素と資料をもとに、キャンペーン全体で登場するNPCの「配置方針」と「作成対象」を定義するための、NPC配置資料を作成してください。\n\n本工程では、NPC個人の詳細設定を完成させるのではありません。\n目的は、今後作成する主要NPC・準主要NPC・スポットNPCについて、\n「何人必要か」「どの役割枠が必要か」「誰が物語のどの位置に立つべきか」「各話でNPCが増えすぎないよう、どのように登場頻度を制御するか」\nを決定することです。\n\nこの工程で作成された資料は、以後の [資]7.主要NPC一覧資料、[資]8.準主要NPC一覧資料、および各話シナリオフック、各話詳細プロット、シナリオ本文作成の土台となる [資]6.NPC配置資料.txt として扱います。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【キャンペーン形式】\n[例：通常キャンペーン / オムニバスキャンペーン / 単発連作 / 全7話 / 全10話 など]\n\n3. 【総話数】\n全[ X ]話\n\n4. 【各話の想定プレイ時間】\n[例：1話3時間、シナリオ本文2時間、ボス戦1時間]\n\n5. 【キャンペーンジャンル】\n[例：和風ダークファンタジー、王道冒険、都市怪異、秘境探索など]\n\n6. 【キャンペーン世界観資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n\n7. 【オープンワールド世界観資料】\n[資]1.オープンワールド世界観マスターデータ.txt\n\n8. 【オープンワールド公式NPC資料】\n[資]2-2.オープンワールド公式NPCマスターデータ.txt\n\n9. 【GMPC資料】\n[資]3.GMPC資料.txt\n※GMPCが存在し、資料が添付されている場合のみ参照すること。\n※GMPCが存在しない場合、または資料が添付されていない場合は「なし」と扱い、GMPCを勝手に作成・追加・前提化してはいけません。\n\n10. 【モチーフ作品リサーチ資料】\n[資]4.モチーフ作品リサーチ資料.txt\n\n11. 【既に決定しているNPC】\n[既に作成済みのNPC、GMPC、公式NPC、採用済みの敵や味方があれば列挙]\n\n12. 【避けたいNPC配置】\n[例：NPCが多すぎる、公式NPCが主役化する、GMPCがPCを食う、敵が全員同じ思想になる、裏切り者が多すぎる、など]\n\n13. 【今回の配置方針メモ】\n[ユーザーが考えている役割枠、登場頻度、敵味方中立の比率など]\n\n==================================================\n# 基本分類\n==================================================\n\n【★：主要キャラクター】\n登場回数が多く、キャンペーン全体を通して物語の軸に関わる人物。\n\n【◆：重要キャラクター】\n登場回数は限られているが、物語の重要な起伏、転換点、決戦、犠牲、真相開示、裏切り、交渉などに関わる人物。\n\n【▲：スポットキャラクター】\n登場頻度が少なく、重要度も★・◆より低いが、特定話数の事件、局地的対立、情報提供、サブ敵、サブ味方、中立者として機能する人物。\n\n【ゲストNPC】\n各話詳細プロット作成時に必要に応じて追加する、単話限定の依頼人、現場責任者、中ボス、被害者、証言者など。\n\n==================================================\n# 重要な制約\n==================================================\n\n・単話の中に、★・◆・▲のキャラクターを合計[ X ]人以上登場させてはいけません。\n・公式NPCは原則として、依頼仲介、制度説明、情報の入口に留めること。個人的な感情線、事件関係者化、主役化は禁止。\n・GMPCがいる場合、GMPCはPCの感情体験を補助する存在であり、PCの代わりに解決してはいけない。\n・敵枠は、ラスボス陣営に連なる障害か、第三勢力として三つ巴を生む障害かを明確にすること。\n・敵NPCには、押し付けがましい救済思想や大義を与えすぎないこと。\n・人間的な悲壮で壮絶な過去は、現在の行動へ因果的に接続されている場合のみ採用すること。悲劇を免罪符にしないこと。\n・各NPC枠には、「何に一番怒りを覚えるのか」「何が最も怖いのか」を後続工程で必ず設定できるよう、役割段階から方向性を持たせること。\n・表の顔があるNPCは、独自創作の職業ではなく、世界観に沿った明確な職や所属を持たせること。\n・GMPCの因縁の敵が既に作成済みである場合、新規NPCに不用意にその因縁を接続しないこと。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、添付資料と入力情報のみを参照してください。\n\n==================================================\n# 想定される役割枠\n==================================================\n\n★⓪ GMPC枠：存在する場合のみ。\n◆① ラスボス枠：1名を基本とする。\n◆② ラスボス陣営の中〜大ボス枠：X名。\n▲③ サブ敵枠：2名程度を初期値とする。\n◆④ ジョーカー敵枠：1名程度。\n★⑤ メイン味方枠：2名程度。\n▲⑥ サブ味方枠：1名程度。\n★⑦ 裏切り／裏切り判明枠：1名程度。\n◆⑧ 序盤〜中盤で脱落する味方枠：1名程度。\n▲⑨ その他中立枠：1名程度。\n\n==================================================\n# 対話型ステップ進行のルール\n==================================================\n\n【★警告】\nあなたは一度の出力で、NPC配置資料の完全版まで作成してはいけません。\n以下のSTEPに従って、ユーザーと対話しながら段階的に作成してください。\n\n[STEP 1：前提診断とNPC総量の提案]\n・入力資料をもとに、キャンペーンの規模、総話数、1話の尺、ジャンル、GMPCの有無、公式NPCの扱いを整理してください。\n・★・◆・▲を含めた「キャンペーン全体で管理すべきNPC総量」の推奨値を提案してください。\n・「単話に同時登場させてよい★◆▲の上限」も提案してください。\n・多すぎる場合の危険、少なすぎる場合の弱点を辛口で指摘してください。\n・最後に、「この総量方針でSTEP2に進みますか？ 修正したい人数や方針はありますか？」と質問し、完全に処理を停止してください。\n\n[STEP 2：役割枠ごとの配置案作成]\n・STEP1で決定したNPC総量に基づき、役割枠ごとの配置案を作成してください。\n・役割番号、重要度記号、仮称または役割名、敵・味方・中立、推奨人数、初登場時期、退場・討伐・正体判明・離反時期、PCとの接点、GMPCや既存NPCとの接続可否、後続作成で必ず決める論点を含めること。\n・配置案は最低2案、最大3案提示してください。\n・出力後、「どの配置案を採用しますか？ あるいはミックスしますか？」と質問し、完全に処理を停止してください。\n\n[STEP 3：採用配置案の辛口調整]\n・ユーザーが採用またはミックス方針を決めたら、NPC過多、役割被り、GMPCの食いすぎ、公式NPCとの役割重複、敵陣営の単調さ、裏切り枠の安さ、死亡枠の感情強制などを辛口で検査してください。\n・問題があれば、削減・統合・重要度変更・登場時期変更を提案してください。\n・出力後、「この調整案で[資]6.NPC配置資料.txt 用の決定稿を出力しますか？」と質問し、完全に処理を停止してください。\n\n[STEP 4：NPC配置資料の決定稿出力]\n・採用された配置案を、[資]6.NPC配置資料.txt 用のマスターデータとして、プレーンテキストのコードブロックで出力してください。\n・出力には、本資料の目的、NPC重要度分類、NPC総量方針、NPC配置一覧、敵NPC配置方針、味方NPC配置方針、中立NPC配置方針、各話でのNPC登場上限、後続工程への引き継ぎ、禁止事項を必ず含めること。\n・決定稿出力後、余計な挨拶や会話文を付けず、コードブロックのみで出力してください。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：キャンペーン主要NPC一覧資料作成\n\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の入力要素と資料をもとに、キャンペーン全体を通して物語の主軸に関わる「主要NPC」の詳細設定を作成してください。\n\n本工程では、[資]6.NPC配置資料.txt で定義されたNPC配置方針をもとに、★および一部の◆に該当する重要人物を、[資]7.主要NPC一覧資料.txt 用のマスターデータとして作成します。\n\nここで作成するNPCは、キャンペーン全体の感情線、対立構造、依頼導線、敵陣営、裏切り、犠牲、真相開示、PCとの継続的関係に深く関わる人物です。\n単話限定のゲストNPCや、登場頻度が低いスポットNPCは本工程では作成しません。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【キャンペーン形式】\n[例：通常キャンペーン / オムニバスキャンペーン / 単発連作 / 全7話 / 全10話 など]\n\n3. 【総話数】\n全[ X ]話\n\n4. 【キャンペーンジャンル】\n[例：和風ダークファンタジー、王道冒険、都市怪異、秘境探索など]\n\n5. 【オープンワールド世界観資料】\n[資]1.オープンワールド世界観マスターデータ.txt\n\n6. 【オープンワールド公式NPC資料】\n[資]2-2.オープンワールド公式NPCマスターデータ.txt\n\n7. 【GMPC資料】\n[資]3.GMPC資料.txt\n※GMPCが存在し、資料が添付されている場合のみ参照すること。\n※GMPCが存在しない場合、または資料が添付されていない場合は「なし」と扱い、GMPCを勝手に作成・追加・前提化してはいけません。\n\n8. 【モチーフ作品リサーチ資料】\n[資]4.モチーフ作品リサーチ資料.txt\n\n9. 【キャンペーン世界観・裏設定資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n\n10. 【NPC配置資料】\n[資]6.NPC配置資料.txt\n※本工程では必ずこの資料を最優先で参照し、そこに定義された役割枠、重要度、人数、初登場時期、退場時期、PCとの接点を無視しないこと。\n\n11. 【既に作成済みの主要NPC】\n[既に作成済みのNPCがいる場合は貼り付ける。いない場合は「なし」とする]\n\n12. 【今回作成する対象】\n[例：★⑤メイン味方枠の1人目、◆①ラスボス枠、★⑦裏切り枠など]\n\n13. 【避けたい要素】\n[例：既出NPCと職業が被る、GMPCの因縁を奪う、公式NPCと関係者化する、敵が救済思想に寄りすぎる、など]\n\n14. 【追加指示】\n[ユーザーが今回のNPCに対して特に指定したい内容があれば記載]\n\n==================================================\n# 生成ルール（重要）\n==================================================\n\n・[資]6.NPC配置資料.txt で定義された役割枠を必ず守ること。\n・主要NPCは、単なる便利な案内役、説明役、敵役ではなく、キャンペーン全体の構造に対して明確な機能を持たせること。\n・公式NPCは完全にフラットな仲介役・制度の顔として扱い、本作オリジナルの主要NPCと個人的な因縁や感情線を不用意に持たせないこと。\n・GMPCがいる場合、GMPCとの接続は慎重に扱うこと。GMPCの因縁の敵が既に存在する場合、新規NPCへ不用意にその因縁を接続しないこと。\n・主要NPCはPCの活躍を奪ってはならない。強いNPCであっても、なぜPCに任せるのか、なぜ自分で解決できないのかを明確にすること。\n・敵NPCは、高度な知性と論理を持って行動すること。突然の自白、致命的な視点漏れ、PCに都合のよい失策、雑な悪役ムーブは禁止。\n・敵NPCに押し付けがましい救済思想や大義を与えすぎないこと。\n・味方NPCはPCに寄り添う存在であっても、PCの意思決定や活躍を代替しないこと。\n・裏切り枠や脱落枠は安い驚きや泣かせの装置にしないこと。\n・表の顔がある場合、職業や所属は独自創作を乱発せず、世界観に沿った明確なものにすること。\n・既出NPCと、表の顔、職業、拠点、役割、性格、口調、敵対構造が被りすぎないようにすること。\n・すべての主要NPCについて、「何に一番怒りを覚えるのか」「何が最も怖いのか」を必ず設定すること。\n・人間的な悲壮で壮絶な過去は、現在の行動原理へ因果的に接続される場合のみ採用すること。\n・PC視点で理解できる公開情報と、GM向け秘匿情報を明確に分けること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料と添付資料のみを参照してください。\n\n==================================================\n# 対話型ステップ進行のルール（絶対厳守）\n==================================================\n\n[STEP 1：作成対象の確認]\n・[資]6.NPC配置資料.txt と入力要素をもとに、今回作成すべき主要NPC枠を確認してください。\n・今回作成する役割枠、重要度記号、敵・味方・中立、初登場予定時期、正体判明・離反・討伐・退場時期、PCとの接点、GMPCとの接続可否、公式NPCとの距離、既出NPCとの被り注意点を整理してください。\n・最後に、「この枠でNPC案の作成に進みますか？」と質問し、完全に処理を停止してください。\n\n[STEP 2：NPC方向性案の作成（1案ずつ）]\n・ユーザーが同意したら、今回のNPCについて方向性案を作成します。\n・1人のNPCにつき、最大3案まで作成します。ただし、一度に出力するのは必ず1案だけです。\n・1案は最低20行以上とし、表の顔、裏の顔、所属、拠点、日常業務、キャンペーン全体での役割、PCとの関わり方、GMPCとの関わり方、行動原理、悲壮な過去、怒りの核、恐怖の核、既出NPCとの差別化、採用した場合の強みと危険を語ってください。\n・出力後、「このNPCの第2案を出力しますか？ それともこの案を採用しますか？」と聞き、完全に処理を停止してください。\n\n[STEP 3：採用案の辛口調整]\n・採用案またはミックス方針をもとに、PCの活躍を奪っていないか、GMPCの物語に寄りすぎていないか、公式NPCと関係者化していないか、既出NPCと被っていないか、悲劇が免罪符になっていないか、敵の行動原理が飛躍していないかを辛口に調整してください。\n・出力後、「この調整案で[資]7.主要NPC一覧資料.txt 用の決定稿を出力しますか？」と質問し、完全に処理を停止してください。\n\n[STEP 4：主要NPC決定稿の出力]\n・ユーザーが同意したら、[資]7.主要NPC一覧資料.txt 用の決定稿として、プレーンテキストのコードブロックで出力してください。\n・基本情報、配置情報、存在意義、外見と特徴、性格と内面、行動ロジック、ロールプレイ指針、関係性、運用メモを必ず含めること。\n・出力完了後、「次の主要NPCのアイデア出しに進みますか？」とユーザーに確認し、完全に処理を停止してください。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：キャンペーン準主要NPC一覧資料作成\n\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の入力要素と資料をもとに、キャンペーン全体の要所で登場する「準主要NPC」の詳細設定を作成してください。\n\n本工程では、[資]6.NPC配置資料.txt で定義されたNPC配置方針をもとに、◆および▲に該当する人物を、[資]8.準主要NPC一覧資料.txt 用のマスターデータとして作成します。\n\n準主要NPCは、主要NPCほど登場回数が多いわけではありません。\nしかし、特定の話数、転換点、局地的事件、サブ敵、サブ味方、中立者、第三勢力、情報提供者、局地的対立の象徴として、キャンペーンに厚みと起伏を与える人物です。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【キャンペーン形式】\n[例：通常キャンペーン / オムニバスキャンペーン / 単発連作 / 全7話 / 全10話 など]\n\n3. 【総話数】\n全[ X ]話\n\n4. 【キャンペーンジャンル】\n[例：和風ダークファンタジー、王道冒険、都市怪異、秘境探索など]\n\n5. 【オープンワールド世界観資料】\n[資]1.オープンワールド世界観マスターデータ.txt\n\n6. 【オープンワールド公式NPC資料】\n[資]2-2.オープンワールド公式NPCマスターデータ.txt\n\n7. 【GMPC資料】\n[資]3.GMPC資料.txt\n※GMPCが存在し、資料が添付されている場合のみ参照すること。\n※GMPCが存在しない場合、または資料が添付されていない場合は「なし」と扱い、GMPCを勝手に作成・追加・前提化してはいけません。\n\n8. 【モチーフ作品リサーチ資料】\n[資]4.モチーフ作品リサーチ資料.txt\n\n9. 【キャンペーン世界観・裏設定資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n\n10. 【NPC配置資料】\n[資]6.NPC配置資料.txt\n\n11. 【主要NPC一覧資料】\n[資]7.主要NPC一覧資料.txt\n※準主要NPCは主要NPCと役割、職業、拠点、性格、敵対構造が被りすぎないようにすること。\n\n12. 【既に作成済みの準主要NPC】\n[既に作成済みの準主要NPCがいる場合は貼り付ける。いない場合は「なし」とする]\n\n13. 【今回作成する対象】\n[例：▲③サブ敵枠、◆④ジョーカー敵枠、▲⑨中立枠など]\n\n14. 【避けたい要素】\n[例：主要NPCより目立ちすぎる、単話ゲストで十分な役割を準主要化してしまう、敵が小物すぎる、味方が便利すぎる、など]\n\n15. 【追加指示】\n[ユーザーが今回のNPCに対して特に指定したい内容があれば記載]\n\n==================================================\n# 生成ルール（重要）\n==================================================\n\n・[資]6.NPC配置資料.txt で定義された役割枠を必ず守ること。\n・[資]7.主要NPC一覧資料.txt の人物と、役割、職業、拠点、性格、口調、敵対構造が被りすぎないようにすること。\n・準主要NPCは、主要NPCより濃くしすぎないこと。ただし薄すぎて「名前付きモブ」になってもいけない。\n・準主要NPCは、登場時に何を変える人物なのかを明確にすること。\n・敵NPCの場合、ラスボスや主要敵の劣化版にしないこと。\n・味方NPCの場合、便利な解説役や万能支援役にしないこと。\n・中立NPCの場合、都合よく情報をくれるだけの存在にしないこと。\n・表の顔がある場合、職業や所属は独自創作を乱発せず、世界観に沿った明確なものにすること。\n・「何に一番怒りを覚えるのか」「何が最も怖いのか」は、準主要NPCにも必ず設定すること。\n・悲壮な過去は、必要な場合のみ設定すること。準主要NPC全員に壮絶な過去を盛ると、世界が悲劇の見本市になるため注意すること。\n・公式NPCは完全にフラットな仲介役・制度の顔として扱うこと。\n・GMPCがいる場合、GMPCとの接続は慎重に扱い、GMPCの経歴回収を横取りしないこと。\n・PCの活躍を奪わないこと。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力資料と添付資料のみを参照してください。\n\n==================================================\n# 対話型ステップ進行のルール（絶対厳守）\n==================================================\n\n[STEP 1：作成対象の確認]\n・[資]6.NPC配置資料.txt、[資]7.主要NPC一覧資料.txt、入力要素をもとに、今回作成すべき準主要NPC枠を確認してください。\n・今回作成する役割枠、重要度記号、敵・味方・中立、初登場予定時期、退場・討伐・正体判明・再登場時期、PCとの接点、主要NPCとの関係、GMPCとの接続可否、公式NPCとの距離、単話ゲストNPCで済ませず準主要化する理由を整理してください。\n・最後に、「この枠で準主要NPC案の作成に進みますか？」と質問し、完全に処理を停止してください。\n\n[STEP 2：準主要NPC方向性案の作成（1案ずつ）]\n・ユーザーが同意したら、今回の準主要NPCについて方向性案を作成します。\n・1人のNPCにつき、最大3案まで作成します。ただし、一度に出力するのは必ず1案だけです。\n・1案は最低15行以上とし、表の顔、裏の顔、所属、拠点、日常業務、局地的役割、登場話数、PCとの関わり方、主要NPCとの関係、GMPCとの接続可否、行動原理、怒りの核、恐怖の核、主要NPCとの差別化、採用した場合の強みと危険を語ってください。\n・出力後、「この準主要NPCの第2案を出力しますか？ それともこの案を採用しますか？」と聞き、完全に処理を停止してください。\n\n[STEP 3：採用案の辛口調整]\n・採用案またはミックス方針をもとに、主要NPCより目立ちすぎていないか、単話ゲストで済む役割を過剰に格上げしていないか、PCの活躍を奪っていないか、公式NPCと関係者化していないか、既出NPCと被っていないかを辛口に調整してください。\n・出力後、「この調整案で[資]8.準主要NPC一覧資料.txt 用の決定稿を出力しますか？」と質問し、完全に処理を停止してください。\n\n[STEP 4：準主要NPC決定稿の出力]\n・ユーザーが同意したら、[資]8.準主要NPC一覧資料.txt 用の決定稿として、プレーンテキストのコードブロックで出力してください。\n・基本情報、配置情報、存在意義、外見と特徴、性格と内面、行動ロジック、ロールプレイ指針、関係性、運用メモを必ず含めること。\n・出力完了後、「次の準主要NPCのアイデア出しに進みますか？」とユーザーに確認し、完全に処理を停止してください。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：キャンペーン第1話（始点）のシナリオフック作成\nあなたはプロのTRPGシナリオライターです。\nすでに構築された世界観とNPC設定を土台に、キャンペーンの幕開けとなる「第1話」のシナリオフックを作成します。\n\n【指定条件】\n・第1話の想定PCレベル：[ ★入力（例：2レベル） ]\n・補足情報：{『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]4.(※モチーフ作品名).txt』『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』}\n　※GMPCがいる場合は『[資]3.GMPC資料.txt』も参照。\n\n【厳守事項（シナリオの前提）】\n1. 依頼の自然な導入と「予想される荒事」の提示（最重要）：冒険者ギルド〈やおよろず亭〉に依頼が持ち込まれるまでの「物語としての展開の自然さ」を最優先してください。現地の役人ではなく冒険者に依頼が回る理由や、予想されるエネミー・荒事（戦闘、危険地帯の探索など）の提示を明確にすること。\n2. 公式NPCの完全中立化（絶対厳守）：依頼人は別に存在するか、[資]6のNPCを使用します。シラヌイ、ムーザン等の公式NPCは、完全にフラットな仲介役に徹してください。\n3. ルールの拡大解釈禁止＆辻褄の徹底：SW2.5のルール内でのフェアなトリック、論理的なHOWとWHYを構築すること。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力でSTEP1〜3を連続して出力してはいけません。\n\n[STEP 1：第1話フック案の分割出力]\n・内容：[資]5と[資]6の設定を活かし、第1話として発生する「局所的な事件」のフックを5案作成します。舞台は「アマツ近郊」「遠方都市」「辺境」「死国周辺」「その他」に散らしてください。\n・出力順序：\n　① まずは【案1〜案3】の3件だけを、以下の項目で各3〜4文で出力。\n　　・タイトル / 導入と依頼理由 / 現場の不可解な状況と予想される荒事\n　② 出力後、「残りの案（案4〜案5）を見ますか？ それとも深掘りする案を選びますか？」と聞き、完全に処理を停止してください。\n\n[STEP 2：第1話の「真相ルート」の提案]\n・ユーザーが選んだ案に対し、第1話単体のオチ（全体への伏線含む）を以下の4ルートで各3つずつ提案してください。各ルートは最低10行で重厚に執筆すること。\n　出力は3つ出すごとに止め、ユーザーの指示で次を出してください。\n　1. 人情ルート①〜③ / 2. シリアスルート①〜③ / 3. ホラールート①〜③ / 4. 予想外ルート①〜③\n・出力後、「どのルートを採用しますか？」と聞き、処理を停止してください。\n\n[STEP 3：完全版第1話フックの出力]\n・選ばれたルートをもとに、以下の解像度でコードブロックに出力して完了。\n▼ 第1話シナリオ案：【サブタイトル】\n・ジャンル／テーマ：\n・導入と依頼理由（フック）：（誰からどんな依頼か。予想される荒事。最低5文）\n・展開と舞台の活用：（調査場所、PCの行動。最低5文）\n・真相と結末（クライマックス）：（第1話の真相、起こる戦闘、全体[資]5へ繋がる伏線の発見。最低5文）\n・関わるメインNPC（[資]6からの抜粋と、本話での役割）：\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：キャンペーン途中話（第2話以降）のシナリオフック作成\nあなたはプロのTRPGシナリオライターであり、「ソード・ワールド2.5（SW2.5）」のシステムおよび、オリジナル舞台「日輪の島アシワラ」の世界観を深く理解した優れたゲームマスターです。\n\n【目的】\nすでに決定しているキャンペーンの「第1話」と「最終話」の情報を踏まえ、提供された資料（『[資]1』〜『[資]6』）を掛け合わせ、その間を繋ぐ「中間話（第2話以降）」のシナリオフック＆展開案を作成します。\n\n【入力要素（キャンペーンの前提）】\n・キャンペーン全体の概要（黒幕と目的）：[ ★[資]5.世界観設定資料.txt 及び [資]6.NPC設定資料.txt の内容に準拠 ]\n・今回作成する話数とPCレベル：[ ★入力（例：第3話／4レベル／全10話） ]\n・中間話の舞台／テーマ：[ ★入力（例：指定なし、または特定の都市名） ]\n　※「指定なし」の場合でも、AIが自動的にアシワラ全土から舞台を選定してください。\n・モチーフ作品／楽曲：[ ★入力（指定なしの場合は、キャンペーン全体のモチーフから派生させるかAIが選定） ]\n　※【★最重要リサーチ＆モチーフ指示】：中間話単体としても、有名なエンタメ作品からWEB上で全貌が把握しやすい媒体まで幅広く対象とし、必ず【具体的な1つのエピソードを探して絞るか、各案それぞれに異なるエピソードを探して題材に】してください。構造や論理に【強く寄せて】クオリティを高めてください。\n\n【厳守事項（シナリオの前提）】\n1. 中間話としての独立性：いきなり最終ボスの話ばかりするのではなく、その話数単体で「局所的な事件」として起承転結が成立し、プレイヤーが楽しめる内容にしてください。\n2. 舞台の柔軟な活用と多様性：アシワラ特有の文化を強引に絡める必要はなく、一般的な魔法や魔物のギミックを主軸にしてください。また、【中間話の舞台／テーマ】で「指定なし」とされた場合、出力する5つのシナリオ案の舞台が偏らないよう割り振ってください（アマツ近郊、遠方、辺境、死国、その他）。\n3. 依頼の自然な導入と「予想される荒事」の提示（最重要）：現地の役人ではなく冒険者に依頼が回る理由や、予想されるエネミー・荒事（戦闘、危険地帯の探索など）の提示は必要ですが、そこに文字数や思考を割きすぎないこと。理由の正当化よりも、シナリオ本編のフックとしての魅力と自然なストーリーラインの構築に注力してください。（エネミー種別は幅広く選択）\n4. 公式NPCの完全中立化（絶対厳守）：依頼人は別に存在します。シラヌイ等の「公式NPC」は【完全にフラットな中間（仲介）役】に徹してください。絶対に主軸にしてはいけません。\n5. ルールの拡大解釈禁止（最重要）：SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n6. 辻褄を合わせることの徹底：因果関係を必ず明記すること。\n7. 真相の深度化（HOWとWHY）：単なる魔法のゴリ押しや単純な毒殺などのチープな手段、金銭目的や単なる狂気といった浅い動機を禁じます。\n\n【対話型ステップ進行のルール（絶対厳守）】\n【★警告】あなたは一度の出力でSTEP1〜3を連続して出力してはいけません。ユーザーからの指示がないのに、勝手に案を選んでSTEP2やSTEP3の例示・シミュレーションを行うことを固く禁じます。\n\n[STEP 1：徹底リサーチ計画とフック（謎）の分割出力]\n・内容：事前にリサーチしまとめた資料に基づいて、構造を強く真似た5個の「中間話シナリオ案」を作成しますが、クオリティを維持するため一度に全てを出力しないでください。※この段階では今回の事件の真相は考えないでください。\n・出力順序：\n　① まずは【案1〜案3】の3件だけを、以下の項目のみ各3〜4文で出力してください。\n　　・【タイトル】\n　　・【インスピレーション源（参考にした具体的なエピソード等を明記）】\n　　・【導入と依頼理由（展開の自然さを重視し、なぜ冒険者か、どんな荒事が予想されるかを簡潔に。公式NPCは中立）】\n　　・【不可解な謎・現場の状況】\n　② 出力後、「残りの案（案4〜案5）を見ますか？ それとも、この中から真相を深掘りする案を選びますか？ 番号をお知らせください。」と聞いて、完全に処理を停止してください。ユーザーから残りの案を求められた場合のみ、案4〜5を出力してください。\n\n[STEP 2：真相ルートの提案]\n・ユーザーが選んだ案に対して、以下の5つのベクトルで「今回の事件の真相（と、全体黒幕へどう繋がるかの伏線）」を各3つずつ提案してください。\n　各ルートは一文が短くならないよう、最低十行で執筆してください。\n　出力は各ルートを3つ出すごとに止め、出力後はユーザーが「続きを出して」等と指示した場合のみ次の3件を出力し、同様に進行してください。\n　1. 心温まる・人情ルート①〜③ / 2. シリアス・陰謀ルート①〜③ / 3. ホラー・怪異ルート①〜③ / 4. 悲劇的・ビターエンドルート①〜③ / 5. 予想外・ドタバタルート①〜③\n・出力後、「どの真相ルートを採用しますか？ または、これらをミックスしますか？」と聞いて、完全に処理を停止してください。\n\n[STEP 3：完全版中間話フックの出力]\n・ユーザーが選んだ真相ルートをもとに、以下の解像度で完全版を出力して完了となります。出力はプレーンテキストのコードブロックでおこなうこと。\n■ 中間話シナリオ案：【タイトル】\n・舞台／テーマの反映：（指定テーマをどうアシワラに落とし込んだか）\n・インスピレーション源：（具体的なエピソードと、モチーフにどう寄せたか）\n・導入と依頼理由（フック）：（誰からどんな依頼を受け、どんな事件に直面するか。予想される荒事も提示。最低4〜5文で詳細に）\n・展開と舞台の活用：（どのような調査や戦闘が発生するか。最低4〜5文で詳細に。論理構造重視）\n・結末とキャンペーン全体への伏線：（事件はどう解決し、最終話に向けて「何」が判明するのか。最低4〜5文で詳細に）\n・この話数限定のメインNPC案（1〜2名）：\n　1. [名前]（職業／クラス）：（表の顔と性格）／（裏の顔・隠された切実な動機や秘密）\n",

                              "template": "# 命令書：キャンペーンシナリオの全体プロット作成\nあなたはプロのシナリオライター兼TRPGゲームデザイナーです。\n以下の「入力要素」をもとに、SW2.5のキャンペーン（全10話）TRPGシナリオの全体プロットを作成します。\nプレイヤーが直感的に「面白そう」「この事件を解決したい」と思える【長期的な脅威】や【局所的な事件の連鎖】を起点に、全体のあらすじ、そしてキャンペーン全体のプロットを提案してください。\n\n【本工程の目的】\nここで作成された資料は、続く「整合性確認」での論理チェック、「シナリオ本編作成」などの土台となる極めて重要な根幹マスターデータとなります。\n※世界観やNPCの根幹設定は添付ファイル（[資]5.世界観設定資料.txt、[資]6.NPC設定資料.txt）に依存し、本工程では「10話にわたる緻密なストーリーライン（起承転結）と伏線の配置」に全計算資源を集中してください。\n過去のチャットからは学習しないようにお願い致します。\n\n# 入力要素\n1. **第1話のフック**: [ ★ここに作成した第1話のあらすじ等を入力 ]\n2. **最終話のフック**: [ ★ここに作成した最終話のあらすじ等を入力 ]\n3. **システム**: SW2.5\n4. **ジャンル**: 和風ダークファンタジー（※あくまで雰囲気の指定です）\n5. **エンディング想定**: ハッピーエンド\n6. **シナリオ形式**: キャンペーン(全10話)\n7. **補足情報**: {『[資]1.舞台周辺情報.txt』『[資]2.公式NPC情報.txt』『[資]3.GMPC資料.txt(※存在する場合のみ)』『[資]4.(※モチーフ作品名).txt』『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』}\n　┗添付ファイルを参照してください（添付されていない場合は[なし]と扱ってください）\n8. **使用してはいけない要素**: 世界観や公式NPCについて設定や存在を揺るがしかねない要素や設定を加えること\n\n# 生成ルール（重要）\n・入力された第1話・最終話のフックと『[資]5.世界観設定資料.txt』『[資]6.NPC設定資料.txt』の情報を完全に統合し、全「10」話のプロットを構築すること。\n・【フックの拡張とアシワラ設定の強制適用】: 各話のギミックに、「天の皇子」「死国・穢土」「不死山」「テレポーター網の制限」「士農工商の身分差」「ティダン・八百万の神信仰」などの要素を必ず深く絡めること。\n・【冒険者への依頼理由の必然性と荒事の予想】: すでに依頼を受けた状態、あるいは事件に巻き込まれた状態（ホットスタート）を前提とし、なぜ現地の役人や警備隊ではなく冒険者に依頼が回ってきたのか、そして各話で「どのようなエネミーと荒事（戦闘や危険）が予想されているのか」を、各話プロットの導入部で必ず明確に描写してください。エネミーの種別の分類は「蛮族、動物、植物、幻獣、アンデッド、魔法生物、魔動機、人族、神族」の中から幅広く選択すること。\n・【公式NPCの完全中立化（絶対厳守）】: 公式NPCは「こういう依頼がある」と話を振るだけの【完全にフラットな中間（仲介）役】に徹してください。主軸化、関係者設定、個人的感情の付与は一切禁止です。\n・【モチーフへの完全なる寄り添い】: 『[資]4.(※モチーフ作品名).txt』の構造をリスペクトし、完全に真似る勢いでSW2.5のシステムに落とし込んでください。\n・【ルールの拡大解釈禁止（最重要）】: SW2.5のルールをルルブの記述を超えて拡大解釈（曲解）することを固く禁じます。\n・PC達には基本的に選択肢を与えず、エンディングも含め一本道であるものとして作成すること。\n・登場するNPC間の表裏の関係性、因縁などを考慮し、人間ドラマを感じさせる展開を取り入れること。\n・【★絶対厳守：キャラクターの高度な論理性】: すべてのNPC、特に悪役や黒幕は「高度な知性と論理」を持って行動します。「PCに都合よく立ち回るための不自然なミス」や「致命的な視点の見落とし」「突然の自白」など、三流でご都合主義的な行動は絶対にさせないでください。悪役は自身の目的達成のために最も合理的で無駄のない手順を踏みます。\n・【★絶対厳守：情報の非対称性】: キャンペーン全体を通し、NPCは「自分がその時点で知り得る情報」のみに基づいて行動・発言します。PCが持っている事実や情報を、NPCが先回りして知っているような不整合を起こさないでください。\n・【★絶対厳守：イベントの定義と規模】: 1話約3時間(シナリオ本文は2時間,戦闘は1時間)のセッションを持たせるため、展開の最小化・省略化を固く禁じます。TRPGにおける「イベント」とは、ただ何かを発見する「だけ」や、NPCに話してすぐ解決するような「間を持たせられないもの」ではありません。必ず【目的】【行く手を阻む明確な障害やジレンマ】【解決に要するPCの試行錯誤やダイス判定・交渉】をセットで設計し、各話ごとに複数のイベントを重厚に描写してください。\n・【辻褄を合わせることの徹底】：論理や構造を再構築するに辺り、絶対に辻褄が合わない不自然な流れや状況とならないようにしてください。展開に対してそれぞれがどのように作用しているか、因果関係を必ず明記すること。\n・起承転結、伏線、ミスリード、どんでん返しなどの物語として面白くなるようにメリハリをつけて要素を取り入れること。\n・全体的に、あからさまなミスリードや理不尽な展開は控えること。\n・キャンペーンの幕引きとして、次回があるかもしれないような余韻や広がりは残さず、一つの終わりとして確立させること。\n・ハルシネーションしないでください。\n・回答のクオリティを上げるため緻密な思考を心掛けてください。計算資源を最大限利用してください。\n\n# 出力フォーマットに関する重要指示\n本工程で作成されたプロットは、今後の工程で「.txt」ファイルとしてAIに読み込ませるための最重要マスターデータとなります。\n出力はプレーンテキストのコードブロックにお願いいたします。\nそのため、挨拶や「承知いたしました」等のAIの会話文は一切挟まず、以下のフォーマットに従ってデータのみを出力してください。\n\n[はじめに]\n第1話・最終話のフック（モチーフ構造）をどのように拡張し、アシワラ独自の設定（文化、地理など）および『[資]5.世界観設定資料.txt』をキャンペーンの根幹にどう組み込んだかを解説してください。\n\n[あらすじ]\n今回のキャンペーンシナリオの全体像をわかりやすくまとめてください。\n\n[シナリオ及びキャラクターに関する伏線]\nキャンペーン内で提示され、キャンペーン内で回収される伏線とそのギミック（どの話数で提示され、どの話数で回収されるか）を列挙してください。\n\n[各話ごとの起承転結及びどんでん返し（全10話）]\n※注意：AI特有の「駆け足の要約」を禁じます。各話のイベントは必ず「障害」と「判定」を伴うよう詳細に記述してください。敵の正体や真相（事態の元凶など）は、敵の不用意なミスや自白ではなく、必ず「PCの能動的な探索や行動」によって論理的に明らかになるよう構成してください。また、各話の導入で「なぜ冒険者か」「どんな荒事が予想されるか」を明記してください。\n\n【キャンペーンプロット設計のやり方・形式】\n1話、2話……などという風に設定し、どの話がどの役割を持っているか明示すること。\nまた、必ず各話、内容を詳細に記載すること。\n以下の『キャンペーン展開のやり方』の定義に従って各話の役割を割り振ること。\n\n【キャンペーン展開のやり方】\n[NPC顔見せ卓]\n - 本編に入る前、短話完結の小エピソード。がっつり絡むわけではなく、依頼人がそのNPC、あるいは展開上そのNPCが重要人物として登場する流れがあるなど、PCたちに接点を持たせる為の回\n - 上記の説明からも分かる通り、NPC1人につき1話のパターンが多い。ただしこれは主要なNPCのみに限られるものとする。\n\n[導入部]\n - インパクトのある幕開け、プロローグ\n - ◯◯編や◯章などがある長期キャンペーンである場合、それごとに挟まれる可能性がある\n\n[展開部]\n - 必要に応じて複数回挟み、話数を増やす\n - 必要に応じて軽い情報やそれに伴う展開、伏線を散りばめる\n\n[幕間部]\n- 閑話休題的に挟まれる1話完結の話\n- あまり本編とは関係のないものの、後ほどあっと言わせる為の細かい伏線が気づかれない程度に貼られたりすることもある\n\n[情報部]\n - 前提として挟まない可能性がある\n - キャンペーンにおいての目標や謎をキャラクター達へ明かすことを大きく取り扱う\n - ロールプレイメインの部でもある\n - その為、戦闘したとしても軽くあしらえる程度の雑魚敵。基本は戦闘もなし。\n - キャンペーンに1回のみ挟む構造が望ましい。展開部に小刻みに情報を散りばめるやり方もある為、前提で説明した通り、挟まない場合もある。\n - 話数の多い長期キャンペーン(5話以上)であれば早めに置いて、キャンペーンにおける目標と設定を明かす回にするといい。こういったキャンペーンは基本、ショートキャンペーンの寄せ集めになっていることが多いため。要は◯◯編や第◯章といった区切りのことをいうが、例えばキャンペーンの中で宇宙人と戦う部隊に所属するならば、「宇宙人と戦う」「奴らはどういう存在か」「どうしてこんなことになっているのか、奴らの目的はなんなのか」「これからやっていくべき同一条件の説明」「その他etc...」といった感じでやっていくことや目標を早めに共有する、など。あくまでも一例である。例えば「ここを段階的に調査していくだけ」で物語上はそれに伴って話が進んでいくパターンやそれに類似する場合、簡潔な説明で済むので端折ってもいい。\n - 逆に話数の少ない短期キャンペーン(4話以下)であれば、そういった固定の目標を初めに定めたりはしないので(起承転結でコンパクトに押さえられるため)、終盤の[戦闘部]の前に置いて、[情報部]でキャンペーンに於いての重大情報を明かした後、強敵が現れて次回！といったような劇的な幕引きも演出することができる。\n\n[戦闘部]\n - 情報は最低限に、[展開部]または[情報部]を経て、強敵を倒すだけの部分を設ける\n - その後の話の幕引きとして、大きな展開を見せる起点としても使える部\n\n[戦闘部+エピローグ]\n - ラスボスとの戦いはここに類する\n - その後は余韻のを残すエピローグ\n\n◆補足\n上から順に沿って一つずつとするのではなく、必ず説明を鑑みて、必要な箇所をその話の該当する役割に沿って、並び替えたり追加したりしてください。展開部が3回続くとかも全然あるわけです。臨機応変に頼みます。\n\n\n==================================================\n# 共通注意：GMPCの扱い\n==================================================\n【GMPCの扱い】\n[資]3.GMPC資料.txt は、GMPCが存在し、資料が添付されている場合のみ参照してください。\nGMPCが存在しない場合、資料が添付されていない場合、または入力で「なし」と指定されている場合は、GMPCをシナリオに登場させず、勝手に作成・追加・前提化してはいけません。\nGMPCがいる場合でも、PCの活躍を奪わせず、感情線や補助線として扱ってください。\nGMPCの因縁、仇、過去、秘密は、入力資料に明記されている場合のみ扱ってください。\n",

                              "template": "# 命令書：シナリオの自動洗練と深度化（整合性ロジックチェッカー）\nあなたはベテランのTRPGシナリオライター兼、極めて論理的で厳格な編集者（ロジックチェッカー）です。\nこれまでの会話履歴にある「最新のシナリオプロット」または「直前に出力されたシナリオのパート」を対象に、**深度（深み）・整合性・面白さ**を飛躍的に向上させるための推論と改稿を行ってください。\n\n新たな入力情報は与えません。既存の文脈と添付資料（[資]1〜[資]6を含む各種辞書・資料）の知識を最大限に活用し、以下の工程で自律的にブラッシュアップを実行してください。\n\n---\n\n### 【工程1：クリティカル・レビュー（思考プロセス）】\nまず、現状の対象テキストに対して「意地悪で極めて論理的な読者」の視点で徹底的に「突っ込み」を入れ、論理的弱点を洗い出してください。\n以下の観点で厳密にチェックを行い、課題点を列挙すること。\n\n1.  **登場人物のIQと論理的整合性（★最重要追加項目）**\n    * 悪役や黒幕は「致命的な視点の見落とし」をしていないか？彼らの行動は自身の目的に対して真に合理的か？\n    * 突然の自供など、三流悪役のような「シナリオ進行上のご都合主義の行動」をとっていないか？\n    * NPCが「本来知り得ない情報」をもとに行動・発言していないか？（情報の非対称性の破綻。特にキャンペーンでは話数をまたぐ情報の管理に注意）\n    * ルールの「拡大解釈（曲解）」を利用したアンフェアな行動やトリックになっていないか？\n2.  **公式NPCの完全中立化（★最重要追加項目）**\n    * 公式NPC（シラヌイ、ムーザン等）が、依頼や関係者に対して「個人的な特別な感情」を持っていたり、関係者設定になっていたりしないか？（完全にフラットな仲介役になっているか）\n3.  **冒険者への依頼理由と荒事の必然性（★最重要追加項目）**\n    * 「なぜ役人や警備隊ではなく冒険者が呼ばれたのか」という理由付けと、「どのような荒事が予想されるのか」という危険性の提示は、論理的で納得できるものになっているか？（TRPGとしての戦う理由があるか）\n4.  **モチーフ構造への寄り添い（★追加項目）**\n    * ベースとなった「具体的な1つのエピソード（文学・実話等）」の優れた構造にしっかり寄り添いつつ、TRPGのシナリオとして破綻なく成立しているか？\n5.  **アシワラ固有の論理と世界観の整合性（★アシワラ特化項目）**\n    * 公式NPC（シラヌイ、ムーザン、ギン、ラショウなど）の性格や能力、立ち位置から逸脱した行動をとっていないか？\n    * テレポーターの制限、死国や穢土、不死山などの地理的・歴史的制約を無視していないか？\n6.  **イベントの密度と質（★規模チェック）**\n    * 各フェーズのイベントが、ただ何かを発見する「だけ」や、話して終わる「だけ」の薄い内容に要約されていないか？\n    * プレイヤーが試行錯誤やダイス判定、交渉を行うための「間」と「障害」が設計されているか？（1話あたり約3時間(シナリオ本文は2時間,戦闘は1時間)プレイできる分量か）\n7.  **因果律の強度**\n    * 「なぜそこでそうなるのか？」に必然性はあるか？（ご都合主義の排除）\n    * 敵や黒幕の行動原理は、彼らの信念や背景に基づいているか？（ただの悪役になっていないか）\n8.  **ミスリードと伏線の品質**\n    * そのミスリードはPC（プレイヤー）にとって「騙された！」と納得できるものか？（理不尽な後出しジャンケンになっていないか）\n    * 伏線は適切に配置されているか？\n9.  **TRPGとしての構造**\n    * PC（プレイヤーキャラクター）が主役になっているか？\n    * 一本道であっても、PCが「自分たちの意思で選んだ」と感じさせる誘導ができているか？\n10. **展開の必要性**\n    * そのシーンは物語の進行や事件の解決（または脅威の描写）に不可欠か？（蛇足の削除）\n    * 感情を揺さぶる「谷（受難）」と「山（カタルシス）」の落差は十分か？\n11. **キャンペーン展開の適切さ**\n    * 各話に割り振られた役割（[導入部]、[展開部]、[情報部]、[戦闘部]など）は、キャンペーンの総話数に対して適切なペース配分で配置されているか？\n    * [情報部]で明かされる謎や、[戦闘部]の配置に不自然な偏りはないか？\n\n### 【工程2：ソリューション（修正案の提示）】\n工程1で洗い出した課題に対し、具体的な解決策（アイデア）を考案してください。特に「論理の破綻」「ルールの拡大解釈」「冒険者への依頼理由の欠如」「公式NPCの中立性違反」「イベントの短縮・規模不足」「悪役の頭の悪さ」が発見された場合は、計画と障害をより緻密で隙のないものに再構築してください。\n\n### 【工程3：リファイン・アウトプット（最終出力）】\n修正案を反映し、**「洗練された完全版（プロットまたはシナリオパート）」**を出力してください。\n記述は具体的かつドラマチックに行い、各イベントの「障害」と「判定」を明確化し、GMがそのままマスタリングの指針にできるレベルまで解像度を高めてください。\n\n---\n\n**■出力形式に関する重要指示**\n出力はプレーンテキストのコードブロックにお願いいたします。\n本工程で最終出力される内容は、次工程への重要なマスターデータとなります。\n分析レポート等の後、最終的な【洗練版テキスト】を出力する際は、単なるプレーンテキストのコードブロックとして出力してください。\n\n1.  **【分析レポート】**：懸念点と、それをどう論理的に修正したか（工程1・2の要約）。\n2.  **【洗練版テキスト】（※独立して出力）**：プロットまたはシナリオパートの洗練された内容。\n    * 変更・加筆した部分は、なぜそうしたかが分かるように（※注釈：論理的整合性のための修正、等）などで補足を入れること。\n\n**■制約事項**\n* ハルシネーション（事実に基づかない捏造）を避け、これまでの設定と矛盾しないこと。\n* 安易な解決や自白を避け、キャラクターが葛藤し、成長するプロセスを重視すること。\n* 思考力を最大限に使用し、長文になっても構わないので緻密かつ論理的に構成すること。\n",
                              "fields": "レビュー対象種別,対象テキスト,参照資料,重点的に見る観点,今回の話数,対象パート,追加の懸念点",
                              "updatedAt": "2026-04-28 00:00"

                              "id": "prompt_6_1",
                              "number": "6-1",
                              "title": "6-1. キャンペーン名・トレーラー作成",
                              "category": "PL公開",
                              "description": "キャンペーン全体プロット後、PL公開前にタイトルとトレーラーを作成する工程。",
                              "template": "# 命令書：キャンペーン名・トレーラー作成\n\nあなたはプロのTRPGキャンペーンライター兼コピーライターです。\n以下の資料をもとに、PL向けに公開できるキャンペーン名、サブタイトル、短いトレーラー文、募集ページ冒頭文を作成してください。\n\n本工程では、キャンペーンの核心や各話の詳細、黒幕、裏切り、最終話の結末を明かしてはいけません。\nただし、PLが「このキャンペーンで何を体験するのか」「どんな雰囲気の物語なのか」「自分のPCがどのように関わるのか」を理解できるようにしてください。\n\n==================================================\n# 入力要素\n==================================================\n\n1. 【使用システム】\nソード・ワールド2.5\n\n2. 【キャンペーン形式】\n[例：全7話キャンペーン / 全10話キャンペーン / オムニバス型 / 一本道型 など]\n\n3. 【キャンペーン世界観資料】\n[資]5.キャンペーン世界観・裏設定資料.txt\n\n4. 【NPC配置資料】\n[資]6.NPC配置資料.txt\n\n5. 【主要NPC一覧資料】\n[資]7.主要NPC一覧資料.txt\n\n6. 【準主要NPC一覧資料】\n[資]8.準主要NPC一覧資料.txt\n\n7. 【第1話フック】\n[資]9-1.第1話シナリオ資料.txt のうち、第1話フックまたは導入情報\n\n8. 【最終話フック】\n[最終話フック資料]\n\n9. 【キャンペーン全体プロット】\n[キャンペーン全体プロット資料]\n\n10. 【PLに公開してよい情報】\n[PCの立場、舞台の概要、冒険の方向性、導入、雰囲気など]\n\n11. 【伏せるべき情報】\n[黒幕、真相、裏切り、死亡予定、最終話の展開、各話の詳細、NPCの裏の顔など]\n\n12. 【タイトルの方向性】\n[例：和風 / ダークファンタジー / 詩的すぎない / 漢字多め / ドイツ語風は避ける/入れる など]\n\n13. 【避けたいタイトル】\n[既存作品に似すぎる、抽象的すぎる、ネタバレになる、長すぎる、軽すぎる など]\n\n==================================================\n# 作成方針\n==================================================\n\n・キャンペーン名は、舞台名ではなく「物語の名前」として機能させること。\n・黒幕、最終目的、裏切り、死亡予定などのネタバレを含めないこと。\n・第1話の導入と、キャンペーン全体の空気を両立すること。\n・PLがPCを作る際の方向性を掴めるようにすること。\n・抽象的すぎる言葉だけで逃げないこと。\n・ただし、説明的すぎて募集文としての引きが弱くならないようにすること。\n・タイトル案は最低10案提示し、辛口で比較すること。\n・必要に応じて、メインタイトルとサブタイトルを分けること。\n・ハルシネーションしないでください。\n・過去のチャットからは学習せず、入力された資料のみを参照してください。\n\n==================================================\n# 出力形式\n==================================================\n\n出力はプレーンテキストのコードブロックにしてください。\n\n【第1章　前提整理】\n■1-1. キャンペーンの公開可能な魅力\n■1-2. 伏せるべき核心\n■1-3. タイトル作成時の注意点\n\n【第2章　キャンペーン名案】\n最低10案提示する。\n各案について、タイトル、サブタイトル、印象、強み、弱点、ネタバレ危険度、PLへの訴求力を記載する。\n\n【第3章　辛口比較】\n【第4章　最有力案】\n【第5章　PL向けトレーラー文】\n\n出力後、\n「このタイトル案を採用しますか？ それとも別方向で再提案しますか？」\nと確認して停止してください。\n",
                              "fields": "キャンペーン形式,キャンペーン世界観資料,NPC配置資料,主要NPC一覧資料,準主要NPC一覧資料,第1話フック,最終話フック,キャンペーン全体プロット,PLに公開してよい情報,伏せるべき情報,タイトルの方向性,避けたいタイトル",
                              "updatedAt": "2026-04-29 00:00"
